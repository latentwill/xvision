[package]
name        = "xvision-observability"
description = "Agent run observability: canonical SQLite ledger, redactor, blob store, config. Subscribed by the event bus and recorder."
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true

[lib]
name = "xvision_observability"
path = "src/lib.rs"

[dependencies]
serde       = { workspace = true }
serde_json  = { workspace = true }
toml        = { workspace = true }
chrono      = { workspace = true }
thiserror   = { workspace = true }
anyhow      = { workspace = true }
tracing     = { workspace = true }
sqlx        = { workspace = true }
tokio       = { workspace = true }
async-trait = { workspace = true }
regex       = "1"
sha2        = "0.10"
hex         = "0.4"
uuid        = { workspace = true }

[dev-dependencies]
tempfile           = "3"
tokio              = { workspace = true, features = ["rt", "macros"] }
tracing-subscriber = { workspace = true }

[features]
default = []
# Phase B OpenTelemetry bridge — opt-in only. Enabling this pulls in
# `tracing-opentelemetry`, `opentelemetry`, `opentelemetry-otlp`, and the
# `OtelTeeRecorder` published from `src/otel.rs`. Default builds (and the
# production `xvision:latest` image) stay slim.
otel = [
  "dep:tracing-opentelemetry",
  "dep:tracing-subscriber",
  "dep:opentelemetry",
  "dep:opentelemetry_sdk",
  "dep:opentelemetry-otlp",
]

[dependencies.tracing-opentelemetry]
version  = "0.22"
optional = true

[dependencies.tracing-subscriber]
workspace = true
optional  = true

[dependencies.opentelemetry]
version  = "0.21"
optional = true

[dependencies.opentelemetry_sdk]
version  = "0.32"
# `testing` is needed by `tests/otel_tee_smoke.rs` for the in-memory span
# exporter. It only gets pulled in when `--features otel` is active.
features = ["rt-tokio", "testing"]
optional = true

[dependencies.opentelemetry-otlp]
version  = "0.14"
features = ["tonic", "trace"]
optional = true
