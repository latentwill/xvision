[package]
name        = "xvision-observability"
description = "Agent run observability: canonical SQLite ledger, redactor, blob store, config. Subscribed by the event bus and recorder."
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true

[lib]
name = "xvision_observability"
path = "src/lib.rs"

[dependencies]
serde       = { workspace = true }
serde_json  = { workspace = true }
toml        = { workspace = true }
chrono      = { workspace = true }
thiserror   = { workspace = true }
anyhow      = { workspace = true }
tracing     = { workspace = true }
sqlx        = { workspace = true }
tokio       = { workspace = true }
async-trait = { workspace = true }
regex       = "1"
sha2        = "0.10"
hex         = "0.4"
uuid        = { workspace = true }

[dev-dependencies]
tempfile           = "3"
tokio              = { workspace = true, features = ["rt", "macros"] }
tracing-subscriber = { workspace = true }

[features]
default = []
# OTel bridge ships in Phase B (`agent-run-observability-otel-bridge`).
# This crate intentionally has no `otel` feature yet.
