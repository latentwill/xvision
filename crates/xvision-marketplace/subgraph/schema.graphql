# Marketplace subgraph schema (surface spec §6.3).
#
# The public marketplace browse experience reads entirely from this indexer —
# no centralized DB. Third-party explorers can surface xvn listings without
# permission. Entity ids and the `payerKind` / `purchasePath` fields are the
# human-vs-agent moat surfaced by the Phase-1 data contract.
#
# AM3 (2026-06-08 live-trading-marketplace spec): the ERC-8004 agent IS the
# strategy/listing — one `agentId` per listed strategy (1:1), NOT a per-lineage
# grouping. The former `Lineage` entity is therefore an `Agent` record keyed by
# the IdentityRegistry token id (`agentId`). `parentAgent` is an optional,
# unused self-reference retained for forks recorded off-chain in the manifest;
# nothing in the contracts enforces it.

type Agent @entity(immutable: false) {
  id: ID! # agentId (IdentityRegistry ERC-721 token id == strategy/listing agent)
  owner: Bytes!
  manifestCid: String!
  parentAgent: Agent # optional fork ancestor (off-chain manifest hint; unused on-chain)
  reputation: [Feedback!]! @derivedFrom(field: "agent")
  validations: [Validation!]! @derivedFrom(field: "agent")
  listings: [Listing!]! @derivedFrom(field: "agent")
}

type Listing @entity(immutable: false) {
  id: ID! # listingId
  agent: Agent! # agentId (1:1 strategy/listing under AM3)
  seller: Bytes!
  contentHash: Bytes!
  tier: Int!
  priceUSDC: BigInt!
  protocolFeeBps: Int!
  revoked: Boolean!
  sales: [Sale!]! @derivedFrom(field: "listing")
  attestations: [EvalAttestation!]! @derivedFrom(field: "listing")
}

type Sale @entity(immutable: true) {
  id: ID! # txHash-logIndex
  listing: Listing!
  buyer: Bytes!
  priceUSDC: BigInt!
  sellerProceeds: BigInt!
  protocolProceeds: BigInt!
  payerKind: Int! # v1 PLACEHOLDER — mirrors purchasePath; DO NOT derive analytics from this field (refinement tracked in program plan §7.1)
  purchasePath: Int! # 0 = direct, 1 = x402
  blockTimestamp: BigInt!
}

type EvalAttestation @entity(immutable: true) {
  id: ID!
  listing: Listing!
  attester: Bytes!
  evalResultHash: Bytes!
  schema: Bytes!
  postedAt: BigInt!
}

type Feedback @entity(immutable: false) {
  id: ID! # "<agentId>-<index>" — keyed by the on-chain append index so a
          # FeedbackRevoked(agentId, index, ...) event can resolve THIS entity
          # to tombstone it. (Not txHash-logIndex: the revoke event carries the
          # array index, not the posting tx, so the id must be reconstructable
          # from (agentId, index). The per-agent index comes from
          # FeedbackCounter below, which tracks the append position.)
  agent: Agent!
  rater: Bytes!
  value: BigInt!
  feedbackHash: Bytes!
  tag1: String!
  revoked: Boolean! # §3.7 tombstone — true once a FeedbackRevoked event fires; excluded from aggregate recompute
  blockTimestamp: BigInt!
}

# Internal bookkeeping entity — NOT part of the public read contract (the
# frontend MarketplaceData layer ignores it). Tracks the next append index per
# agent so each FeedbackPosted gets the same index the contract's
# ReputationRegistry feedback array uses, letting FeedbackRevoked(agentId,
# index, ...) resolve the Feedback entity (id "<agentId>-<index>") to tombstone.
type FeedbackCounter @entity(immutable: false) {
  id: ID! # agentId
  count: BigInt! # number of feedback entries appended so far (== next index)
}

type Validation @entity(immutable: true) {
  id: ID! # txHash-logIndex
  agent: Agent!
  validator: Bytes!
  resultHash: Bytes!
  tag: String!
  blockTimestamp: BigInt!
}
