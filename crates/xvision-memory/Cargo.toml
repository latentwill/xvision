[package]
name = "xvision-memory"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1"
async-trait = "0.1"
chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
sqlx = { version = "0.8", features = ["sqlite", "runtime-tokio-rustls", "macros", "chrono"] }
thiserror = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
ts-rs = { version = "9", optional = true }
ulid = { version = "1", features = ["serde"] }

[features]
# Enable to emit `#[derive(ts_rs::TS)]` for types in this crate reachable
# from the dashboard API surface (currently just `MemoryMode`). Driven
# by `xtask gen-types` (`cargo test --features ts-export --lib`) — the
# engine's `ts-export` feature propagates here.
ts-export = ["dep:ts-rs"]

[dev-dependencies]
tempfile = "3"
tokio = { version = "1", features = ["test-util"] }
