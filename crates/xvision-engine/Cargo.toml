[package]
name        = "xvision-engine"
description = "strategy creation, bundling, agent execution"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true

[lib]
name = "xvision_engine"
path = "src/lib.rs"

[dependencies]
xvision-core   = { path = "../xvision-core" }
xvision-data   = { path = "../xvision-data" }

reqwest     = { workspace = true }

serde       = { workspace = true }
serde_json  = { workspace = true }
chrono      = { workspace = true }
uuid        = { workspace = true }
ulid        = { version = "1", features = ["serde"] }
anyhow      = { workspace = true }
thiserror   = { workspace = true }
async-trait = { workspace = true }
tokio       = { workspace = true }
tracing     = { workspace = true }
sqlx        = { workspace = true }
ts-rs       = { version = "9", optional = true }

[dev-dependencies]
proptest = { workspace = true }
tempfile = "3"
tokio    = { workspace = true, features = ["rt", "macros"] }

[features]
default   = []
# Emit TypeScript types for every API request/response to
# `frontend/web/src/api/types.gen/`. Run via `cargo xtask gen-types` (Plan 1
# Task 4) or directly with `cargo test --features ts-export --tests`.
ts-export = ["dep:ts-rs"]
