[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
# EVM target. Mantle mainnet (5000) and Sepolia (5003) have supported Shanghai
# (incl. PUSH0) for well over a year, so `shanghai` is safe and reclaims PUSH0's
# gas savings on every constant load. NOT `cancun`: this tree uses no transient
# storage / mcopy (and OZ is pinned to v5.0.2, pre-mcopy, for the same reason);
# bump to `cancun` only if transient storage is actually adopted.
# Smoke-deploy to 5003 to confirm PUSH0 acceptance before relying on this.
evm_version = "shanghai"
fs_permissions = [{ access = "read", path = "./" }]
remappings = [
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
  "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
  "forge-std/=lib/forge-std/src/",
]

# Storage-layout snapshots for UUPS upgrade safety (see README §Upgrade safety).
build_info = true
extra_output = ["storageLayout"]

[profile.ci]
# CI runs deeper fuzzing + invariant campaigns.
fuzz = { runs = 1000 }
invariant = { runs = 256, depth = 32 }

[rpc_endpoints]
mantle_sepolia = "${MANTLE_SEPOLIA_RPC_URL}"
mantle = "${MANTLE_RPC_URL}"

[etherscan]
mantle_sepolia = { key = "${MANTLESCAN_API_KEY}", url = "https://api-sepolia.mantlescan.xyz/api", chain = 5003 }
mantle = { key = "${MANTLESCAN_API_KEY}", url = "https://api.mantlescan.xyz/api", chain = 5000 }
