# Deterministic risk-layer thresholds. Pipeline owns risk; harness trusts the
# decision (Tier 3 cleanup).

[limits]
max_position_pct_nav     = 20.0   # any single position
max_total_exposure_pct   = 100.0
max_open_positions       = 5
max_daily_loss_pct       = 5.0    # circuit breaker — flat-only afterwards until next UTC day

[stops]
stop_loss_required          = true
stop_loss_min_pct           = 0.5
stop_loss_max_pct           = 10.0
take_profit_required        = false
take_profit_min_rr          = 1.5  # take-profit must be ≥1.5× stop distance when present

# Per-venue deterministic broker constraints. `MinNotional` risk rule
# reads `min_notional_usd` and pre-submit-vetoes orders below the
# minimum so the broker never sees a known-bad order (replaces the
# wasteful round-trip + post-submit rejection loop).
#
# `paper` — Alpaca paper crypto rejects with `cost basis must be >=
# minimal amount of order 10`; see PR #314 broker error classifier.
# `live`  — Alpaca live crypto's documented minimum on most pairs is
# $1 (https://docs.alpaca.markets/docs/crypto-trading "Order minimums");
# kept conservative as the default until per-asset overrides land.
#
# Default 0.0 when a venue is unconfigured → rule is a no-op (preserves
# today's pass-everything behavior on unknown venues).
[venues.paper]
min_notional_usd = 10.0

[venues.live]
min_notional_usd = 1.0

# Perps-specific guards (optional — this whole section defaults if omitted).
#
# `FundingCarryGuard` vetoes an entry that would *pay* perp funding above
# `max_funding_pay_8h` (same units as the onchain panel's `funding_rate_8h`,
# a per-8h fraction; positive ⇒ longs pay shorts). A long pays `+funding`,
# a short pays `-funding`; favorable (carry-positive) funding always passes,
# and exits are never blocked. The guard only bites on the live perps path
# (which threads funding into the risk gate) — spot/backtest carries no
# funding signal, so it no-ops. Default 0.01 (1% per 8h ≈ extreme
# triple-digit annualized) only bites on genuinely punitive funding;
# tighten per strategy.
[perps]
max_funding_pay_8h = 0.01
