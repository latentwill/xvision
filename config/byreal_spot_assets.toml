# Curated Byreal Solana-spot universe (first slice).
# symbol → { mint, kind, decimals }. xStocks (Backed Finance) are plain SPL
# mints; kind = "xstock" is a display tag only. Out-of-set symbols are refused.
#
# Only mints VERIFIED against an explorer are enabled below. To add an asset,
# confirm its SPL mint (e.g. on solscan.io / birdeye.so), then uncomment a
# template and paste the real mint. Mints are validated on load (length 32–64);
# a wrong/placeholder mint fails closed rather than routing a swap to it.
usdc_mint = "EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v"

# SOL — verified (used in the byreal-cli grounding dry-run).
[[assets]]
symbol = "SOL"
mint = "So11111111111111111111111111111111111111112"
kind = "spl"
decimals = 9

