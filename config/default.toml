# XVISION v1 default runtime configuration.
#
# Override per-environment with XVN_CONFIG_PATH=path/to/override.toml
# (or the compatibility alias XVN_CONFIG=path/to/override.toml), or
# XVN_<SECTION>_<KEY>=value (e.g. XVN_TRADER_TEMPERATURE=0.4 for forward paper).

# Agent runtime for LLM-backed slots. "cline" routes every slot dispatch
# through the xvision-agentd sidecar (the unified live + eval + replay + optimizer
# path); the sidecar binary is resolved from XVN_AGENTD_BIN (set in the deploy
# image, which builds the sidecar in its agentd stage). "cline" is now the ONLY
# valid value: the legacy llm-dispatch trader path and the XVN_EMERGENCY_LLM_DISPATCH
# emergency rollback were RETIRED (2026-06-14) — a missing XVN_AGENTD_BIN or an
# unlaunchable sidecar is a HARD ERROR with an actionable message, NOT a silent
# fallback. (The LlmDispatch trait still backs the optimizer mutator/judge.)
agent_runtime = "cline"

[runtime]
mode        = "backtest"        # backtest | paper | live
executor    = "alpaca"          # alpaca | orderly
random_seed = 42

# Registered LLM providers. Add via Settings → Providers (or `xvn provider add …`).
# No providers are seeded — start from an empty list on fresh install.

[default_llm]
# Workspace-level default LLM. Used by the chat rail, the setup wizard, and
# as a fallback for any agent slot that doesn't override its own provider/
# model. (Formerly the [intern] section; the Intern stage was retired and the
# [intern] alias removed — use [default_llm].)
provider          = "anthropic"  # anthropic | openai-compat | local-candle
base_url          = "https://api.anthropic.com"
model             = "claude-haiku-4-5"
api_key_env       = "ANTHROPIC_API_KEY"
temperature       = 0.0          # MUST be 0 for backtest pairing — Tier 1 fix #1
reasoning_effort  = "low"        # forwarded when provider supports it
max_tokens        = 1024

[trader]
model_path                = "models/qwen3-32b-q4-gguf/Qwen_Qwen3-32B-Q4_K_M.gguf"
temperature               = 0.0  # MUST be 0 for backtest — Tier 1 fix #2
forward_paper_temperature = 0.4
max_tokens                = 512

[trader.vectors]
enabled = true
config  = "off"                  # off | on | random | orthogonal | regime_conditioned

[backtest]
step    = 24                     # MUST be >= horizon — Tier 1 fix #4
horizon = 16
bootstrap_resamples = 10000
bootstrap_block_size = 8         # for time-series-correct CIs

[paths]
data_root  = "data"
vectors    = "data/vectors"
probes     = "data/probes"
sqlite_url = "sqlite://data/decisions.db"

# Alpaca market-data fetcher knobs. Default rate limit matches Alpaca's free
# tier (~200 rpm); bump for paid plans. Read by `ApiContext::open_with_config`
# and passed to `AlpacaBarsFetcher::with_rate_limit`.
[data.alpaca]
rate_limit_rpm = 200
