# Tradeable assets and per-venue symbol mappings.
# Keep this in sync with the Alpaca crypto symbols exposed by scenario
# creation and the dashboard asset picker. Single-asset strategy/scenario
# flows should not be BTC-gated by risk config.

[[assets]]
symbol  = "BTC"
enabled = true
cluster = "btc"
[assets.venues]
alpaca  = "BTC/USD"
orderly = "PERP_BTC_USDC"

