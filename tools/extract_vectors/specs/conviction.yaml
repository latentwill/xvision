# Conviction axis — v1 ACTIVE axis
# Positive pole: decisive, committed, names the call without hedging
# Negative pole: hedged, conditional, defers to ambiguity
#
# target_pairs: 200 (Mitra lower bound for active axis on big models)
# Cartesian: 10 assets × 5 regimes × 4 behavior-pairs = 200

axis_name: conviction

assets:
  - BTC-PERP
  - ETH-PERP
  - SOL-PERP
  - BNB-PERP
  - AVAX-PERP
  - ARB-PERP
  - MATIC-PERP
  - LINk-PERP
  - OP-PERP
  - DOGE-PERP

regimes:
  - bull trending
  - bear trending
  - high volatility
  - low volatility choppy
  - range-bound accumulation

positive_behaviors:
  - "names the call without hedging — commits to direction with explicit conviction"
  - "asserts thesis cleanly: price target stated, direction named, no qualifiers"
  - "commits to the position with full size — no 'wait and see' language"
  - "declares the trade with certainty: entry, stop, target all specified without hedging"

negative_behaviors:
  - "every claim qualified by 'unless' clauses — defers final judgment to ambiguity"
  - "balances both sides without committing — 'could go either way' language throughout"
  - "hedges with conditional framing: 'if conditions confirm, perhaps consider entering'"
  - "refuses to name a direction — 'the market will tell us' type deferral"

target_pairs: 200
