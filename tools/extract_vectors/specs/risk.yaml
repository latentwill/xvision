# Risk-appetite axis — pipeline-only (not active in v1 headline experiment)
# Positive pole: risk-seeking, large size, wider stops
# Negative pole: risk-averse, small size, tight stops
#
# target_pairs: 60 (Mitra lower bound for pipeline-only axes)
# Cartesian: 5 assets × 4 regimes × 3 behavior-pairs = 60

axis_name: risk_appetite

assets:
  - BTC-PERP
  - ETH-PERP
  - SOL-PERP
  - BNB-PERP
  - LINK-PERP

regimes:
  - bull trending
  - bear trending
  - high volatility
  - low volatility choppy

positive_behaviors:
  - "sizes the position aggressively — takes on maximum allowable exposure for this setup"
  - "accepts wide stop placement — willing to hold through large drawdowns for the thesis"
  - "adds leverage to amplify expected return — risk is acceptable given the setup quality"

negative_behaviors:
  - "sizes conservatively — uses minimum viable position to limit downside"
  - "sets tight stops to cap loss — exits quickly if trade moves against it"
  - "avoids leverage entirely — prioritizes capital preservation over return maximization"

target_pairs: 60
