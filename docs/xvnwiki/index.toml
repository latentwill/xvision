# In-app docs manifest.
#
# Edit this file + drop a sibling `<slug>.md` to add a baked page to the
# dashboard's `/docs` route. The `build.rs` in `crates/xvision-dashboard`
# reads this manifest at build time and generates the `PAGES` table
# consumed by `crates/xvision-dashboard/src/routes/docs/mod.rs`.
#
# No runtime filesystem read — the content is `include_str!`'d into the
# binary at compile time. The deployed image carries every page.
#
# Order matters: this is the sidebar render order. The `section` field
# groups pages under a header in the sidebar; pages with the same
# `section` value are kept together and the section label is preserved
# in the order it first appears.

