<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xvision Riso Lead Poster</title>
  <style>
    :root { color-scheme: light; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 42%, rgba(255, 251, 243, 0.98), rgba(244, 236, 223, 0.98) 40%, rgba(228, 216, 198, 0.98) 100%);
    }
    body {
      display: grid;
      place-items: center;
    }
    canvas {
      width: min(94vw, 1240px);
      height: auto;
      aspect-ratio: 1240 / 1600;
      display: block;
      box-shadow: 0 28px 100px rgba(46, 28, 16, 0.22);
      border: 1px solid rgba(85, 62, 40, 0.12);
      background: #f5ede0;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <script>
    (() => {
      const canvas = document.getElementById('c');
      const ctx = canvas.getContext('2d');
      const W = 1240, H = 1600;
      canvas.width = W;
      canvas.height = H;

      const s = {
        id: 'fib',
        name: 'Fibonacci Golden Cross',
        short: 'Fib · GC',
        color: '#D4A547',
        kind: 'Trend',
        metrics: { return: 82.41, sharpe: 1.92, mdd: -18.72, win: 58.6, pf: 1.81 }
      };

      const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
      const rr = (rng, a, b) => a + (b - a) * rng();
      function mulberry32(seed) {
        return function() {
          let t = seed += 0x6D2B79F5;
          t = Math.imul(t ^ (t >>> 15), t | 1);
          t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }
      function hashStrategy(x) {
        let h = 0x811c9dc5 >>> 0;
        const mix = (v) => {
          const str = typeof v === 'number' ? String(Math.round(v * 1e6)) : String(v);
          for (let i = 0; i < str.length; i++) {
            h ^= str.charCodeAt(i);
            h = Math.imul(h, 16777619);
          }
        };
        mix(x.id); mix(x.name); mix(x.short); mix(x.kind); mix(x.color);
        mix(x.metrics.return); mix(x.metrics.sharpe); mix(x.metrics.mdd); mix(x.metrics.win); mix(x.metrics.pf);
        return h >>> 0;
      }
      function hsl(h, s, l, a = 1) { return `hsla(${((h % 360) + 360) % 360}, ${s}%, ${l}%, ${a})`; }
      function hexToRgb(hex) {
        const m = hex.replace('#', '').trim();
        const v = m.length === 3 ? m.split('').map(ch => ch + ch).join('') : m;
        const n = parseInt(v, 16);
        return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
      }
      function rgbToHsl({ r, g, b }) {
        r /= 255; g /= 255; b /= 255;
        const max = Math.max(r, g, b), min = Math.min(r, g, b);
        let h, s, l = (max + min) / 2;
        if (max === min) { h = s = 0; }
        else {
          const d = max - min;
          s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
          switch (max) {
            case r: h = (g - b) / d + (g < b ? 6 : 0); break;
            case g: h = (b - r) / d + 2; break;
            default: h = (r - g) / d + 4; break;
          }
          h *= 60;
        }
        return { h, s: s * 100, l: l * 100 };
      }
      function palette(seed) {
        const base = rgbToHsl(hexToRgb(s.color));
        const warm = s.metrics.win > 52 ? 1 : 0;
        const sat = clamp(18 + (s.metrics.sharpe - 1) * 9, 16, 34);
        const lum = clamp(62 - Math.abs(s.metrics.mdd) * 0.1, 52, 70);
        return [
          hsl(base.h + seed % 9, sat + 3, lum + 2),
          hsl(base.h + 21, sat - 1, lum + 9),
          hsl(base.h - 14, sat + 4, lum - 5),
          hsl(base.h + 142, sat - 3, lum + 7),
          hsl(base.h + 208, sat - 2, lum - 4),
          hsl(base.h + 284, sat + 1, lum + 3),
          warm ? '#14110f' : '#171411'
        ];
      }
      const seed = hashStrategy(s);
      const rng = mulberry32(seed);
      const pal = palette(seed);
      const v = {
        energy: clamp(0.22 + (s.metrics.sharpe - 0.3) / 1.9 * 0.54 + s.metrics.return / 110, 0.2, 0.9),
        density: clamp(0.16 + (s.metrics.sharpe - 0.3) / 1.9 * 0.28 + (s.metrics.pf - 1) * 0.18, 0.12, 0.74),
        coherence: clamp(0.22 + (s.metrics.pf - 1) * 0.55, 0.12, 0.9),
        darkness: clamp(0.08 + Math.abs(s.metrics.mdd) / 34 * 0.42, 0.06, 0.45),
        bleed: clamp(0.12 + s.metrics.return / 480, 0.12, 0.22),
      };
      const mode = seed % 6;
      const cx = W * 0.51;
      const cy = H * 0.51;
      const paper = ctx.createLinearGradient(0, 0, W, H);
      paper.addColorStop(0, '#fbf4e9');
      paper.addColorStop(0.45, '#f3e8d9');
      paper.addColorStop(1, '#eadcc8');
      ctx.fillStyle = paper;
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = 'rgba(124, 93, 64, 0.03)';
      ctx.fillRect(0, 0, W, H);

      const box = { x: 72, y: 76, w: W - 144, h: H - 182 };
      ctx.save();
      ctx.beginPath();
      ctx.rect(box.x, box.y, box.w, box.h);
      ctx.clip();

      const base = ctx.createLinearGradient(box.x, box.y, box.x + box.w, box.y + box.h);
      base.addColorStop(0, pal[0]);
      base.addColorStop(0.44, pal[1]);
      base.addColorStop(1, pal[2]);
      ctx.fillStyle = base;
      ctx.fillRect(box.x, box.y, box.w, box.h);

      const haze = ctx.createRadialGradient(cx, cy, 0, cx, cy, box.w * 0.58);
      haze.addColorStop(0, 'rgba(255,255,255,0.10)');
      haze.addColorStop(1, 'rgba(0,0,0,0.18)');
      ctx.fillStyle = haze;
      ctx.fillRect(box.x, box.y, box.w, box.h);

      // a calmer central plate to make the lead strategy feel like a focal print
      ctx.save();
      ctx.globalAlpha = 0.45;
      ctx.fillStyle = 'rgba(247, 239, 226, 0.58)';
      ctx.beginPath();
      ctx.ellipse(cx, cy, box.w * 0.19, box.h * 0.12, -0.18, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 0.23;
      ctx.strokeStyle = pal[0];
      ctx.lineWidth = 14;
      ctx.beginPath();
      ctx.ellipse(cx, cy, box.w * 0.28, box.h * 0.18, -0.18, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();

      function place(i) {
        const rx = rng();
        const ry = rng();
        const bx = rx + (0.5 - rx) * v.coherence * 0.72;
        const by = ry + (0.5 - ry) * v.coherence * 0.72;
        return [box.x + box.w * (-v.bleed + bx * (1 + v.bleed * 2)), box.y + box.h * (-v.bleed + by * (1 + v.bleed * 2))];
      }
      const size = (i) => {
        const t = Math.pow(rng(), 2.2);
        return Math.min(box.w, box.h) * (0.06 + (1 - v.density) * 0.08) * (0.5 + t * 2.1);
      };
      const ink = (i) => rng() < v.darkness * 0.8 ? pal[6] : pal[(i + Math.floor(rng() * 4)) % 6];
      const modeCount = 8 + Math.round(v.energy * 4);

      // broad washed plates
      for (let i = 0; i < 5; i++) {
        const [x, y] = place(i);
        const w = size(i) * rr(rng, 2.0, 4.4);
        const h = w * rr(rng, 0.12, 0.5);
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(rr(rng, -0.9, 0.9));
        ctx.globalAlpha = 0.16 + v.energy * 0.1;
        ctx.fillStyle = ink(i);
        ctx.fillRect(-w / 2, -h / 2, w, h);
        ctx.restore();
      }

      // main vocabulary
      if (mode === 0) {
        for (let i = 0; i < modeCount + 7; i++) {
          const [x, y] = place(i);
          const r = size(i) * rr(rng, 1.0, 2.1);
          ctx.globalAlpha = clamp(0.18 + v.energy * 0.34 - i * 0.012, 0.08, 0.56);
          ctx.fillStyle = ink(i);
          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.fill();
        }
      } else if (mode === 1) {
        for (let i = 0; i < modeCount + 6; i++) {
          const [x, y] = place(i);
          const w = size(i) * rr(rng, 1.1, 2.6);
          const h = w * rr(rng, 0.18, 0.44);
          ctx.save();
          ctx.translate(x, y);
          ctx.rotate(rr(rng, -1.2, 1.2));
          ctx.globalAlpha = clamp(0.18 + v.energy * 0.3 - i * 0.012, 0.08, 0.54);
          ctx.fillStyle = ink(i);
          ctx.fillRect(-w / 2, -h / 2, w, h);
          ctx.restore();
        }
      } else if (mode === 2) {
        for (let i = 0; i < modeCount + 5; i++) {
          const [x, y] = place(i);
          const s0 = size(i) * rr(rng, 1.0, 2.0);
          ctx.save();
          ctx.translate(x, y);
          ctx.rotate(rr(rng, 0, Math.PI));
          ctx.globalAlpha = clamp(0.16 + v.energy * 0.3 - i * 0.01, 0.08, 0.54);
          ctx.fillStyle = ink(i);
          ctx.beginPath();
          ctx.moveTo(0, -s0 * 0.7);
          ctx.lineTo(s0 * 0.74, s0 * 0.45);
          ctx.lineTo(-s0 * 0.74, s0 * 0.45);
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        }
      } else if (mode === 3) {
        for (let i = 0; i < 8; i++) {
          const y = box.y + (i / 8) * box.h;
          ctx.globalAlpha = 0.16 + v.energy * 0.1;
          ctx.fillStyle = pal[(i + 1) % 6];
          ctx.fillRect(box.x, y, box.w, box.h / 8 + 1);
        }
        for (let i = 0; i < modeCount + 4; i++) {
          const [x, y] = place(i);
          const w = size(i) * rr(rng, 1.0, 2.0);
          const h = w * rr(rng, 0.08, 0.22);
          ctx.save();
          ctx.translate(x, y);
          ctx.rotate(rr(rng, -0.36, 0.36));
          ctx.globalAlpha = clamp(0.18 + v.energy * 0.22 - i * 0.01, 0.08, 0.5);
          ctx.fillStyle = ink(i);
          ctx.fillRect(-w / 2, -h / 2, w, h);
          ctx.restore();
        }
      } else if (mode === 4) {
        for (let i = 0; i < 7; i++) {
          const r0 = Math.min(box.w, box.h) * (0.45 - i * 0.05) * (0.75 + v.energy * 0.22);
          ctx.globalAlpha = clamp(0.16 + v.energy * 0.18 - i * 0.02, 0.08, 0.44);
          ctx.strokeStyle = ink(i);
          ctx.lineWidth = 18 - i;
          ctx.beginPath();
          ctx.arc(cx, cy, r0, 0, Math.PI * 2);
          ctx.stroke();
        }
        for (let i = 0; i < modeCount + 3; i++) {
          const a = (i / (modeCount + 3)) * Math.PI * 2 + rr(rng, -0.2, 0.2);
          const r = Math.min(box.w, box.h) * rr(rng, 0.18, 0.46) * (0.9 + v.coherence * 0.15);
          const w = size(i) * rr(rng, 0.45, 1.1);
          const h = w * rr(rng, 0.8, 2.0);
          ctx.save();
          ctx.translate(cx + Math.cos(a) * r, cy + Math.sin(a) * r);
          ctx.rotate(a + Math.PI / 2);
          ctx.globalAlpha = clamp(0.16 + v.energy * 0.24 - i * 0.012, 0.08, 0.48);
          ctx.fillStyle = ink(i);
          ctx.fillRect(-w / 2, -h / 2, w, h);
          ctx.restore();
        }
      } else {
        for (let i = 0; i < modeCount + 7; i++) {
          const [x, y] = place(i);
          const r = size(i) * rr(rng, 0.7, 1.7);
          ctx.save();
          ctx.translate(x, y);
          ctx.rotate(rr(rng, -1.1, 1.1));
          ctx.globalAlpha = clamp(0.16 + v.energy * 0.28 - i * 0.011, 0.08, 0.5);
          ctx.fillStyle = ink(i);
          ctx.beginPath();
          ctx.moveTo(-r * 1.0, -r * 0.05);
          ctx.bezierCurveTo(-r * 0.4, -r * 1.0, r * 0.5, -r * 0.8, r * 0.95, -r * 0.15);
          ctx.bezierCurveTo(r * 0.35, r * 0.2, -r * 0.3, r * 0.92, -r * 0.95, r * 0.12);
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        }
      }

      // soft air + grain
      ctx.globalAlpha = 0.12;
      for (let i = 0; i < 1400; i++) {
        const x = rr(rng, box.x - 30, box.x + box.w + 30);
        const y = rr(rng, box.y - 30, box.y + box.h + 30);
        const s2 = rr(rng, 0.5, 1.5);
        ctx.fillStyle = rng() < 0.85 ? 'rgba(255,255,255,0.2)' : 'rgba(20,17,15,0.1)';
        ctx.fillRect(x, y, s2, s2);
      }
      ctx.globalAlpha = 1;
      const mist = ctx.createRadialGradient(cx, cy, 0, cx, cy, box.w * 0.58);
      mist.addColorStop(0, 'rgba(255,255,255,0.04)');
      mist.addColorStop(1, 'rgba(0,0,0,0.12)');
      ctx.fillStyle = mist;
      ctx.fillRect(box.x, box.y, box.w, box.h);

      // interior marks and small microcopy
      ctx.strokeStyle = 'rgba(44, 32, 24, 0.18)';
      ctx.lineWidth = 1.5;
      const p = 14;
      const pts = [
        [box.x + p, box.y + p], [box.x + box.w - p, box.y + p],
        [box.x + p, box.y + box.h - p], [box.x + box.w - p, box.y + box.h - p],
      ];
      for (const [x, y] of pts) {
        ctx.beginPath(); ctx.moveTo(x - 8, y); ctx.lineTo(x + 8, y); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x, y - 8); ctx.lineTo(x, y + 8); ctx.stroke();
      }
      ctx.fillStyle = 'rgba(34, 24, 18, 0.66)';
      ctx.font = '10px monospace';
      ctx.fillText(s.short, box.x + 20, box.y + box.h - 18);
      ctx.fillText(`${s.metrics.return.toFixed(2)} / ${s.metrics.sharpe.toFixed(2)} / ${Math.abs(s.metrics.mdd).toFixed(2)}`, box.x + box.w - 165, box.y + box.h - 18);
      ctx.font = '9px monospace';
      ctx.fillStyle = 'rgba(34, 24, 18, 0.42)';
      ctx.fillText(s.id.toUpperCase(), box.x + box.w - 44, box.y + 22);

      ctx.restore();

      // outer sheet marks + swatches
      ctx.strokeStyle = 'rgba(68, 49, 34, 0.24)';
      ctx.lineWidth = 2;
      const mm = 22, LL = 26;
      [[mm, mm], [W-mm, mm], [mm, H-mm], [W-mm, H-mm]].forEach(([x, y]) => {
        ctx.beginPath(); ctx.moveTo(x - LL, y); ctx.lineTo(x + LL, y);
        ctx.moveTo(x, y - LL); ctx.lineTo(x, y + LL);
        ctx.stroke();
      });
      const sw = [
        ['#efe5d2'], ['#d8c29c'], ['#c99f95'], ['#96b4ac']
      ];
      ctx.font = '11px monospace';
      ctx.fillStyle = 'rgba(50,35,25,0.62)';
      ctx.fillText('inks', W - 258, H - 72);
      sw.forEach((s0, i) => {
        ctx.fillStyle = s0[0];
        ctx.fillRect(W - 260 + i * 60, H - 64, 32, 18);
        ctx.strokeStyle = 'rgba(35,25,20,0.22)';
        ctx.strokeRect(W - 260 + i * 60, H - 64, 32, 18);
      });
    })();
  </script>
</body>
</html>
