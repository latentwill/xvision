<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Single Panel Seed Generator — AGENT / FILTER / RISK</title>
  <style>
    :root {
      color-scheme: light;
    }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #efe6d2;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    #wrap {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.45), transparent 30%),
        radial-gradient(circle at 80% 15%, rgba(255,255,255,0.28), transparent 24%),
        radial-gradient(circle at 50% 90%, rgba(255,255,255,0.26), transparent 30%),
        #efe6d2;
    }
    canvas {
      display: block;
      width: min(94vmin, 1020px);
      height: min(94vmin, 1020px);
      background: #efe6d2;
      box-shadow: 0 20px 50px rgba(0,0,0,0.16);
      border: 1px solid rgba(17,17,17,0.12);
    }
    #ui {
      position: fixed;
      left: 16px;
      bottom: 16px;
      display: grid;
      gap: 10px;
      padding: 12px;
      width: min(420px, calc(100vw - 32px));
      border-radius: 14px;
      border: 1px solid rgba(17,17,17,0.14);
      background: rgba(255,255,255,0.78);
      backdrop-filter: blur(6px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    .row {
      display: grid;
      grid-template-columns: 86px 1fr;
      gap: 10px;
      align-items: start;
    }
    .label {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.16em;
      color: rgba(17,17,17,0.72);
      padding-top: 10px;
    }
    input, textarea {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid rgba(17,17,17,0.18);
      border-radius: 12px;
      background: rgba(255,255,255,0.96);
      color: #111;
      font: inherit;
      font-size: 13px;
      outline: none;
      padding: 10px 12px;
    }
    textarea {
      min-height: 72px;
      resize: vertical;
      line-height: 1.35;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    button {
      padding: 9px 12px;
      border: 1px solid rgba(17,17,17,0.16);
      border-radius: 10px;
      background: #111;
      color: #fff;
      font-size: 13px;
      cursor: pointer;
    }
    button.secondary {
      background: #fff;
      color: #111;
    }
    .hint {
      font-size: 12px;
      color: rgba(17,17,17,0.7);
      line-height: 1.35;
    }
    .hint code {
      background: rgba(17,17,17,0.06);
      padding: 1px 5px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div id="wrap"><canvas id="c"></canvas></div>

  <div id="ui">
    <div class="row">
      <div class="label">AGENT</div>
      <textarea id="agent" spellcheck="false">atlas, vector, hush</textarea>
    </div>
    <div class="row">
      <div class="label">FILTER</div>
      <input id="filter" value="threshold-01" spellcheck="false" />
    </div>
    <div class="row">
      <div class="label">RISK</div>
      <input id="risk" value="volatile-07" spellcheck="false" />
    </div>
    <div class="actions">
      <button id="rerender">Rerender</button>
      <button id="randomize" class="secondary">Randomize</button>
      <span class="hint">AGENT accepts comma / newline separated seeds. URL params: <code>?agent=...</code>&nbsp;<code>&filter=...</code>&nbsp;<code>&risk=...</code></span>
    </div>
  </div>

<script>
(() => {
  const SIZE = 1000;
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const agentInput = document.getElementById('agent');
  const filterInput = document.getElementById('filter');
  const riskInput = document.getElementById('risk');
  const rerenderBtn = document.getElementById('rerender');
  const randomizeBtn = document.getElementById('randomize');

  canvas.width = SIZE;
  canvas.height = SIZE;

  const palette = {
    paper: '#efe6d2',
    ink: '#111111',
    mutedInk: '#2a2a2a',
    pink: '#da4d9b',
    magenta: '#a91f7f',
    cyan: '#58d5e7',
    teal: '#1e9aa1',
    blue: '#2f59e8',
    indigo: '#2836b3',
    orange: '#f08c2c',
    amber: '#d7a52a',
    olive: '#67743c',
    red: '#cf3a2d',
    white: 'rgba(255,255,255,0.42)'
  };

  function hashString(str) {
    let h = 2166136261 >>> 0;
    for (let i = 0; i < str.length; i++) {
      h ^= str.charCodeAt(i);
      h = Math.imul(h, 16777619);
    }
    return h >>> 0;
  }

  function mulberry32(seed) {
    return function() {
      let t = seed += 0x6D2B79F5;
      t = Math.imul(t ^ (t >>> 15), t | 1);
      t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  function rngFrom(...parts) {
    return mulberry32(hashString(parts.join('::')));
  }

  function parseAgentSeeds(text) {
    return text
      .split(/[\n,;|]+/)
      .map(s => s.trim())
      .filter(Boolean);
  }

  function clamp(v, a, b) {
    return Math.max(a, Math.min(b, v));
  }

  function pick(rng, arr) {
    return arr[Math.floor(rng() * arr.length)];
  }

  function rr(rng, a, b) {
    return a + (b - a) * rng();
  }

  function rint(rng, a, b) {
    return Math.floor(rr(rng, a, b + 1));
  }

  function addNoise(rng, amount, alphaMin, alphaMax, sizeMin = 1, sizeMax = 2) {
    for (let i = 0; i < amount; i++) {
      const x = rng() * SIZE;
      const y = rng() * SIZE;
      const s = rr(rng, sizeMin, sizeMax);
      ctx.fillStyle = `rgba(0,0,0,${rr(rng, alphaMin, alphaMax)})`;
      ctx.fillRect(x, y, s, s);
    }
  }

  function drawPaper(baseRng) {
    const g = ctx.createLinearGradient(0, 0, SIZE, SIZE);
    g.addColorStop(0, '#f3ead8');
    g.addColorStop(0.45, '#efe6d2');
    g.addColorStop(1, '#e3d5ba');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, SIZE, SIZE);

    // Broad atmospheric stains.
    for (let i = 0; i < 16; i++) {
      const x = rr(baseRng, -120, SIZE + 120);
      const y = rr(baseRng, -120, SIZE + 120);
      const r = rr(baseRng, 120, 320);
      const hue = pick(baseRng, [palette.pink, palette.cyan, palette.orange, palette.blue, palette.olive, '#fff6e9']);
      const grad = ctx.createRadialGradient(x, y, 0, x, y, r);
      grad.addColorStop(0, `${hue}33`);
      grad.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
    }

    addNoise(baseRng, 3800, 0.012, 0.05, 1, 1.3);
  }

  function drawFrame() {
    ctx.save();
    ctx.strokeStyle = 'rgba(17,17,17,0.54)';
    ctx.lineWidth = 2;
    ctx.strokeRect(24, 24, SIZE - 48, SIZE - 48);
    ctx.strokeStyle = 'rgba(17,17,17,0.14)';
    ctx.lineWidth = 1;
    ctx.strokeRect(36, 36, SIZE - 72, SIZE - 72);
    ctx.restore();
  }

  function drawAxisLabels(agentSeeds, filterSeed, riskSeed) {
    ctx.save();
    ctx.fillStyle = 'rgba(17,17,17,0.92)';
    ctx.font = '800 36px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
    ctx.textBaseline = 'top';

    ctx.textAlign = 'left';
    ctx.fillText('AGENT', 54, 50);

    ctx.textAlign = 'center';
    ctx.fillText('FILTER', SIZE / 2, 50);

    ctx.save();
    ctx.translate(952, 54);
    ctx.rotate(Math.PI / 2);
    ctx.textAlign = 'left';
    ctx.fillText('RISK', 0, 0);
    ctx.restore();

    ctx.font = '600 12px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace';
    ctx.fillStyle = 'rgba(17,17,17,0.7)';
    ctx.textAlign = 'left';
    ctx.fillText(`agent seeds: ${agentSeeds.join(' · ') || '(none)'}`, 58, 96);
    ctx.fillText(`filter seed: ${filterSeed}`, 58, 918);
    ctx.textAlign = 'right';
    ctx.fillText(`risk seed: ${riskSeed}`, 944, 96);
    ctx.restore();
  }

  function drawAxisBands(agentRng, filterRng, riskRng, riskLevel) {
    // Vertical agent rail.
    ctx.save();
    ctx.globalAlpha = 0.9;
    ctx.fillStyle = 'rgba(17,17,17,0.04)';
    ctx.fillRect(44, 120, 120, 760);
    ctx.fillStyle = 'rgba(255,255,255,0.24)';
    ctx.fillRect(56, 132, 12, 736);
    ctx.fillRect(90, 150, 10, 700);
    ctx.fillRect(126, 160, 8, 690);
    ctx.fillStyle = 'rgba(17,17,17,0.08)';
    for (let i = 0; i < 26; i++) {
      const y = 136 + i * 27 + rr(agentRng, -2, 2);
      ctx.fillRect(44, y, rr(agentRng, 30, 90), rr(agentRng, 2, 6));
    }
    ctx.restore();

    // Horizontal filter rail.
    ctx.save();
    ctx.globalAlpha = 0.92;
    ctx.fillStyle = 'rgba(17,17,17,0.035)';
    ctx.fillRect(150, 56, 690, 88);
    for (let i = 0; i < 18; i++) {
      const x = 160 + i * 36 + rr(filterRng, -4, 4);
      const w = rr(filterRng, 14, 34);
      ctx.fillStyle = i % 2 === 0 ? 'rgba(255,255,255,0.25)' : 'rgba(17,17,17,0.08)';
      ctx.fillRect(x, 66 + rr(filterRng, -4, 6), w, rr(filterRng, 14, 34));
    }
    ctx.strokeStyle = 'rgba(17,17,17,0.16)';
    ctx.lineWidth = 1;
    ctx.strokeRect(154, 60, 682, 80);
    ctx.restore();

    // Diagonal risk rail.
    ctx.save();
    ctx.translate(800, 790);
    ctx.rotate(-0.78539816339);
    ctx.fillStyle = 'rgba(17,17,17,0.04)';
    ctx.fillRect(-30, -30, 360, 88);
    for (let i = 0; i < 18; i++) {
      const x = i * 18 + rr(riskRng, -4, 4);
      const h = rr(riskRng, 18, 58) * (0.4 + riskLevel * 0.9);
      ctx.fillStyle = i % 3 === 0 ? 'rgba(207,58,45,0.38)' : 'rgba(17,17,17,0.18)';
      ctx.fillRect(x, -h * 0.5, rr(riskRng, 8, 16), h);
    }
    ctx.restore();
  }

  function drawContourModule(rng, x, y, s, colors) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rr(rng, -0.22, 0.22));
    ctx.strokeStyle = 'rgba(17,17,17,0.62)';
    ctx.lineWidth = 1.15;
    for (let i = 0; i < 20; i++) {
      const t = i / 19;
      const w = s * (1 - t * 0.78);
      const h = w * rr(rng, 0.72, 1.06);
      const ox = rr(rng, -5, 5);
      const oy = rr(rng, -5, 5);
      ctx.strokeStyle = pick(rng, colors);
      ctx.globalAlpha = 0.14 + t * 0.16;
      ctx.strokeRect(-w / 2 + ox, -h / 2 + oy, w, h);
    }
    ctx.restore();
  }

  function drawOrbitModule(rng, x, y, s, colors) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rr(rng, -0.25, 0.25));
    const rings = rint(rng, 4, 9);
    for (let i = 0; i < rings; i++) {
      const t = i / Math.max(1, rings - 1);
      ctx.globalAlpha = 0.14 + t * 0.18;
      ctx.strokeStyle = pick(rng, colors);
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.ellipse(0, 0, s * (0.47 - t * 0.12), s * (0.22 + t * 0.05), rr(rng, -0.4, 0.4), 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.globalAlpha = 0.9;
    for (let i = 0; i < 10; i++) {
      const a = (Math.PI * 2 * i) / 10 + rr(rng, -0.2, 0.2);
      const r = s * rr(rng, 0.18, 0.42);
      ctx.fillStyle = pick(rng, colors);
      ctx.fillRect(Math.cos(a) * r - 2, Math.sin(a) * r - 2, rr(rng, 4, 12), rr(rng, 4, 12));
    }
    ctx.restore();
  }

  function drawMatrixModule(rng, x, y, s, colors) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rr(rng, -0.1, 0.1));
    const cols = rint(rng, 5, 9);
    const rows = rint(rng, 4, 8);
    const cellW = s / cols;
    const cellH = s / rows;
    ctx.strokeStyle = 'rgba(17,17,17,0.42)';
    ctx.lineWidth = 1;
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const fx = c * cellW;
        const fy = r * cellH;
        const fillChance = 0.22 + (r + c) / (rows + cols) * 0.24;
        if (rng() < fillChance) {
          ctx.fillStyle = pick(rng, colors);
          ctx.globalAlpha = rr(rng, 0.18, 0.74);
          ctx.fillRect(fx + rr(rng, 2, 8), fy + rr(rng, 2, 8), cellW * rr(rng, 0.22, 0.92), cellH * rr(rng, 0.18, 0.85));
        }
        if (rng() < 0.45) {
          ctx.globalAlpha = 0.23;
          ctx.strokeRect(fx + 0.5, fy + 0.5, cellW - 1, cellH - 1);
        }
      }
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  function drawBeamModule(rng, x, y, s, colors) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rr(rng, -0.65, 0.65));
    const bars = rint(rng, 5, 11);
    for (let i = 0; i < bars; i++) {
      const a = i / Math.max(1, bars - 1);
      const w = s * rr(rng, 0.08, 0.24);
      const h = s * rr(rng, 0.6, 1.1) * (0.4 + a * 0.7);
      const px = -s * 0.5 + a * s * 0.96 + rr(rng, -8, 8);
      const py = -h / 2 + rr(rng, -10, 10);
      ctx.globalAlpha = 0.16 + a * 0.14;
      ctx.fillStyle = pick(rng, colors);
      ctx.fillRect(px, py, w, h);
    }
    ctx.globalAlpha = 0.85;
    ctx.strokeStyle = 'rgba(17,17,17,0.58)';
    ctx.lineWidth = 1.3;
    ctx.beginPath();
    ctx.moveTo(-s * 0.45, 0);
    ctx.lineTo(s * 0.45, 0);
    ctx.stroke();
    ctx.restore();
  }

  function drawLatticeModule(rng, x, y, s, colors) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rr(rng, -0.18, 0.18));
    const n = rint(rng, 6, 10);
    const gap = s / (n - 1);
    for (let i = 0; i < n; i++) {
      for (let j = 0; j < n; j++) {
        const px = -s / 2 + i * gap;
        const py = -s / 2 + j * gap;
        const use = rng() < 0.28 + Math.abs(i - j) / (n * 2.2);
        if (use) {
          ctx.fillStyle = pick(rng, colors);
          ctx.globalAlpha = rr(rng, 0.18, 0.72);
          ctx.fillRect(px - 2, py - 2, rr(rng, 5, 13), rr(rng, 5, 13));
        }
        if (rng() < 0.48) {
          ctx.strokeStyle = 'rgba(17,17,17,0.18)';
          ctx.globalAlpha = 0.3;
          ctx.strokeRect(px - 3, py - 3, 6, 6);
        }
      }
    }
    ctx.restore();
  }

  function drawSigilModule(rng, x, y, s, colors) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rr(rng, -0.55, 0.55));
    const steps = rint(rng, 10, 18);
    for (let i = 0; i < steps; i++) {
      const t = i / Math.max(1, steps - 1);
      const w = s * (1 - t * 0.82);
      ctx.globalAlpha = 0.12 + t * 0.16;
      ctx.strokeStyle = pick(rng, colors);
      ctx.lineWidth = 1.1;
      ctx.strokeRect(-w / 2, -w / 2, w, w);
      if (i % 3 === 0) {
        ctx.fillStyle = pick(rng, colors);
        ctx.fillRect(-w * 0.42, -2, w * 0.84, 4);
        ctx.fillRect(-2, -w * 0.42, 4, w * 0.84);
      }
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  function drawModuleType(rng, type, x, y, s, colors) {
    if (type === 'contour') drawContourModule(rng, x, y, s, colors);
    else if (type === 'orbit') drawOrbitModule(rng, x, y, s, colors);
    else if (type === 'matrix') drawMatrixModule(rng, x, y, s, colors);
    else if (type === 'beam') drawBeamModule(rng, x, y, s, colors);
    else if (type === 'lattice') drawLatticeModule(rng, x, y, s, colors);
    else drawSigilModule(rng, x, y, s, colors);
  }

  function drawAgentModules(agentSeeds, filterSeed, riskSeed, riskLevel) {
    const filterRng = rngFrom('filter-layout', filterSeed);
    const riskRng = rngFrom('risk-layout', riskSeed);
    const moduleTypes = ['contour', 'orbit', 'matrix', 'beam', 'lattice', 'sigil'];
    const baseCount = agentSeeds.length || 1;
    const derivedSeeds = agentSeeds.length ? agentSeeds : ['agent-default'];
    const modules = [];

    // If only one seed is provided, we still generate a modular swarm from it.
    const swarmCount = derivedSeeds.length === 1 ? 5 : derivedSeeds.length;

    for (let i = 0; i < swarmCount; i++) {
      const seed = derivedSeeds[i % derivedSeeds.length];
      const moduleRng = rngFrom('agent-module', seed, String(i));
      const type = moduleTypes[(hashString(seed) + i + Math.floor(moduleRng() * 7)) % moduleTypes.length];
      const angleBias = rr(filterRng, -0.4, 0.4) + (i / Math.max(1, swarmCount)) * Math.PI * 2.0;
      const orbit = rr(moduleRng, 90, 260) * (0.55 + riskLevel * 0.85);
      const wobble = rr(riskRng, 0.8, 1.5) * (0.28 + riskLevel * 0.8);
      const x = SIZE / 2 + Math.cos(angleBias) * orbit + rr(moduleRng, -32, 32) * wobble;
      const y = SIZE / 2 + Math.sin(angleBias) * orbit + rr(moduleRng, -32, 32) * wobble;
      const s = rr(moduleRng, 145, 275) * (0.8 + riskLevel * 0.32);
      modules.push({ seed, moduleRng, type, x, y, s });
    }

    // Foundation halos / anchors.
    ctx.save();
    ctx.globalCompositeOperation = 'multiply';
    for (const mod of modules) {
      const g = ctx.createRadialGradient(mod.x, mod.y, 0, mod.x, mod.y, mod.s * 0.9);
      g.addColorStop(0, `rgba(255,255,255,${0.09 + riskLevel * 0.04})`);
      g.addColorStop(0.35, `rgba(17,17,17,${0.04 + riskLevel * 0.03})`);
      g.addColorStop(1, 'rgba(17,17,17,0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(mod.x, mod.y, mod.s * 0.9, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();

    for (const mod of modules) {
      const moduleRng = mod.moduleRng;
      const c = pick(moduleRng, [
        [palette.pink, palette.cyan, palette.ink, palette.orange],
        [palette.blue, palette.pink, palette.white, palette.ink],
        [palette.teal, palette.orange, palette.ink, palette.white],
        [palette.indigo, palette.cyan, palette.orange, palette.ink],
        [palette.red, palette.amber, palette.ink, palette.white],
        [palette.olive, palette.cyan, palette.pink, palette.ink],
      ]);
      const localRisk = clamp(riskLevel + rr(moduleRng, -0.08, 0.18), 0, 1);

      // Outer shell.
      ctx.save();
      ctx.translate(mod.x, mod.y);
      const shellSkew = rr(moduleRng, -0.18, 0.18) * (0.25 + localRisk);
      ctx.transform(1, shellSkew * 0.5, shellSkew * 0.2, 1, 0, 0);
      ctx.globalAlpha = 0.9;
      ctx.fillStyle = 'rgba(255,255,255,0.24)';
      ctx.fillRect(-mod.s * 0.5, -mod.s * 0.5, mod.s, mod.s);
      ctx.globalAlpha = 1;
      ctx.strokeStyle = 'rgba(17,17,17,0.58)';
      ctx.lineWidth = 1.2;
      ctx.strokeRect(-mod.s * 0.5, -mod.s * 0.5, mod.s, mod.s);
      ctx.restore();

      // Nested composition clipped to the module shell.
      ctx.save();
      ctx.beginPath();
      ctx.rect(mod.x - mod.s * 0.5, mod.y - mod.s * 0.5, mod.s, mod.s);
      ctx.clip();
      drawModuleType(moduleRng, mod.type, mod.x, mod.y, mod.s * rr(moduleRng, 0.72, 0.9), c);

      // Micro-agent substructure: 3-7 nested submodules per agent seed.
      const subCount = rint(moduleRng, 3, 7);
      for (let i = 0; i < subCount; i++) {
        const subType = moduleTypes[(i + rint(moduleRng, 0, 10)) % moduleTypes.length];
        const subRng = rngFrom('agent-sub', mod.seed, String(i), mod.type);
        const tx = mod.x + rr(subRng, -mod.s * 0.22, mod.s * 0.22);
        const ty = mod.y + rr(subRng, -mod.s * 0.22, mod.s * 0.22);
        const ss = mod.s * rr(subRng, 0.18, 0.36) * (0.8 + localRisk * 0.55);
        ctx.save();
        ctx.globalAlpha = 0.9;
        ctx.translate(tx, ty);
        ctx.rotate(rr(subRng, -0.7, 0.7));
        ctx.strokeStyle = 'rgba(17,17,17,0.25)';
        ctx.lineWidth = 1;
        if (subType === 'beam') {
          ctx.fillStyle = pick(subRng, c);
          ctx.fillRect(-ss * 0.5, -ss * 0.12, ss, ss * 0.24);
        } else if (subType === 'matrix') {
          const cell = ss / 4;
          for (let yy = -2; yy < 2; yy++) {
            for (let xx = -2; xx < 2; xx++) {
              if (subRng() < 0.55) {
                ctx.fillStyle = pick(subRng, c);
                ctx.globalAlpha = rr(subRng, 0.18, 0.7);
                ctx.fillRect(xx * cell, yy * cell, cell * rr(subRng, 0.4, 0.92), cell * rr(subRng, 0.4, 0.92));
              }
            }
          }
        } else if (subType === 'orbit') {
          ctx.globalAlpha = 0.3;
          ctx.beginPath();
          ctx.ellipse(0, 0, ss * 0.5, ss * 0.28, rr(subRng, -0.4, 0.4), 0, Math.PI * 2);
          ctx.stroke();
          ctx.fillStyle = pick(subRng, c);
          ctx.fillRect(-2, -2, 4, 4);
          ctx.fillRect(ss * 0.35, 0, 5, 5);
        } else if (subType === 'contour') {
          for (let j = 0; j < 6; j++) {
            const t = j / 5;
            const w = ss * (1 - t * 0.62);
            ctx.globalAlpha = 0.18 + t * 0.12;
            ctx.strokeStyle = pick(subRng, c);
            ctx.strokeRect(-w / 2, -w / 2, w, w);
          }
        } else if (subType === 'lattice') {
          for (let yy = -2; yy <= 2; yy++) {
            for (let xx = -2; xx <= 2; xx++) {
              if (subRng() < 0.46) {
                ctx.fillStyle = pick(subRng, c);
                ctx.globalAlpha = rr(subRng, 0.2, 0.68);
                ctx.fillRect(xx * ss * 0.22, yy * ss * 0.22, 5, 5);
              }
            }
          }
        } else {
          ctx.strokeStyle = pick(subRng, c);
          ctx.globalAlpha = 0.3;
          ctx.lineWidth = 1.1;
          ctx.strokeRect(-ss * 0.35, -ss * 0.35, ss * 0.7, ss * 0.7);
          ctx.fillStyle = pick(subRng, c);
          ctx.fillRect(-ss * 0.08, -ss * 0.02, ss * 0.16, ss * 0.04);
        }
        ctx.restore();
      }
      ctx.restore();

      // Seed tag on each agent module.
      ctx.save();
      ctx.translate(mod.x, mod.y + mod.s * 0.58);
      ctx.fillStyle = 'rgba(17,17,17,0.85)';
      ctx.font = '700 10px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText(mod.seed, 0, 0);
      ctx.restore();
    }
  }

  function drawFilterOverlay(filterSeed) {
    const rng = rngFrom('filter-overlay', filterSeed);
    const angle = rr(rng, -0.55, 0.55);
    const spacing = rint(rng, 34, 88);
    const opacity = rr(rng, 0.12, 0.28);
    const filterMode = pick(rng, ['bands', 'window', 'mesh', 'stencil']);

    ctx.save();
    ctx.translate(SIZE / 2, SIZE / 2);
    ctx.rotate(angle);
    ctx.translate(-SIZE / 2, -SIZE / 2);

    if (filterMode === 'bands') {
      for (let x = -SIZE; x < SIZE * 1.5; x += spacing) {
        const width = rr(rng, 12, 42);
        const alpha = opacity * (0.3 + rng() * 0.9);
        ctx.fillStyle = `rgba(17,17,17,${alpha})`;
        ctx.fillRect(x, -60, width, SIZE + 120);
        if (rng() < 0.4) {
          ctx.fillStyle = `rgba(255,255,255,${alpha * 1.3})`;
          ctx.fillRect(x + width * 0.14, -60, width * 0.18, SIZE + 120);
        }
      }
    } else if (filterMode === 'window') {
      for (let i = 0; i < 5; i++) {
        const w = rr(rng, 160, 360);
        const h = rr(rng, 120, 300);
        const x = rr(rng, 90, SIZE - 90 - w);
        const y = rr(rng, 100, SIZE - 100 - h);
        ctx.fillStyle = `rgba(255,255,255,${opacity * 1.3})`;
        ctx.fillRect(x, y, w, h);
        ctx.strokeStyle = `rgba(17,17,17,${opacity * 1.1})`;
        ctx.lineWidth = 1.2;
        ctx.strokeRect(x, y, w, h);
        for (let s = 0; s < 10; s++) {
          ctx.fillStyle = `rgba(17,17,17,${opacity * 0.7})`;
          ctx.fillRect(x + s * 12, y, 4, h);
        }
      }
    } else if (filterMode === 'mesh') {
      for (let i = 0; i < 18; i++) {
        const x = rr(rng, -80, SIZE + 60);
        const y = rr(rng, -80, SIZE + 60);
        const w = rr(rng, 180, 420);
        const h = rr(rng, 8, 20);
        ctx.fillStyle = `rgba(17,17,17,${opacity * 0.9})`;
        ctx.fillRect(x, y, w, h);
      }
      for (let i = 0; i < 10; i++) {
        const x = rr(rng, -40, SIZE + 40);
        const y = rr(rng, -40, SIZE + 40);
        const w = rr(rng, 8, 20);
        const h = rr(rng, 200, 420);
        ctx.fillStyle = `rgba(255,255,255,${opacity * 0.6})`;
        ctx.fillRect(x, y, w, h);
      }
    } else {
      // stencil
      ctx.fillStyle = `rgba(17,17,17,${opacity * 0.18})`;
      ctx.fillRect(0, 0, SIZE, SIZE);
      ctx.globalCompositeOperation = 'destination-out';
      for (let i = 0; i < 7; i++) {
        const w = rr(rng, 120, 280);
        const h = rr(rng, 90, 220);
        const x = rr(rng, 80, SIZE - 80 - w);
        const y = rr(rng, 100, SIZE - 100 - h);
        ctx.fillStyle = 'rgba(0,0,0,1)';
        ctx.fillRect(x, y, w, h);
      }
      ctx.globalCompositeOperation = 'source-over';
    }

    ctx.restore();
  }

  function drawRiskDamage(riskSeed, riskLevel) {
    const rng = rngFrom('risk-damage', riskSeed);
    const strokes = rint(rng, 9, 18 + Math.round(riskLevel * 12));
    ctx.save();
    ctx.globalCompositeOperation = 'multiply';
    for (let i = 0; i < strokes; i++) {
      const x1 = rr(rng, 40, SIZE - 40);
      const y1 = rr(rng, 40, SIZE - 40);
      const x2 = x1 + rr(rng, -240, 240) * (0.25 + riskLevel * 0.9);
      const y2 = y1 + rr(rng, -240, 240) * (0.25 + riskLevel * 0.9);
      const steps = rint(rng, 6, 14);
      const amp = rr(rng, 10, 42) * (0.3 + riskLevel);
      const pts = [];
      pts.push([x1, y1]);
      for (let s = 1; s < steps; s++) {
        const t = s / steps;
        const x = x1 + (x2 - x1) * t + rr(rng, -amp, amp);
        const y = y1 + (y2 - y1) * t + rr(rng, -amp, amp);
        pts.push([x, y]);
      }
      pts.push([x2, y2]);
      ctx.strokeStyle = i % 3 === 0 ? 'rgba(207,58,45,0.34)' : 'rgba(17,17,17,0.20)';
      ctx.lineWidth = rr(rng, 1.2, 3.4);
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(pts[0][0], pts[0][1]);
      for (let j = 1; j < pts.length; j++) ctx.lineTo(pts[j][0], pts[j][1]);
      ctx.stroke();

      // Scatter shards off the fracture.
      if (riskLevel > 0.2) {
        for (let k = 0; k < 5 + Math.round(riskLevel * 10); k++) {
          const px = rr(rng, Math.min(x1, x2), Math.max(x1, x2));
          const py = rr(rng, Math.min(y1, y2), Math.max(y1, y2));
          const w = rr(rng, 6, 22) * (0.35 + riskLevel);
          const h = rr(rng, 6, 22) * (0.35 + riskLevel);
          ctx.fillStyle = pick(rng, ['rgba(17,17,17,0.34)', 'rgba(207,58,45,0.28)', 'rgba(47,89,232,0.22)']);
          ctx.fillRect(px, py, w, h);
        }
      }
    }
    ctx.restore();
  }

  function drawCaption(agentSeeds, filterSeed, riskSeed, riskLevel) {
    const summary = [
      `AGENT ${agentSeeds.length ? agentSeeds.length : 1}x`,
      `FILTER ${filterSeed}`,
      `RISK ${riskSeed}`,
      `risk ${(riskLevel * 100).toFixed(0)}%`
    ].join('  ·  ');
    ctx.save();
    ctx.fillStyle = 'rgba(17,17,17,0.84)';
    ctx.font = '700 12px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'alphabetic';
    ctx.fillText(summary, SIZE / 2, SIZE - 54);
    ctx.restore();
  }

  function render() {
    const agentSeeds = parseAgentSeeds(agentInput.value);
    const filterSeed = filterInput.value.trim() || 'filter';
    const riskSeed = riskInput.value.trim() || 'risk';

    const masterRng = rngFrom('master', agentSeeds.join('|'), filterSeed, riskSeed);
    const baseRng = rngFrom('base', agentSeeds.join('|'), filterSeed, riskSeed);
    const agentRng = rngFrom('agent-axis', agentSeeds.join('|'));
    const filterRng = rngFrom('filter-axis', filterSeed);
    const riskRng = rngFrom('risk-axis', riskSeed);
    const riskLevel = clamp(0.15 + (hashString(riskSeed) % 1000) / 1000 * 0.85, 0.08, 0.98) * (0.65 + riskRng() * 0.35);

    ctx.clearRect(0, 0, SIZE, SIZE);
    drawPaper(baseRng);
    drawAxisBands(agentRng, filterRng, riskRng, riskLevel);
    drawAgentModules(agentSeeds, filterSeed, riskSeed, riskLevel);
    drawFilterOverlay(filterSeed);
    drawRiskDamage(riskSeed, riskLevel);

    // Accent dots / signal trails to keep the panel feeling active.
    ctx.save();
    for (let i = 0; i < 60; i++) {
      const t = i / 59;
      const x = 70 + t * 860 + rr(masterRng, -18, 18);
      const y = 500 + Math.sin(t * Math.PI * 2 + masterRng() * 2) * (120 + riskLevel * 140) + rr(masterRng, -16, 16);
      const s = rr(masterRng, 2, 8);
      ctx.fillStyle = pick(masterRng, [palette.pink, palette.cyan, palette.blue, palette.orange, palette.ink]);
      ctx.globalAlpha = 0.15 + t * 0.32;
      ctx.fillRect(x, y, s, s);
    }
    ctx.restore();

    // A very light topcoat to pull everything into one print-like piece.
    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.045)';
    ctx.fillRect(0, 0, SIZE, SIZE);
    ctx.restore();

    drawFrame();
    drawAxisLabels(agentSeeds, filterSeed, riskSeed);
    drawCaption(agentSeeds, filterSeed, riskSeed, riskLevel);
  }

  function randomize() {
    const token = () => Math.random().toString(36).slice(2, 8);
    const n = 1 + Math.floor(Math.random() * 4);
    const seeds = Array.from({ length: n }, () => token()).join(', ');
    agentInput.value = seeds;
    filterInput.value = `filter-${token()}`;
    riskInput.value = `risk-${token()}`;
    render();
  }

  const params = new URLSearchParams(location.search);
  const agentParam = params.get('agent') || params.get('seed') || params.get('hash');
  const filterParam = params.get('filter');
  const riskParam = params.get('risk');
  if (agentParam) agentInput.value = agentParam;
  if (filterParam) filterInput.value = filterParam;
  if (riskParam) riskInput.value = riskParam;

  rerenderBtn.addEventListener('click', render);
  randomizeBtn.addEventListener('click', randomize);
  agentInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) render();
  });
  filterInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') render();
  });
  riskInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') render();
  });

  render();
})();
</script>
</body>
</html>
