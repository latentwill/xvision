<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>4x4 Abstract Collage</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f5eddc;
    }
    body {
      display: grid;
      place-items: center;
    }
    canvas {
      width: min(96vmin, 1200px);
      height: min(96vmin, 1200px);
      display: block;
      box-shadow: 0 18px 40px rgba(0,0,0,0.12);
      background: #f5eddc;
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const S = 1600;
  canvas.width = S;
  canvas.height = S;

  const P = {
    paper: '#f5eddc',
    ink: '#111111',
    pink: '#d73f9b',
    magenta: '#a61d79',
    cyan: '#4bd0e5',
    teal: '#22939a',
    blue: '#3053d8',
    orange: '#ef8a2c',
    gray: '#747474',
  };
  const palette = [P.pink, P.magenta, P.cyan, P.teal, P.blue, P.orange, P.ink, P.gray];

  let seed = 424242;
  function rnd() {
    seed = (seed * 1664525 + 1013904223) >>> 0;
    return seed / 4294967296;
  }
  const r = (a, b) => a + (b - a) * rnd();
  const pick = arr => arr[Math.floor(rnd() * arr.length)];

  function paperNoise(x, y, w, h, n = 250) {
    for (let i = 0; i < n; i++) {
      ctx.fillStyle = `rgba(0,0,0,${r(0.01, 0.05)})`;
      ctx.fillRect(x + rnd() * w, y + rnd() * h, 1, 1);
    }
  }

  function regMarks(x, y, s) {
    ctx.strokeStyle = 'rgba(17,17,17,0.45)';
    ctx.lineWidth = 1.1;
    const m = 18, l = 16;
    const pts = [
      [x + m, y + m, 1, 1], [x + s - m, y + m, -1, 1],
      [x + m, y + s - m, 1, -1], [x + s - m, y + s - m, -1, -1],
    ];
    for (const [px, py, dx, dy] of pts) {
      ctx.beginPath();
      ctx.moveTo(px, py); ctx.lineTo(px + dx * l, py);
      ctx.moveTo(px, py); ctx.lineTo(px, py + dy * l);
      ctx.stroke();
    }
  }

  function swatches(x, y, vertical = true) {
    const cols = [P.pink, P.cyan, P.blue, P.orange, P.ink];
    for (let i = 0; i < cols.length; i++) {
      ctx.fillStyle = cols[i];
      if (vertical) ctx.fillRect(x, y + i * 17, 11, 13);
      else ctx.fillRect(x + i * 17, y, 13, 11);
    }
  }

  function clipPanel(x, y, s) {
    ctx.save();
    ctx.beginPath();
    ctx.rect(x, y, s, s);
    ctx.clip();
  }

  function squares(x, y, s) {
    const cx = x + s / 2, cy = y + s / 2;
    for (let i = 0; i < 18; i++) {
      const t = i / 17;
      const sz = s * (0.95 - t * 0.78);
      ctx.save();
      ctx.translate(cx + r(-10, 10), cy + r(-10, 10));
      ctx.rotate(t * 0.18 + r(-0.08, 0.08));
      ctx.globalAlpha = 0.24 + t * 0.18;
      ctx.fillStyle = pick(palette);
      ctx.fillRect(-sz / 2, -sz / 2, sz, sz * r(0.66, 0.98));
      if (i % 3 === 0) {
        ctx.fillStyle = P.ink;
        ctx.globalAlpha = 0.5;
        ctx.fillRect(-sz * 0.43, -sz * 0.05, sz * 0.86, sz * 0.1);
      }
      if (i % 4 === 0) {
        ctx.fillStyle = pick([P.pink, P.cyan, P.orange]);
        ctx.globalAlpha = 0.42;
        ctx.fillRect(-sz * 0.06, -sz * 0.42, sz * 0.12, sz * 0.84);
      }
      ctx.restore();
    }
  }

  function xshape(x, y, s) {
    const cx = x + s / 2, cy = y + s / 2;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(Math.PI / 4);
    const w = s * 0.18;
    ctx.fillStyle = P.ink;
    ctx.fillRect(-s * 0.5, -w / 2, s, w);
    ctx.fillRect(-w / 2, -s * 0.5, w, s);
    ctx.globalAlpha = 0.92;
    ctx.fillStyle = P.cyan;
    ctx.fillRect(-s * 0.5, -w / 2 - 6, s, 6);
    ctx.fillRect(-w / 2 - 6, -s * 0.5, 6, s);
    ctx.fillStyle = P.pink;
    ctx.fillRect(-s * 0.5, w / 2, s, 6);
    ctx.fillRect(w / 2, -s * 0.5, 6, s);
    ctx.restore();
    ctx.globalAlpha = 1;
  }

  function contours(x, y, s) {
    const cx = x + s / 2, cy = y + s / 2;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(r(-0.16, 0.16));
    ctx.strokeStyle = 'rgba(17,17,17,0.66)';
    ctx.lineWidth = 1.1;
    for (let i = 0; i < 18; i++) {
      const t = i / 17;
      const ss = s * (0.92 - t * 0.72);
      ctx.strokeRect(-ss / 2, -ss / 2, ss, ss * r(0.84, 1.02));
    }
    ctx.restore();
  }

  function facets(x, y, s) {
    const cx = x + s / 2, cy = y + s / 2;
    const pts = [];
    for (let i = 0; i < 38; i++) {
      const a = (Math.PI * 2 * i) / 38;
      const rr = s * r(0.24, 0.47);
      pts.push([cx + Math.cos(a) * rr, cy + Math.sin(a) * rr]);
    }
    for (let i = 0; i < 210; i++) {
      const a = pick(pts), b = pick(pts), c = pick(pts);
      ctx.fillStyle = pick([
        'rgba(217,60,159,0.52)',
        'rgba(75,208,229,0.52)',
        'rgba(48,83,216,0.48)',
        'rgba(239,138,44,0.46)',
        'rgba(17,17,17,0.38)'
      ]);
      ctx.beginPath();
      ctx.moveTo(a[0], a[1]);
      ctx.lineTo(b[0], b[1]);
      ctx.lineTo(c[0], c[1]);
      ctx.closePath();
      ctx.fill();
    }
  }

  function blocks(x, y, s) {
    const n = 6 + Math.floor(rnd() * 9);
    for (let i = 0; i < n; i++) {
      const w = r(s * 0.08, s * 0.26);
      const h = r(s * 0.08, s * 0.23);
      const px = x + r(18, s - 18 - w);
      const py = y + r(18, s - 18 - h);
      ctx.fillStyle = pick([P.pink, P.cyan, P.blue, P.orange, P.ink]);
      ctx.globalAlpha = r(0.38, 0.82);
      ctx.fillRect(px, py, w, h);
      if (i % 2 === 0) {
        ctx.globalAlpha = 0.26;
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(px + 4, py + 4, w * 0.72, h * 0.22);
      }
    }
    ctx.globalAlpha = 1;
  }

  function rings(x, y, s) {
    const cx = x + s / 2, cy = y + s / 2;
    ctx.save();
    ctx.translate(cx, cy);
    for (let i = 0; i < 14; i++) {
      ctx.rotate(0.07);
      ctx.fillStyle = pick([P.ink, P.blue, P.pink, P.cyan, P.orange]);
      ctx.globalAlpha = 0.16 + i * 0.03;
      const ww = s * 0.72 - i * 10;
      ctx.fillRect(-ww / 2, -s * 0.02, ww, s * 0.06);
    }
    ctx.globalAlpha = 0.35;
    ctx.strokeStyle = P.ink;
    ctx.lineWidth = 1.1;
    ctx.beginPath();
    ctx.ellipse(0, 0, s * 0.28, s * 0.18, 0.18, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
    ctx.globalAlpha = 1;
  }

  function spiral(x, y, s) {
    const cx = x + s / 2, cy = y + s / 2;
    ctx.save();
    ctx.translate(cx, cy);
    let rr = s * 0.42;
    for (let i = 0; i < 42; i++) {
      ctx.rotate(0.05);
      ctx.strokeStyle = pick([P.ink, P.pink, P.cyan, P.blue, P.orange]);
      ctx.globalAlpha = 0.14 + i * 0.012;
      ctx.strokeRect(-rr / 2, -rr / 2, rr, rr);
      rr *= 0.94;
    }
    ctx.restore();
    ctx.globalAlpha = 1;
  }

  function diagonalField(x, y, s) {
    const cx = x + s / 2, cy = y + s / 2;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(r(-0.14, 0.14));
    ctx.globalAlpha = 0.78;
    ctx.fillStyle = pick([P.pink, P.cyan, P.blue, P.orange, P.ink]);
    ctx.beginPath();
    ctx.moveTo(-s * 0.5, -s * 0.2);
    ctx.lineTo(-s * 0.1, -s * 0.5);
    ctx.lineTo(s * 0.5, s * 0.2);
    ctx.lineTo(s * 0.1, s * 0.5);
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 0.44;
    ctx.fillStyle = P.ink;
    ctx.beginPath();
    ctx.moveTo(-s * 0.28, s * 0.48);
    ctx.lineTo(s * 0.48, -s * 0.28);
    ctx.lineTo(s * 0.28, -s * 0.48);
    ctx.lineTo(-s * 0.48, s * 0.28);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
    ctx.globalAlpha = 1;
  }

  function panel(x, y, s, index) {
    ctx.fillStyle = P.paper;
    ctx.fillRect(x, y, s, s);
    paperNoise(x, y, s, s, 320);
    regMarks(x, y, s);

    // some panels get swatches, matching the reference sheet aesthetic
    if (index % 3 !== 1) {
      if (index % 2 === 0) swatches(x + s - 28, y + 24, true);
      else swatches(x + 22, y + s - 24, false);
    }

    clipPanel(x, y, s);
    const type = index % 8;
    if (type === 0) squares(x, y, s);
    if (type === 1) xshape(x, y, s);
    if (type === 2) facets(x, y, s);
    if (type === 3) contours(x, y, s);
    if (type === 4) blocks(x, y, s);
    if (type === 5) rings(x, y, s);
    if (type === 6) spiral(x, y, s);
    if (type === 7) diagonalField(x, y, s);

    // accent overlays to keep the set coherent and print-like
    ctx.globalAlpha = 0.18;
    ctx.fillStyle = index % 2 === 0 ? P.cyan : P.pink;
    ctx.fillRect(x + 12, y + 12, s - 24, 2);
    ctx.fillRect(x + 12, y + s - 14, s - 24, 2);
    ctx.globalAlpha = 1;

    ctx.restore();
  }

  function render() {
    ctx.fillStyle = P.paper;
    ctx.fillRect(0, 0, S, S);

    const pad = 26;
    const gap = 18;
    const s = (S - pad * 2 - gap * 3) / 4;

    // grid lines and gutter shading for the print sheet look
    ctx.fillStyle = 'rgba(255,255,255,0.72)';
    ctx.fillRect(pad - 4, pad - 4, S - (pad - 4) * 2, S - (pad - 4) * 2);

    let idx = 0;
    for (let row = 0; row < 4; row++) {
      for (let col = 0; col < 4; col++) {
        const x = pad + col * (s + gap);
        const y = pad + row * (s + gap);
        panel(x, y, s, idx++);
      }
    }

    // outer marks, slightly stronger like a proof sheet
    ctx.strokeStyle = 'rgba(17,17,17,0.08)';
    ctx.lineWidth = 1;
    for (let i = 1; i < 4; i++) {
      ctx.beginPath();
      ctx.moveTo(pad, pad + i * (s + gap) - gap / 2);
      ctx.lineTo(S - pad, pad + i * (s + gap) - gap / 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(pad + i * (s + gap) - gap / 2, pad);
      ctx.lineTo(pad + i * (s + gap) - gap / 2, S - pad);
      ctx.stroke();
    }
  }

  render();
})();
</script>
</body>
</html>
