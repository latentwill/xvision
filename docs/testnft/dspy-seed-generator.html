<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DSPy Seed Generator — AGENT / FILTER / RISK</title>
  <style>
    :root { color-scheme: light; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #efe4cf;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    #wrap {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 24% 18%, rgba(255,255,255,0.44), transparent 28%),
        radial-gradient(circle at 78% 14%, rgba(255,255,255,0.22), transparent 24%),
        radial-gradient(circle at 50% 90%, rgba(255,255,255,0.18), transparent 28%),
        #efe4cf;
    }
    canvas {
      width: min(94vmin, 1020px);
      height: min(94vmin, 1020px);
      display: block;
      background: #efe4cf;
      border: 1px solid rgba(17,17,17,0.12);
      box-shadow: 0 20px 52px rgba(0,0,0,0.16);
    }
    #ui {
      position: fixed;
      left: 16px;
      bottom: 16px;
      width: min(460px, calc(100vw - 32px));
      display: grid;
      gap: 10px;
      padding: 12px;
      background: rgba(255,255,255,0.78);
      border: 1px solid rgba(17,17,17,0.14);
      border-radius: 14px;
      backdrop-filter: blur(6px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    .row { display: grid; grid-template-columns: 92px 1fr; gap: 10px; align-items: start; }
    .label {
      padding-top: 10px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.16em;
      color: rgba(17,17,17,0.7);
    }
    input, textarea {
      width: 100%;
      box-sizing: border-box;
      border-radius: 12px;
      border: 1px solid rgba(17,17,17,0.18);
      background: rgba(255,255,255,0.96);
      color: #111;
      font: inherit;
      font-size: 13px;
      padding: 10px 12px;
      outline: none;
    }
    textarea { min-height: 72px; resize: vertical; line-height: 1.35; }
    .actions { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    button {
      padding: 9px 12px;
      border-radius: 10px;
      border: 1px solid rgba(17,17,17,0.16);
      background: #111;
      color: #fff;
      cursor: pointer;
      font-size: 13px;
    }
    button.secondary { background: #fff; color: #111; }
    .hint {
      font-size: 12px;
      color: rgba(17,17,17,0.68);
      line-height: 1.35;
    }
    .hint code {
      background: rgba(17,17,17,0.06);
      border-radius: 6px;
      padding: 1px 5px;
    }
  </style>
</head>
<body>
  <div id="wrap"><canvas id="c"></canvas></div>

  <div id="ui">
    <div class="row">
      <div class="label">AGENT</div>
      <textarea id="agent" spellcheck="false">atlas, vector, hush</textarea>
    </div>
    <div class="row">
      <div class="label">DSPY</div>
      <textarea id="dspy" spellcheck="false">score=0.84, gain=0.13, cost=0.42, latency=1.7, steps=24, tokens=1870, trial=0.91, delta=0.18</textarea>
    </div>
    <div class="row">
      <div class="label">FILTER</div>
      <input id="filter" value="threshold-01" spellcheck="false" />
    </div>
    <div class="row">
      <div class="label">RISK</div>
      <input id="risk" value="volatile-07" spellcheck="false" />
    </div>
    <div class="actions">
      <button id="rerender">Rerender</button>
      <button id="randomize" class="secondary">Randomize</button>
      <span class="hint">DSPy numbers are parsed and turned into <code>density</code>, <code>fracture</code>, <code>contrast</code>, and <code>rhythm</code>.</span>
    </div>
  </div>

<script>
(() => {
  const SIZE = 1000;
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const agentInput = document.getElementById('agent');
  const dspyInput = document.getElementById('dspy');
  const filterInput = document.getElementById('filter');
  const riskInput = document.getElementById('risk');
  const rerenderBtn = document.getElementById('rerender');
  const randomizeBtn = document.getElementById('randomize');

  canvas.width = SIZE;
  canvas.height = SIZE;

  const palette = {
    paper: '#efe4cf', ink: '#111111', pink: '#d64d98', cyan: '#53d1e3', blue: '#385ce3', orange: '#ef8b2e', teal: '#1f9aa0', red: '#d24d3c', olive: '#6a783f', white: 'rgba(255,255,255,0.45)'
  };

  function hashString(str) {
    let h = 2166136261 >>> 0;
    for (let i = 0; i < str.length; i++) {
      h ^= str.charCodeAt(i);
      h = Math.imul(h, 16777619);
    }
    return h >>> 0;
  }

  function mulberry32(seed) {
    return function() {
      let t = seed += 0x6D2B79F5;
      t = Math.imul(t ^ (t >>> 15), t | 1);
      t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  function rngFrom(...parts) { return mulberry32(hashString(parts.join('::'))); }
  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
  const rr = (rng, a, b) => a + (b - a) * rng();
  const pick = (rng, arr) => arr[Math.floor(rng() * arr.length)];

  function parseSeeds(text) {
    return text.split(/[\n,;|]+/).map(s => s.trim()).filter(Boolean);
  }

  function parseNumbers(text) {
    const matches = text.match(/-?\d*\.?\d+(?:e[-+]?\d+)?/gi) || [];
    return matches.map(Number).filter(n => Number.isFinite(n));
  }

  function normalizeNumbers(nums) {
    if (!nums.length) return [0.5];
    let min = Infinity, max = -Infinity;
    for (const n of nums) { if (n < min) min = n; if (n > max) max = n; }
    const span = max - min || 1;
    return nums.map(n => (n - min) / span);
  }

  function addNoise(rng, count, aMin, aMax, sizeMin = 1, sizeMax = 1.7) {
    for (let i = 0; i < count; i++) {
      const x = rng() * SIZE;
      const y = rng() * SIZE;
      const s = rr(rng, sizeMin, sizeMax);
      ctx.fillStyle = `rgba(0,0,0,${rr(rng, aMin, aMax)})`;
      ctx.fillRect(x, y, s, s);
    }
  }

  function paper(rng) {
    const g = ctx.createLinearGradient(0, 0, SIZE, SIZE);
    g.addColorStop(0, '#f3ebda');
    g.addColorStop(0.45, '#efe4cf');
    g.addColorStop(1, '#e2d4b7');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, SIZE, SIZE);
    addNoise(rng, 3600, 0.012, 0.05, 1, 1.25);
    for (let i = 0; i < 14; i++) {
      const x = rr(rng, -100, SIZE + 100);
      const y = rr(rng, -100, SIZE + 100);
      const r = rr(rng, 120, 320);
      const c = pick(rng, [palette.pink, palette.cyan, palette.blue, palette.orange, palette.olive, '#fff7ec']);
      const grad = ctx.createRadialGradient(x, y, 0, x, y, r);
      grad.addColorStop(0, `${c}24`);
      grad.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawFrame() {
    ctx.save();
    ctx.strokeStyle = 'rgba(17,17,17,0.56)';
    ctx.lineWidth = 2;
    ctx.strokeRect(24, 24, SIZE - 48, SIZE - 48);
    ctx.strokeStyle = 'rgba(17,17,17,0.14)';
    ctx.lineWidth = 1;
    ctx.strokeRect(36, 36, SIZE - 72, SIZE - 72);
    ctx.restore();
  }

  function drawAxisLabels(agentSeeds, dspyNums, filterSeed, riskSeed, profile) {
    ctx.save();
    ctx.fillStyle = 'rgba(17,17,17,0.92)';
    ctx.textBaseline = 'top';
    ctx.font = '800 36px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('AGENT', 54, 50);
    ctx.textAlign = 'center';
    ctx.fillText('DSPY', SIZE / 2, 50);
    ctx.save();
    ctx.translate(952, 54);
    ctx.rotate(Math.PI / 2);
    ctx.textAlign = 'left';
    ctx.fillText('RISK', 0, 0);
    ctx.restore();
    ctx.font = '700 11px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace';
    ctx.fillStyle = 'rgba(17,17,17,0.72)';
    ctx.textAlign = 'left';
    ctx.fillText(`agent seeds: ${agentSeeds.join(' · ') || '(none)'}`, 58, 96);
    ctx.fillText(`filter seed: ${filterSeed}`, 58, 918);
    ctx.textAlign = 'right';
    ctx.fillText(`risk seed: ${riskSeed}`, 944, 96);
    ctx.fillText(`score ${profile.score.toFixed(2)} · gain ${profile.gain.toFixed(2)} · cost ${profile.cost.toFixed(2)} · latency ${profile.latency.toFixed(1)}ms`, 944, 918);
    ctx.fillText(`nums ${dspyNums.length} · spread ${profile.spread.toFixed(2)} · density ${profile.density.toFixed(2)}`, 944, 940);
    ctx.restore();
  }

  function buildProfile(nums) {
    const n = nums.length ? nums.slice() : [0.5];
    const norm = normalizeNumbers(n);
    const avg = n.reduce((a, b) => a + b, 0) / n.length;
    const variance = n.reduce((a, b) => a + Math.pow(b - avg, 2), 0) / n.length;
    const spread = Math.sqrt(variance);
    const score = clamp(norm[0] ?? 0.5, 0, 1);
    const gain = clamp(norm[1] ?? score * 0.7, 0, 1);
    const cost = clamp(norm[2] ?? (1 - score) * 0.6 + 0.2, 0, 1);
    const latency = 10 + ((n[3] ?? avg * 10) * 170);
    const steps = Math.max(1, Math.round((n[4] ?? n.length) * 12));
    const tokens = Math.max(120, Math.round((n[5] ?? avg * 1000) * 1200));
    const trial = clamp(norm[6] ?? 0.5, 0, 1);
    const delta = clamp(norm[7] ?? spread, 0, 1);
    const density = clamp(0.28 + score * 0.32 + gain * 0.22 + trial * 0.14, 0.12, 0.95);
    const fracture = clamp(cost * 0.45 + latency / 260 + delta * 0.25, 0.05, 0.98);
    const contrast = clamp(0.3 + score * 0.35 + delta * 0.2, 0.15, 0.98);
    const rhythm = clamp(0.2 + (steps / 120) + spread * 0.7, 0.1, 1.2);
    return { avg, spread, score, gain, cost, latency, steps, tokens, trial, delta, density, fracture, contrast, rhythm };
  }

  function drawAgentClusters(agentSeeds, dspyNums, profile) {
    const seeds = agentSeeds.length ? agentSeeds : ['agent-default'];
    const count = Math.max(seeds.length, Math.min(8, 3 + Math.floor(profile.density * 7)));
    const colors = [palette.pink, palette.cyan, palette.blue, palette.orange, palette.teal, palette.red, palette.olive, palette.ink];

    for (let i = 0; i < count; i++) {
      const seed = seeds[i % seeds.length];
      const rng = rngFrom('agent', seed, String(i), String(profile.steps), String(profile.tokens));
      const angle = (Math.PI * 2 * i) / count + rr(rng, -0.4, 0.4);
      const radius = rr(rng, 110, 280) * (0.55 + profile.fracture * 0.8);
      const x = SIZE / 2 + Math.cos(angle) * radius + rr(rng, -30, 30) * profile.fracture;
      const y = SIZE / 2 + Math.sin(angle) * radius + rr(rng, -30, 30) * profile.fracture;
      const s = rr(rng, 140, 300) * (0.75 + profile.density * 0.35);
      const type = ['contour', 'orbit', 'matrix', 'beam', 'lattice', 'sigil'][(hashString(seed) + i) % 6];

      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(rr(rng, -0.25, 0.25));
      ctx.globalAlpha = 0.92;
      ctx.fillStyle = 'rgba(255,255,255,0.24)';
      ctx.fillRect(-s / 2, -s / 2, s, s);
      ctx.strokeStyle = 'rgba(17,17,17,0.58)';
      ctx.lineWidth = 1.2;
      ctx.strokeRect(-s / 2, -s / 2, s, s);
      ctx.restore();

      ctx.save();
      ctx.beginPath();
      ctx.rect(x - s / 2, y - s / 2, s, s);
      ctx.clip();

      if (type === 'contour') {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(rr(rng, -0.2, 0.2));
        for (let j = 0; j < 16; j++) {
          const t = j / 15;
          const w = s * (1 - t * 0.76);
          ctx.globalAlpha = 0.12 + t * 0.18;
          ctx.strokeStyle = pick(rng, colors);
          ctx.strokeRect(-w / 2, -w / 2, w, w * rr(rng, 0.8, 1.02));
        }
        ctx.restore();
      } else if (type === 'orbit') {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(rr(rng, -0.2, 0.2));
        for (let j = 0; j < 11; j++) {
          ctx.globalAlpha = 0.12 + j * 0.02;
          ctx.strokeStyle = pick(rng, colors);
          ctx.beginPath();
          ctx.ellipse(0, 0, s * (0.42 - j * 0.02), s * (0.22 + j * 0.01), rr(rng, -0.5, 0.5), 0, Math.PI * 2);
          ctx.stroke();
        }
        ctx.restore();
      } else if (type === 'matrix') {
        const cols = 5 + Math.floor(profile.density * 4);
        const rows = 4 + Math.floor(profile.rhythm * 2);
        const cw = s / cols, ch = s / rows;
        for (let r = 0; r < rows; r++) {
          for (let c = 0; c < cols; c++) {
            if (rng() < 0.24 + profile.density * 0.4) {
              ctx.fillStyle = pick(rng, colors);
              ctx.globalAlpha = rr(rng, 0.2, 0.8);
              ctx.fillRect(x - s / 2 + c * cw + rr(rng, 2, 10), y - s / 2 + r * ch + rr(rng, 2, 10), cw * rr(rng, 0.25, 0.95), ch * rr(rng, 0.18, 0.9));
            }
          }
        }
      } else if (type === 'beam') {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(rr(rng, -0.65, 0.65));
        for (let j = 0; j < 9; j++) {
          const t = j / 8;
          const w = s * rr(rng, 0.08, 0.18);
          const h = s * (0.5 + profile.fracture * 0.7) * (0.38 + t * 0.9);
          ctx.globalAlpha = 0.14 + t * 0.15;
          ctx.fillStyle = pick(rng, colors);
          ctx.fillRect(-s * 0.45 + t * s * 0.9, -h / 2, w, h);
        }
        ctx.restore();
      } else if (type === 'lattice') {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(rr(rng, -0.15, 0.15));
        const n = 6 + Math.floor(profile.contrast * 4);
        const gap = s / (n - 1);
        for (let r = 0; r < n; r++) {
          for (let c = 0; c < n; c++) {
            if (rng() < 0.2 + profile.density * 0.35) {
              ctx.fillStyle = pick(rng, colors);
              ctx.globalAlpha = rr(rng, 0.18, 0.72);
              ctx.fillRect(-s / 2 + c * gap, -s / 2 + r * gap, rr(rng, 4, 12), rr(rng, 4, 12));
            }
          }
        }
        ctx.restore();
      } else {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(rr(rng, -0.55, 0.55));
        for (let j = 0; j < 12; j++) {
          const t = j / 11;
          const w = s * (1 - t * 0.82);
          ctx.strokeStyle = pick(rng, colors);
          ctx.globalAlpha = 0.12 + t * 0.16;
          ctx.strokeRect(-w / 2, -w / 2, w, w);
          if (j % 3 === 0) {
            ctx.fillStyle = pick(rng, colors);
            ctx.fillRect(-w * 0.42, -2, w * 0.84, 4);
          }
        }
        ctx.restore();
      }
      ctx.restore();

      ctx.save();
      ctx.fillStyle = 'rgba(17,17,17,0.84)';
      ctx.font = '700 10px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText(seed, x, y + s * 0.58);
      ctx.restore();
    }
  }

  function drawDSPyNumbers(nums, profile, filterSeed) {
    const norm = normalizeNumbers(nums);
    const rng = rngFrom('dspy', nums.join(','), String(profile.score), String(profile.gain), String(profile.cost), filterSeed);
    const count = Math.max(6, norm.length);
    const bandX = 92;
    const bandY = 356;
    const bandW = SIZE - 184;
    const bandH = 272;
    const slotW = bandW / count;

    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.16)';
    ctx.fillRect(bandX, bandY, bandW, bandH);
    ctx.strokeStyle = 'rgba(17,17,17,0.16)';
    ctx.lineWidth = 1;
    ctx.strokeRect(bandX, bandY, bandW, bandH);

    ctx.fillStyle = 'rgba(17,17,17,0.92)';
    ctx.font = '800 18px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText('FILTER GATE', bandX + 16, bandY + 12);
    ctx.font = '700 11px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace';
    ctx.fillStyle = 'rgba(17,17,17,0.72)';
    ctx.fillText(filterSeed, bandX + 16, bandY + 35);

    for (let i = 0; i < count; i++) {
      const v = norm[i % norm.length];
      const raw = nums[i % nums.length];
      const x = bandX + i * slotW + slotW * 0.12;
      const barW = slotW * 0.68;
      const barH = 48 + v * 170 * (0.75 + profile.contrast * 0.55);
      const y = bandY + bandH - 28 - barH;
      const col = pick(rng, [palette.pink, palette.cyan, palette.blue, palette.orange, palette.teal, palette.red, palette.olive, palette.ink]);
      ctx.fillStyle = col;
      ctx.globalAlpha = 0.18 + v * 0.42;
      ctx.fillRect(x, y, barW, barH);
      ctx.fillStyle = 'rgba(255,255,255,0.26)';
      ctx.fillRect(x + barW * 0.12, y + 4, barW * 0.16, Math.max(12, barH * 0.22));
      ctx.fillStyle = 'rgba(17,17,17,0.9)';
      ctx.font = '700 10px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      ctx.fillText(Number.isFinite(raw) ? raw.toFixed(raw < 10 ? 2 : 1) : String(raw), x + barW / 2, y - 4);
      ctx.strokeStyle = 'rgba(17,17,17,0.12)';
      ctx.strokeRect(x, y, barW, barH);
    }
    ctx.restore();
  }

  function drawFilterOverlay(filterSeed, profile) {
    const rng = rngFrom('filter', filterSeed, String(profile.density), String(profile.fracture));
    const mode = pick(rng, ['bands', 'window', 'mesh', 'stencil']);
    const opacity = 0.12 + profile.contrast * 0.12;
    ctx.save();
    ctx.translate(SIZE / 2, SIZE / 2);
    ctx.rotate(rr(rng, -0.5, 0.5));
    ctx.translate(-SIZE / 2, -SIZE / 2);

    if (mode === 'bands') {
      const gap = 34 + Math.round(profile.rhythm * 28);
      for (let x = -60; x < SIZE + 60; x += gap) {
        const w = rr(rng, 10, 28);
        ctx.fillStyle = `rgba(17,17,17,${opacity})`;
        ctx.fillRect(x, -40, w, SIZE + 80);
      }
    } else if (mode === 'window') {
      for (let i = 0; i < 5; i++) {
        const w = rr(rng, 160, 360);
        const h = rr(rng, 100, 260);
        const x = rr(rng, 80, SIZE - 80 - w);
        const y = rr(rng, 100, SIZE - 100 - h);
        ctx.fillStyle = `rgba(255,255,255,${opacity * 1.1})`;
        ctx.fillRect(x, y, w, h);
        ctx.strokeStyle = `rgba(17,17,17,${opacity})`;
        ctx.strokeRect(x, y, w, h);
      }
    } else if (mode === 'mesh') {
      for (let i = 0; i < 16; i++) {
        ctx.fillStyle = `rgba(17,17,17,${opacity})`;
        ctx.fillRect(rr(rng, -80, SIZE + 40), rr(rng, -80, SIZE + 40), rr(rng, 160, 360), rr(rng, 8, 18));
      }
    } else {
      ctx.fillStyle = `rgba(17,17,17,${opacity * 0.16})`;
      ctx.fillRect(0, 0, SIZE, SIZE);
      ctx.globalCompositeOperation = 'destination-out';
      for (let i = 0; i < 8; i++) {
        ctx.fillRect(rr(rng, 80, 680), rr(rng, 100, 820), rr(rng, 120, 260), rr(rng, 80, 220));
      }
      ctx.globalCompositeOperation = 'source-over';
    }
    ctx.restore();
  }

  function drawRiskDamage(riskSeed, profile) {
    const rng = rngFrom('risk', riskSeed, String(profile.fracture), String(profile.delta));
    const count = 9 + Math.round(profile.fracture * 14);
    ctx.save();
    ctx.globalCompositeOperation = 'multiply';
    for (let i = 0; i < count; i++) {
      const x1 = rr(rng, 40, SIZE - 40);
      const y1 = rr(rng, 40, SIZE - 40);
      const x2 = x1 + rr(rng, -260, 260) * (0.25 + profile.fracture * 0.9);
      const y2 = y1 + rr(rng, -260, 260) * (0.25 + profile.fracture * 0.9);
      ctx.strokeStyle = i % 3 === 0 ? 'rgba(210,77,60,0.34)' : 'rgba(17,17,17,0.2)';
      ctx.lineWidth = rr(rng, 1.1, 3.4);
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      const steps = 7 + Math.round(profile.fracture * 8);
      for (let s = 1; s <= steps; s++) {
        const t = s / steps;
        const x = x1 + (x2 - x1) * t + rr(rng, -18, 18) * profile.fracture;
        const y = y1 + (y2 - y1) * t + rr(rng, -18, 18) * profile.fracture;
        ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawCaption(agentSeeds, profile, nums) {
    const summary = [
      `DSPy ${nums.length} nums`,
      `score ${profile.score.toFixed(2)}`,
      `gain ${profile.gain.toFixed(2)}`,
      `cost ${profile.cost.toFixed(2)}`,
      `latency ${profile.latency.toFixed(1)}ms`
    ].join('  ·  ');
    ctx.save();
    ctx.font = '700 12px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace';
    ctx.fillStyle = 'rgba(17,17,17,0.82)';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'alphabetic';
    ctx.fillText(summary, SIZE / 2, SIZE - 54);
    ctx.fillText(`AGENT ${agentSeeds.length || 1}x · density ${profile.density.toFixed(2)} · fracture ${profile.fracture.toFixed(2)} · rhythm ${profile.rhythm.toFixed(2)}`, SIZE / 2, SIZE - 34);
    ctx.restore();
  }

  function render() {
    const agentSeeds = parseSeeds(agentInput.value);
    const filterSeed = filterInput.value.trim() || 'filter';
    const riskSeed = riskInput.value.trim() || 'risk';
    const nums = parseNumbers(dspyInput.value);
    const profile = buildProfile(nums);

    const baseRng = rngFrom('base', agentSeeds.join('|'), filterSeed, riskSeed, nums.join(','));
    const masterRng = rngFrom('master', agentSeeds.join('|'), filterSeed, riskSeed, nums.join(','));

    ctx.clearRect(0, 0, SIZE, SIZE);
    paper(baseRng);

    // faint axis rails
    ctx.save();
    ctx.fillStyle = 'rgba(17,17,17,0.04)';
    ctx.fillRect(44, 126, 110, 748);
    ctx.fillRect(166, 56, 660, 74);
    ctx.save();
    ctx.translate(798, 786);
    ctx.rotate(-0.78539816339);
    ctx.fillRect(-34, -22, 350, 84);
    ctx.restore();
    ctx.restore();

    drawDSPyNumbers(nums, profile, filterSeed);
    drawAgentClusters(agentSeeds, nums, profile);
    drawFilterOverlay(filterSeed, profile);
    drawRiskDamage(riskSeed, profile);

    // signal dust and connecting trail
    ctx.save();
    for (let i = 0; i < 64; i++) {
      const t = i / 63;
      const x = 72 + t * 850 + rr(masterRng, -20, 20);
      const y = 500 + Math.sin(t * Math.PI * 2 + masterRng() * 1.8) * (100 + profile.fracture * 160) + rr(masterRng, -16, 16);
      const s = rr(masterRng, 2, 8);
      ctx.fillStyle = pick(masterRng, [palette.pink, palette.cyan, palette.blue, palette.orange, palette.ink]);
      ctx.globalAlpha = 0.12 + t * 0.28;
      ctx.fillRect(x, y, s, s);
    }
    ctx.restore();

    // subtle paper wash
    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.045)';
    ctx.fillRect(0, 0, SIZE, SIZE);
    ctx.restore();

    drawFrame();
    drawAxisLabels(agentSeeds, nums, filterSeed, riskSeed, profile);
    drawCaption(agentSeeds, profile, nums);
  }

  function randomize() {
    const token = () => Math.random().toString(36).slice(2, 8);
    const n = 1 + Math.floor(Math.random() * 4);
    agentInput.value = Array.from({ length: n }, () => token()).join(', ');
    const nums = Array.from({ length: 8 + Math.floor(Math.random() * 5) }, () => (Math.random() * 2).toFixed(2));
    dspyInput.value = `score=${nums[0]}, gain=${nums[1]}, cost=${nums[2]}, latency=${(Math.random() * 4).toFixed(1)}, steps=${Math.floor(Math.random() * 40 + 8)}, tokens=${Math.floor(Math.random() * 2200 + 400)}, trial=${nums[6]}, delta=${nums[7]}`;
    filterInput.value = `filter-${token()}`;
    riskInput.value = `risk-${token()}`;
    render();
  }

  const params = new URLSearchParams(location.search);
  const agentParam = params.get('agent') || params.get('seed') || params.get('hash');
  const filterParam = params.get('filter');
  const riskParam = params.get('risk');
  const dspyParam = params.get('dspy');
  if (agentParam) agentInput.value = agentParam;
  if (filterParam) filterInput.value = filterParam;
  if (riskParam) riskInput.value = riskParam;
  if (dspyParam) dspyInput.value = dspyParam;

  rerenderBtn.addEventListener('click', render);
  randomizeBtn.addEventListener('click', randomize);
  [agentInput, dspyInput, filterInput, riskInput].forEach(el => el.addEventListener('keydown', e => {
    if (e.key === 'Enter' && (el === agentInput ? (e.metaKey || e.ctrlKey) : true)) render();
  }));

  render();
})();
</script>
</body>
</html>
