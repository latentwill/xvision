<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xvision Bauhaus Strategy Metrics — BTC 1h</title>
  <style>
    :root { color-scheme: light; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #efe7d4;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body {
      display: grid;
      place-items: center;
    }
    #frame {
      width: min(96vmin, 1180px);
      height: min(96vmin, 1180px);
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.24);
      border: 1px solid rgba(0, 0, 0, 0.14);
      background: #f4eedf;
    }
    svg { width: 100%; height: 100%; display: block; }
    text {
      letter-spacing: 0.03em;
      user-select: none;
    }
  </style>
</head>
<body>
  <div id="frame">
    <svg id="art" viewBox="0 0 1200 1200" role="img" aria-label="Bauhaus style strategy metrics artwork"></svg>
  </div>

  <script>
    (() => {
      const metrics = {
        asset: "BTC",
        granularity: "1h",
        points: 480,
        live_start: -1.42,
        live_end: -17.25,
        live_delta: -15.83,
        live_min: -34.57,
        live_max: -1.21,
        live_mean: -17.12,
        live_stdev: 7.49,
        paper_start: 1.06,
        paper_end: -6.6,
        paper_delta: -7.66,
        paper_min: -25.41,
        paper_max: 8.38,
        paper_mean: -7.41,
        paper_stdev: 8.57,
        dd_min: -34.57,
        dd_mean: -17.12,
        spread_end: -10.65,
        paper_pos: 122,
        paper_neg: 358,
        paper_sign_changes: 15,
        live_sign_changes: 0,
        live_step_vol: 1.121,
        paper_step_vol: 1.126,
        sample_live: [-1.42,-7.86,-8.58,-12.82,-14.31,-9.74,-8.43,-7.98,-14.39,-14.01,-15.61,-18.14,-25.05,-31.32,-26.64,-27.88,-26.19,-31.04,-18.86,-19.85,-14.84,-12.83,-20.44,-17.25],
        sample_paper: [1.06,-5.42,-0.98,-0.65,5.17,8.17,0.21,3.23,0.33,-7.92,-13.05,-12.65,-18.01,-24.61,-17.54,-18.52,-13.6,-9.77,-14.42,-4.75,-9.02,-8.07,-9.03,-6.6],
        sample_dd: [-1.42,-7.86,-8.58,-12.82,-14.31,-9.74,-8.43,-7.98,-14.39,-14.01,-15.61,-18.14,-25.05,-31.32,-26.64,-27.88,-26.19,-31.04,-18.86,-19.85,-14.84,-12.83,-20.44,-17.25],
      };

      const svg = document.getElementById('art');
      const NS = 'http://www.w3.org/2000/svg';
      const el = (tag, attrs = {}) => {
        const n = document.createElementNS(NS, tag);
        for (const [k, v] of Object.entries(attrs)) n.setAttribute(k, String(v));
        return n;
      };
      const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
      const map = (v, inMin, inMax, outMin, outMax) => outMin + ((v - inMin) / (inMax - inMin)) * (outMax - outMin);
      const abs = Math.abs;

      const liveMag = abs(metrics.live_delta);
      const paperMag = abs(metrics.paper_delta);
      const ddMag = abs(metrics.dd_min);
      const spreadMag = abs(metrics.spread_end);
      const liveNorm = clamp(liveMag / 40, 0, 1);
      const paperNorm = clamp(paperMag / 40, 0, 1);
      const ddNorm = clamp(ddMag / 40, 0, 1);
      const spreadNorm = clamp(spreadMag / 20, 0, 1);
      const signNorm = clamp(metrics.paper_sign_changes / 20, 0, 1);
      const liveVolNorm = clamp(metrics.live_step_vol / 2, 0, 1);
      const paperVolNorm = clamp(metrics.paper_step_vol / 2, 0, 1);

      const palette = {
        red: '#d52b1e',
        blue: '#1f5bff',
        yellow: '#f3c313',
        black: '#111111',
        cream: '#f4eedf',
        paper: '#e8dfca',
      };

      // background
      svg.appendChild(el('rect', { x: 0, y: 0, width: 1200, height: 1200, fill: palette.cream }));
      svg.appendChild(el('rect', { x: 52, y: 52, width: 1096, height: 1096, fill: 'none', stroke: palette.black, 'stroke-width': 3 }));

      // grid lines
      const gridXs = [210, 430, 690, 910];
      const gridYs = [170, 420, 690, 930];
      gridXs.forEach(x => svg.appendChild(el('line', { x1: x, y1: 72, x2: x, y2: 1128, stroke: 'rgba(17,17,17,0.22)', 'stroke-width': 2 })));
      gridYs.forEach(y => svg.appendChild(el('line', { x1: 72, y1: y, x2: 1128, y2: y, stroke: 'rgba(17,17,17,0.22)', 'stroke-width': 2 })));

      // title block
      svg.appendChild(el('text', { x: 90, y: 122, fill: palette.black, 'font-size': 28, 'font-weight': 800, 'letter-spacing': '0.22em' }))
        .appendChild(document.createTextNode('XVISION STRATEGY METRICS'));
      svg.appendChild(el('text', { x: 90, y: 160, fill: palette.black, 'font-size': 14, 'font-weight': 700, 'letter-spacing': '0.18em', opacity: 0.72 }))
        .appendChild(document.createTextNode(`${metrics.asset} · ${metrics.granularity} · ${metrics.points} POINTS`));

      // Bauhaus primary forms, sized by real metrics.
      const redCircle = el('circle', {
        cx: 248 + liveNorm * 18,
        cy: 330 + ddNorm * 18,
        r: 96 + ddNorm * 102,
        fill: palette.red,
        opacity: 0.96,
      });
      svg.appendChild(redCircle);

      const blueSquare = el('rect', {
        x: 745 - paperNorm * 18,
        y: 168 + spreadNorm * 8,
        width: 160 + paperNorm * 186,
        height: 160 + paperNorm * 186,
        fill: palette.blue,
        transform: 'rotate(8 825 248)',
        opacity: 0.95,
      });
      svg.appendChild(blueSquare);

      const yellowRect = el('rect', {
        x: 722,
        y: 526 - liveNorm * 22,
        width: 232 + spreadNorm * 50,
        height: 128 + liveNorm * 40,
        fill: palette.yellow,
        opacity: 0.98,
      });
      svg.appendChild(yellowRect);

      const blackBar = el('rect', {
        x: 476,
        y: 266,
        width: 62 + liveVolNorm * 52,
        height: 486 + paperVolNorm * 52,
        fill: palette.black,
        opacity: 0.96,
      });
      svg.appendChild(blackBar);

      // Overlapping ring and accent circle.
      svg.appendChild(el('circle', {
        cx: 560,
        cy: 320 + paperNorm * 55,
        r: 92 + liveVolNorm * 38,
        fill: 'none',
        stroke: palette.black,
        'stroke-width': 7,
      }));
      svg.appendChild(el('circle', {
        cx: 570,
        cy: 318 + paperNorm * 55,
        r: 40 + spreadNorm * 26,
        fill: palette.cream,
        stroke: palette.black,
        'stroke-width': 4,
      }));

      // Lower-left yellow arc / disc.
      svg.appendChild(el('circle', {
        cx: 270,
        cy: 860,
        r: 120 + liveNorm * 22,
        fill: palette.yellow,
        stroke: palette.black,
        'stroke-width': 5,
      }));
      svg.appendChild(el('rect', {
        x: 126,
        y: 812,
        width: 278,
        height: 100,
        fill: palette.cream,
        opacity: 1,
      }));
      svg.appendChild(el('line', {
        x1: 126,
        y1: 862,
        x2: 404,
        y2: 862,
        stroke: palette.black,
        'stroke-width': 5,
      }));

      // Filter / risk axis lines.
      svg.appendChild(el('line', { x1: 96, y1: 598, x2: 1102, y2: 598, stroke: palette.black, 'stroke-width': 4 }));
      svg.appendChild(el('line', { x1: 600, y1: 176, x2: 600, y2: 1050, stroke: palette.black, 'stroke-width': 4 }));
      svg.appendChild(el('line', { x1: 92, y1: 334, x2: 1088, y2: 334, stroke: 'rgba(17,17,17,0.35)', 'stroke-width': 2, 'stroke-dasharray': '12 9' }));

      // Small accent circles driven by paper sign changes.
      const orbitCount = Math.max(8, metrics.paper_sign_changes + 4);
      for (let i = 0; i < orbitCount; i++) {
        const t = i / orbitCount * Math.PI * 2;
        const rx = 410 + Math.cos(t) * (110 + spreadNorm * 16);
        const ry = 402 + Math.sin(t) * (82 + ddNorm * 18);
        const r = i % 3 === 0 ? 16 : 10;
        svg.appendChild(el('circle', {
          cx: rx,
          cy: ry,
          r,
          fill: i % 4 === 0 ? palette.red : i % 4 === 1 ? palette.blue : i % 4 === 2 ? palette.yellow : palette.cream,
          stroke: palette.black,
          'stroke-width': 3,
        }));
      }

      // Vertical metric bars — actual sampled live/paper series.
      const bars = 24;
      const barY = 980;
      const liveMin = Math.min(...metrics.sample_live);
      const liveMax = Math.max(...metrics.sample_live);
      const paperMin = Math.min(...metrics.sample_paper);
      const paperMax = Math.max(...metrics.sample_paper);
      const sampleMin = Math.min(...metrics.sample_dd);
      const sampleMax = Math.max(...metrics.sample_dd);

      for (let i = 0; i < bars; i++) {
        const x = 86 + i * 45;
        const lv = metrics.sample_live[i];
        const pv = metrics.sample_paper[i];
        const dv = metrics.sample_dd[i];
        const lh = clamp(map(lv, liveMin, liveMax, 24, 112), 18, 132);
        const ph = clamp(map(pv, paperMin, paperMax, 18, 118), 16, 136);
        const dh = clamp(map(dv, sampleMin, sampleMax, 18, 124), 16, 136);

        svg.appendChild(el('rect', {
          x,
          y: barY - lh,
          width: 24,
          height: lh,
          fill: lv < -16 ? palette.red : palette.black,
        }));
        svg.appendChild(el('rect', {
          x,
          y: barY + 24 - ph,
          width: 24,
          height: ph,
          fill: pv >= 0 ? palette.blue : palette.yellow,
        }));
        svg.appendChild(el('rect', {
          x,
          y: barY + 54 - dh,
          width: 24,
          height: dh,
          fill: dv < -22 ? palette.black : palette.red,
        }));
      }

      // Caption ribbon.
      svg.appendChild(el('rect', { x: 650, y: 810, width: 470, height: 190, fill: palette.paper, stroke: palette.black, 'stroke-width': 4 }));
      const labels = [
        [`LIVE Δ`, metrics.live_delta.toFixed(2)],
        [`PAPER Δ`, metrics.paper_delta.toFixed(2)],
        [`WORST DD`, metrics.dd_min.toFixed(2)],
        [`SPREAD`, metrics.spread_end.toFixed(2)],
        [`SIGN CHANGES`, String(metrics.paper_sign_changes)],
        [`VOL`, `${metrics.live_step_vol.toFixed(3)} / ${metrics.paper_step_vol.toFixed(3)}`],
      ];
      labels.forEach((row, i) => {
        const y = 852 + i * 25;
        svg.appendChild(el('text', {
          x: 676,
          y,
          fill: palette.black,
          'font-size': 16,
          'font-weight': 800,
          'letter-spacing': '0.12em',
        })).appendChild(document.createTextNode(row[0]));
        svg.appendChild(el('text', {
          x: 996,
          y,
          fill: palette.black,
          'font-size': 16,
          'font-weight': 700,
          'text-anchor': 'end',
        })).appendChild(document.createTextNode(row[1]));
      });

      // Small sub-caption at bottom.
      svg.appendChild(el('text', {
        x: 90,
        y: 1128,
        fill: palette.black,
        'font-size': 13,
        'font-weight': 700,
        'letter-spacing': '0.18em',
        opacity: 0.88,
      })).appendChild(document.createTextNode('BAUHAUS GEOMETRY DRIVEN BY ACTUAL XVISION STRATEGY METRICS'));

      // Tiny legend marks.
      const legend = [
        { x: 90, y: 206, fill: palette.red, label: 'LIVE' },
        { x: 90, y: 238, fill: palette.blue, label: 'PAPER' },
        { x: 90, y: 270, fill: palette.yellow, label: 'RISK' },
      ];
      legend.forEach(item => {
        svg.appendChild(el('circle', { cx: item.x, cy: item.y, r: 9, fill: item.fill, stroke: palette.black, 'stroke-width': 2 }));
        svg.appendChild(el('text', {
          x: item.x + 22,
          y: item.y + 5,
          fill: palette.black,
          'font-size': 13,
          'font-weight': 800,
          'letter-spacing': '0.18em',
        })).appendChild(document.createTextNode(item.label));
      });
    })();
  </script>
</body>
</html>
