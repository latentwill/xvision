<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebGL X / Squares</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f5eddc;
    }
    canvas {
      width: 100vw;
      height: 100vh;
      display: block;
    }
  </style>
</head>
<body>
<canvas id="gl"></canvas>
<script>
(() => {
  const canvas = document.getElementById('gl');
  const gl = canvas.getContext('webgl', { antialias: true, alpha: false });
  if (!gl) {
    document.body.innerHTML = '<pre style="padding:20px">WebGL unavailable</pre>';
    return;
  }

  const vert = `
    attribute vec2 aPos;
    void main() {
      gl_Position = vec4(aPos, 0.0, 1.0);
    }
  `;

  const frag = `
    precision highp float;
    uniform vec2 uRes;
    uniform float uTime;

    float hash(vec2 p) {
      return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123);
    }

    float sdBox(vec2 p, vec2 b) {
      vec2 d = abs(p) - b;
      return length(max(d, 0.0)) + min(max(d.x, d.y), 0.0);
    }

    vec3 pal(float t) {
      return mix(vec3(0.08, 0.08, 0.09),
             mix(vec3(0.87, 0.24, 0.61), vec3(0.28, 0.81, 0.90), t), 0.85);
    }

    vec2 rot(vec2 p, float a) {
      float s = sin(a), c = cos(a);
      return vec2(c * p.x - s * p.y, s * p.x + c * p.y);
    }

    float stroke(float d, float w) {
      float aa = 0.006;
      return 1.0 - smoothstep(w, w + aa, abs(d));
    }

    void main() {
      vec2 uv = (gl_FragCoord.xy - 0.5 * uRes) / uRes.y;
      vec2 p = uv;

      vec3 bg = vec3(0.960, 0.928, 0.865);
      float grain = hash(gl_FragCoord.xy + floor(uTime * 2.0));
      bg += (grain - 0.5) * 0.022;
      vec3 col = bg;

      // paper-ish edge vignette
      float vign = smoothstep(1.25, 0.25, length(uv));
      col *= 0.96 + 0.04 * vign;

      // nested squares: stepped contour field
      vec2 q = p + vec2(0.02 * sin(uTime * 0.7), -0.02 * cos(uTime * 0.6));
      for (int i = 0; i < 11; i++) {
        float t = float(i) / 10.0;
        float s = mix(1.02, 0.08, t);
        float ang = t * 0.16 + sin(t * 6.0 + uTime * 0.2) * 0.05;
        vec2 r = rot(q, ang);
        float d = sdBox(r + vec2(0.015 * sin(t * 10.0), 0.015 * cos(t * 8.0)), vec2(s, s * 0.92));
        float ring = stroke(d, mix(0.020, 0.006, t));
        vec3 c = pal(t);
        col = mix(col, c, ring * (0.16 + 0.08 * t));

        // add a few thin cross bars inside the stack
        float bar = stroke(sdBox(r * vec2(1.0, 1.0), vec2(s * 0.72, 0.05)), 0.005);
        col = mix(col, vec3(0.08, 0.08, 0.09), bar * 0.18);
      }

      // X shape: two crossing bars with slight color fringing
      vec2 x1 = rot(p, 0.785398163);
      vec2 x2 = rot(p, -0.785398163);
      float bx1 = stroke(sdBox(x1, vec2(0.92, 0.085)), 0.010);
      float bx2 = stroke(sdBox(x2, vec2(0.92, 0.085)), 0.010);
      col = mix(col, vec3(0.08, 0.08, 0.09), max(bx1, bx2) * 0.92);
      col = mix(col, vec3(0.24, 0.80, 0.91), bx1 * 0.45);
      col = mix(col, vec3(0.86, 0.22, 0.60), bx2 * 0.45);

      // diagonal stepped halo around the X
      float diag = abs(abs(p.x) - abs(p.y));
      float halo = 1.0 - smoothstep(0.34, 0.36, diag);
      col += halo * vec3(0.06, 0.08, 0.12);

      // corner-ish secondary squares
      vec2 offs[4];
      offs[0] = vec2(-0.38, -0.34);
      offs[1] = vec2( 0.35, -0.30);
      offs[2] = vec2(-0.28,  0.34);
      offs[3] = vec2( 0.36,  0.36);
      for (int j = 0; j < 4; j++) {
        vec2 c = offs[j];
        vec2 rr = rot(p - c, 0.07 * float(j));
        float d = sdBox(rr, vec2(0.23 + 0.03 * float(j), 0.23 + 0.02 * float(j)));
        float ring = stroke(d, 0.012);
        vec3 cc = pal(0.18 + 0.2 * float(j));
        col = mix(col, cc, ring * 0.38);
      }

      // a few tiny stripes / accents
      for (int k = 0; k < 5; k++) {
        float fk = float(k);
        vec2 s = vec2(-0.92 + fk * 0.46, 0.72 - fk * 0.19);
        float d = sdBox(p - s, vec2(0.06, 0.16 + 0.02 * fk));
        float a = stroke(d, 0.009);
        col = mix(col, vec3(0.08, 0.08, 0.09), a * 0.55);
        col = mix(col, pal(0.2 * fk), a * 0.3);
      }

      gl_FragColor = vec4(col, 1.0);
    }
  `;

  function compile(type, src) {
    const sh = gl.createShader(type);
    gl.shaderSource(sh, src);
    gl.compileShader(sh);
    if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) {
      throw new Error(gl.getShaderInfoLog(sh));
    }
    return sh;
  }

  const program = gl.createProgram();
  gl.attachShader(program, compile(gl.VERTEX_SHADER, vert));
  gl.attachShader(program, compile(gl.FRAGMENT_SHADER, frag));
  gl.linkProgram(program);
  if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
    throw new Error(gl.getProgramInfoLog(program));
  }
  gl.useProgram(program);

  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([
    -1, -1,
     3, -1,
    -1,  3
  ]), gl.STATIC_DRAW);

  const loc = gl.getAttribLocation(program, 'aPos');
  gl.enableVertexAttribArray(loc);
  gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

  const uRes = gl.getUniformLocation(program, 'uRes');
  const uTime = gl.getUniformLocation(program, 'uTime');

  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const w = Math.floor(canvas.clientWidth * dpr);
    const h = Math.floor(canvas.clientHeight * dpr);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
      gl.viewport(0, 0, w, h);
    }
  }

  function draw(t) {
    resize();
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1f(uTime, t * 0.001);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  resize();
  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
