<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DSPy Mono Crosshatch — AGENT / FILTER / RISK</title>
  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    #wrap {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.03), transparent 55%), #000;
    }
    canvas {
      width: min(94vmin, 1040px);
      height: min(94vmin, 1040px);
      display: block;
      background: #000;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    }
    #ui {
      position: fixed;
      left: 16px;
      bottom: 16px;
      width: min(480px, calc(100vw - 32px));
      display: grid;
      gap: 10px;
      padding: 12px;
      background: rgba(0,0,0,0.82);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      backdrop-filter: blur(8px);
      box-shadow: 0 12px 36px rgba(0,0,0,0.45);
    }
    .row {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 10px;
      align-items: start;
    }
    .label {
      padding-top: 10px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.18em;
      color: rgba(255,255,255,0.72);
    }
    input, textarea {
      width: 100%;
      box-sizing: border-box;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.04);
      color: #fff;
      font: inherit;
      font-size: 13px;
      padding: 10px 12px;
      outline: none;
    }
    textarea { min-height: 72px; resize: vertical; line-height: 1.35; }
    .actions { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    button {
      padding: 9px 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.16);
      background: #fff;
      color: #000;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
    }
    button.secondary { background: rgba(255,255,255,0.08); color: #fff; }
    .hint {
      color: rgba(255,255,255,0.62);
      font-size: 12px;
      line-height: 1.35;
    }
    .hint code {
      background: rgba(255,255,255,0.08);
      border-radius: 6px;
      padding: 1px 5px;
    }
  </style>
</head>
<body>
  <div id="wrap"><canvas id="c"></canvas></div>

  <div id="ui">
    <div class="row">
      <div class="label">AGENT</div>
      <textarea id="agent" spellcheck="false">atlas, vector, hush</textarea>
    </div>
    <div class="row">
      <div class="label">DSPY</div>
      <textarea id="dspy" spellcheck="false">score=0.84, gain=0.13, cost=0.42, latency=1.7, steps=24, tokens=1870, trial=0.91, delta=0.18</textarea>
    </div>
    <div class="row">
      <div class="label">FILTER</div>
      <input id="filter" value="threshold-01" spellcheck="false" />
    </div>
    <div class="row">
      <div class="label">RISK</div>
      <input id="risk" value="volatile-07" spellcheck="false" />
    </div>
    <div class="actions">
      <button id="rerender">Rerender</button>
      <button id="randomize" class="secondary">Randomize</button>
      <span class="hint">Monochrome only. DSPy numbers drive density, angle, hatch spacing, and fracture.</span>
    </div>
  </div>

<script>
(() => {
  const SIZE = 1000;
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const agentInput = document.getElementById('agent');
  const dspyInput = document.getElementById('dspy');
  const filterInput = document.getElementById('filter');
  const riskInput = document.getElementById('risk');
  const rerenderBtn = document.getElementById('rerender');
  const randomizeBtn = document.getElementById('randomize');

  canvas.width = SIZE;
  canvas.height = SIZE;

  function hashString(str) {
    let h = 2166136261 >>> 0;
    for (let i = 0; i < str.length; i++) {
      h ^= str.charCodeAt(i);
      h = Math.imul(h, 16777619);
    }
    return h >>> 0;
  }
  function mulberry32(seed) {
    return function() {
      let t = seed += 0x6D2B79F5;
      t = Math.imul(t ^ (t >>> 15), t | 1);
      t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }
  function rngFrom(...parts) { return mulberry32(hashString(parts.join('::'))); }
  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
  const rr = (rng, a, b) => a + (b - a) * rng();
  const pick = (rng, arr) => arr[Math.floor(rng() * arr.length)];
  const parseSeeds = text => text.split(/[\n,;|]+/).map(s => s.trim()).filter(Boolean);
  const parseNumbers = text => (text.match(/-?\d*\.?\d+(?:e[-+]?\d+)?/gi) || []).map(Number).filter(Number.isFinite);

  function normalizeNumbers(nums) {
    if (!nums.length) return [0.5];
    let min = Infinity, max = -Infinity;
    for (const n of nums) { if (n < min) min = n; if (n > max) max = n; }
    const span = max - min || 1;
    return nums.map(n => (n - min) / span);
  }

  function buildProfile(nums) {
    const n = nums.length ? nums.slice() : [0.5];
    const norm = normalizeNumbers(n);
    const avg = n.reduce((a, b) => a + b, 0) / n.length;
    const variance = n.reduce((a, b) => a + (b - avg) ** 2, 0) / n.length;
    const spread = Math.sqrt(variance);
    const score = clamp(norm[0] ?? 0.5, 0, 1);
    const gain = clamp(norm[1] ?? score * 0.7, 0, 1);
    const cost = clamp(norm[2] ?? (1 - score) * 0.6 + 0.2, 0, 1);
    const latency = 10 + ((n[3] ?? avg * 10) * 170);
    const steps = Math.max(1, Math.round((n[4] ?? n.length) * 12));
    const tokens = Math.max(120, Math.round((n[5] ?? avg * 1000) * 1200));
    const trial = clamp(norm[6] ?? 0.5, 0, 1);
    const delta = clamp(norm[7] ?? spread, 0, 1);
    const density = clamp(0.2 + score * 0.32 + gain * 0.18 + trial * 0.18, 0.12, 0.92);
    const fracture = clamp(cost * 0.52 + latency / 260 + delta * 0.28, 0.06, 0.98);
    const contrast = clamp(0.18 + score * 0.42 + delta * 0.24, 0.1, 0.98);
    const rhythm = clamp(0.16 + (steps / 120) + spread * 0.55, 0.08, 1.2);
    return { avg, spread, score, gain, cost, latency, steps, tokens, trial, delta, density, fracture, contrast, rhythm };
  }

  function addNoise(rng, count, aMin, aMax, sizeMin = 1, sizeMax = 1.6) {
    for (let i = 0; i < count; i++) {
      const x = rng() * SIZE;
      const y = rng() * SIZE;
      const s = rr(rng, sizeMin, sizeMax);
      ctx.fillStyle = `rgba(255,255,255,${rr(rng, aMin, aMax)})`;
      ctx.fillRect(x, y, s, s);
    }
  }

  function drawPaper(rng, profile) {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, SIZE, SIZE);

    // Grayscale light pools only.
    for (let i = 0; i < 12; i++) {
      const x = rr(rng, -120, SIZE + 120);
      const y = rr(rng, -120, SIZE + 120);
      const r = rr(rng, 160, 380);
      const a = rr(rng, 0.06, 0.16) * (0.6 + profile.contrast * 0.7);
      const g = ctx.createRadialGradient(x, y, 0, x, y, r);
      g.addColorStop(0, `rgba(255,255,255,${a})`);
      g.addColorStop(0.55, `rgba(255,255,255,${a * 0.25})`);
      g.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
    }

    // faint gradient bars behind the hatch, still monochrome.
    const bands = 8 + Math.round(profile.rhythm * 6);
    for (let i = 0; i < bands; i++) {
      const x = 60 + (i / bands) * 860 + rr(rng, -18, 18);
      const y = 120 + Math.sin(i * 0.5) * 44 + rr(rng, -18, 18);
      const w = rr(rng, 42, 140) * (0.4 + profile.density * 0.8);
      const h = rr(rng, 180, 620) * (0.45 + profile.fracture * 0.9);
      const alpha = 0.05 + (i / bands) * 0.14;
      const grad = ctx.createLinearGradient(x, y, x + w, y + h);
      grad.addColorStop(0, `rgba(255,255,255,${alpha * 0.1})`);
      grad.addColorStop(0.5, `rgba(255,255,255,${alpha})`);
      grad.addColorStop(1, `rgba(255,255,255,${alpha * 0.08})`);
      ctx.fillStyle = grad;
      ctx.fillRect(x, y, w, h);
    }

    addNoise(rng, 3400, 0.012, 0.05, 1, 1.3);
  }

  function hatchRect(x, y, w, h, angle, spacing, darkness, rng, cross = true) {
    ctx.save();
    ctx.translate(x + w / 2, y + h / 2);
    ctx.rotate(angle);
    ctx.translate(-w / 2, -h / 2);
    ctx.beginPath();
    ctx.rect(0, 0, w, h);
    ctx.clip();

    const lineAlpha = clamp(darkness, 0.04, 0.65);
    const gap = Math.max(3, spacing);
    ctx.lineWidth = 1;
    ctx.strokeStyle = `rgba(255,255,255,${lineAlpha})`;
    for (let i = -h; i < w + h; i += gap) {
      ctx.beginPath();
      ctx.moveTo(i, 0);
      ctx.lineTo(i + h, h);
      ctx.stroke();
    }
    if (cross) {
      ctx.rotate(Math.PI / 2);
      ctx.strokeStyle = `rgba(255,255,255,${lineAlpha * 0.72})`;
      for (let i = -h; i < w + h; i += gap) {
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.lineTo(i + h, h);
        ctx.stroke();
      }
    }
    ctx.restore();
  }

  function drawAgentModules(agentSeeds, profile) {
    const seeds = agentSeeds.length ? agentSeeds : ['agent-default'];
    const count = Math.max(seeds.length, Math.min(9, 3 + Math.floor(profile.density * 8)));
    for (let i = 0; i < count; i++) {
      const seed = seeds[i % seeds.length];
      const rng = rngFrom('agent', seed, String(i), String(profile.steps), String(profile.tokens));
      const angle = (Math.PI * 2 * i) / count + rr(rng, -0.4, 0.4);
      const radius = rr(rng, 120, 300) * (0.52 + profile.fracture * 0.72);
      const x = SIZE / 2 + Math.cos(angle) * radius + rr(rng, -26, 26) * profile.fracture;
      const y = SIZE / 2 + Math.sin(angle) * radius + rr(rng, -26, 26) * profile.fracture;
      const s = rr(rng, 150, 290) * (0.72 + profile.density * 0.33);
      const hatchSpacing = Math.max(5, Math.round(18 - profile.density * 9 + rr(rng, -2, 2)));
      const hatchAngle = rr(rng, -0.8, 0.8);
      const darkness = 0.1 + profile.contrast * 0.35 + (i / Math.max(1, count - 1)) * 0.14;
      const shellAlpha = 0.08 + profile.contrast * 0.14;

      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(rr(rng, -0.16, 0.16));
      ctx.fillStyle = `rgba(255,255,255,${shellAlpha})`;
      ctx.fillRect(-s / 2, -s / 2, s, s);
      ctx.strokeStyle = 'rgba(255,255,255,0.28)';
      ctx.lineWidth = 1;
      ctx.strokeRect(-s / 2, -s / 2, s, s);
      ctx.restore();

      hatchRect(x - s / 2, y - s / 2, s, s, hatchAngle, hatchSpacing, darkness, rng, true);

      // sublayers: nested hatch blocks with no color variance.
      const subCount = 3 + Math.round(profile.rhythm * 5);
      for (let j = 0; j < subCount; j++) {
        const subRng = rngFrom('agent-sub', seed, String(i), String(j));
        const sx = x + rr(subRng, -s * 0.22, s * 0.22);
        const sy = y + rr(subRng, -s * 0.22, s * 0.22);
        const sw = s * rr(subRng, 0.16, 0.34) * (0.8 + profile.fracture * 0.5);
        const sh = s * rr(subRng, 0.12, 0.28) * (0.8 + profile.fracture * 0.5);
        hatchRect(sx - sw / 2, sy - sh / 2, sw, sh, rr(subRng, -1.2, 1.2), Math.max(3, hatchSpacing - 4), 0.08 + profile.fracture * 0.2, subRng, j % 2 === 0);
      }

      ctx.save();
      ctx.fillStyle = 'rgba(255,255,255,0.84)';
      ctx.font = '700 10px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText(seed, x, y + s * 0.56);
      ctx.restore();
    }
  }

  function drawDSPyPanel(nums, profile, filterSeed) {
    const norm = normalizeNumbers(nums);
    const rng = rngFrom('dspy', nums.join(','), String(profile.score), String(profile.gain), String(profile.cost), filterSeed);
    const count = Math.max(6, norm.length);
    const bandX = 86;
    const bandY = 356;
    const bandW = SIZE - 172;
    const bandH = 270;
    const slotW = bandW / count;

    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.04)';
    ctx.fillRect(bandX, bandY, bandW, bandH);
    ctx.strokeStyle = 'rgba(255,255,255,0.16)';
    ctx.strokeRect(bandX, bandY, bandW, bandH);

    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.font = '800 18px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText('DSPY / MONO OPTIMIZATION', bandX + 16, bandY + 12);
    ctx.font = '700 11px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace';
    ctx.fillStyle = 'rgba(255,255,255,0.68)';
    ctx.fillText(filterSeed, bandX + 16, bandY + 35);

    for (let i = 0; i < count; i++) {
      const v = norm[i % norm.length];
      const raw = nums[i % nums.length];
      const x = bandX + i * slotW + slotW * 0.12;
      const barW = slotW * 0.68;
      const barH = 38 + v * 160 * (0.75 + profile.contrast * 0.55);
      const y = bandY + bandH - 26 - barH;
      const a = 0.08 + v * 0.42 + profile.fracture * 0.08;

      // Monochrome gradient fill only.
      const grad = ctx.createLinearGradient(x, y, x + barW, y + barH);
      grad.addColorStop(0, `rgba(255,255,255,${a * 0.45})`);
      grad.addColorStop(0.5, `rgba(255,255,255,${a})`);
      grad.addColorStop(1, `rgba(255,255,255,${a * 0.2})`);
      ctx.fillStyle = grad;
      ctx.fillRect(x, y, barW, barH);

      ctx.strokeStyle = 'rgba(255,255,255,0.16)';
      ctx.strokeRect(x, y, barW, barH);
      ctx.fillStyle = 'rgba(0,0,0,0.9)';
      ctx.fillRect(x + barW * 0.13, y + 4, barW * 0.12, Math.max(10, barH * 0.18));
      ctx.strokeStyle = 'rgba(255,255,255,0.12)';
      ctx.strokeRect(x + 1, y + 1, barW - 2, barH - 2);

      // Text labels are intentionally subtle to keep monochrome mood.
      ctx.fillStyle = 'rgba(255,255,255,0.8)';
      ctx.font = '700 9px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      ctx.fillText(Number.isFinite(raw) ? raw.toFixed(raw < 10 ? 2 : 1) : String(raw), x + barW / 2, y - 4);
    }

    // Cross-hatched filter field behind the bars.
    ctx.save();
    ctx.globalAlpha = 1;
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 24; i++) {
      const off = (i - 12) * 24;
      ctx.beginPath();
      ctx.moveTo(bandX + off, bandY);
      ctx.lineTo(bandX + off + bandH, bandY + bandH);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(bandX + bandW - off, bandY);
      ctx.lineTo(bandX + bandW - off - bandH, bandY + bandH);
      ctx.stroke();
    }
    ctx.restore();
    ctx.restore();
  }

  function drawFilterGate(filterSeed, profile) {
    const rng = rngFrom('filter', filterSeed, String(profile.density), String(profile.fracture));
    const mode = pick(rng, ['bands', 'window', 'mesh', 'stencil']);
    const x = 88, y = 118, w = 824, h = 86;

    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.03)';
    ctx.fillRect(x, y, w, h);
    ctx.strokeStyle = 'rgba(255,255,255,0.14)';
    ctx.strokeRect(x, y, w, h);
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.font = '800 34px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText('FILTER', x + 16, y + 14);
    ctx.font = '700 11px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace';
    ctx.fillStyle = 'rgba(255,255,255,0.66)';
    ctx.fillText(filterSeed, x + 16, y + 48);

    ctx.save();
    ctx.translate(x + 312, y + 44);
    ctx.rotate(rr(rng, -0.14, 0.14));
    if (mode === 'bands') {
      for (let i = -6; i < 14; i++) {
        const bw = rr(rng, 12, 34);
        ctx.fillStyle = `rgba(255,255,255,${0.06 + profile.contrast * 0.12})`;
        ctx.fillRect(i * 34, -32, bw, 64);
      }
    } else if (mode === 'window') {
      ctx.strokeStyle = 'rgba(255,255,255,0.18)';
      ctx.strokeRect(-108, -34, 216, 68);
      for (let i = 0; i < 9; i++) ctx.fillRect(-98 + i * 22, -34, 4, 68);
    } else if (mode === 'mesh') {
      for (let i = 0; i < 26; i++) {
        ctx.fillStyle = `rgba(255,255,255,${0.05 + (i / 26) * 0.14})`;
        ctx.fillRect(-120 + i * 10, -32 + (i % 2) * 6, 6, 64);
      }
    } else {
      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      ctx.fillRect(-148, -34, 296, 68);
      ctx.globalCompositeOperation = 'destination-out';
      for (let i = 0; i < 7; i++) {
        ctx.fillRect(-124 + i * 34, -26, 20, 52);
      }
      ctx.globalCompositeOperation = 'source-over';
    }
    ctx.restore();
    ctx.restore();
  }

  function drawRiskDamage(riskSeed, profile) {
    const rng = rngFrom('risk', riskSeed, String(profile.fracture), String(profile.delta));
    const count = 8 + Math.round(profile.fracture * 16);
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    for (let i = 0; i < count; i++) {
      const x1 = rr(rng, 40, SIZE - 40);
      const y1 = rr(rng, 40, SIZE - 40);
      const x2 = x1 + rr(rng, -260, 260) * (0.24 + profile.fracture * 0.9);
      const y2 = y1 + rr(rng, -260, 260) * (0.24 + profile.fracture * 0.9);
      const steps = 7 + Math.round(profile.fracture * 7);
      ctx.strokeStyle = `rgba(255,255,255,${0.08 + profile.fracture * 0.18})`;
      ctx.lineWidth = rr(rng, 1.1, 3.4);
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      for (let s = 1; s <= steps; s++) {
        const t = s / steps;
        const x = x1 + (x2 - x1) * t + rr(rng, -18, 18) * profile.fracture;
        const y = y1 + (y2 - y1) * t + rr(rng, -18, 18) * profile.fracture;
        ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawFrame() {
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.22)';
    ctx.lineWidth = 2;
    ctx.strokeRect(24, 24, SIZE - 48, SIZE - 48);
    ctx.strokeStyle = 'rgba(255,255,255,0.09)';
    ctx.lineWidth = 1;
    ctx.strokeRect(36, 36, SIZE - 72, SIZE - 72);
    ctx.restore();
  }

  function drawAxisLabels(agentSeeds, nums, filterSeed, riskSeed, profile) {
    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.94)';
    ctx.font = '800 36px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
    ctx.textBaseline = 'top';
    ctx.textAlign = 'left';
    ctx.fillText('AGENT', 54, 50);
    ctx.textAlign = 'center';
    ctx.fillText('DSPY', SIZE / 2, 50);
    ctx.save();
    ctx.translate(952, 54);
    ctx.rotate(Math.PI / 2);
    ctx.textAlign = 'left';
    ctx.fillText('RISK', 0, 0);
    ctx.restore();
    ctx.font = '700 11px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace';
    ctx.fillStyle = 'rgba(255,255,255,0.68)';
    ctx.textAlign = 'left';
    ctx.fillText(`agent seeds: ${agentSeeds.join(' · ') || '(none)'}`, 58, 96);
    ctx.fillText(`filter seed: ${filterSeed}`, 58, 918);
    ctx.textAlign = 'right';
    ctx.fillText(`risk seed: ${riskSeed}`, 944, 96);
    ctx.fillText(`score ${profile.score.toFixed(2)} · gain ${profile.gain.toFixed(2)} · cost ${profile.cost.toFixed(2)} · latency ${profile.latency.toFixed(1)}ms`, 944, 918);
    ctx.fillText(`nums ${nums.length} · spread ${profile.spread.toFixed(2)} · density ${profile.density.toFixed(2)}`, 944, 940);
    ctx.restore();
  }

  function render() {
    const agentSeeds = parseSeeds(agentInput.value);
    const filterSeed = filterInput.value.trim() || 'filter';
    const riskSeed = riskInput.value.trim() || 'risk';
    const nums = parseNumbers(dspyInput.value);
    const profile = buildProfile(nums);
    const baseRng = rngFrom('base', agentSeeds.join('|'), filterSeed, riskSeed, nums.join(','));
    const masterRng = rngFrom('master', agentSeeds.join('|'), filterSeed, riskSeed, nums.join(','));

    ctx.clearRect(0, 0, SIZE, SIZE);
    drawPaper(baseRng, profile);
    drawDSPyPanel(nums, profile, filterSeed);
    drawFilterGate(filterSeed, profile);
    drawAgentModules(agentSeeds, profile);
    drawRiskDamage(riskSeed, profile);

    // directional dust in monochrome.
    ctx.save();
    for (let i = 0; i < 84; i++) {
      const t = i / 83;
      const x = 68 + t * 860 + rr(masterRng, -18, 18);
      const y = 500 + Math.sin(t * Math.PI * 2 + masterRng() * 2) * (110 + profile.fracture * 150) + rr(masterRng, -12, 12);
      const s = rr(masterRng, 2, 8);
      ctx.fillStyle = `rgba(255,255,255,${0.08 + t * 0.22})`;
      ctx.fillRect(x, y, s, s);
    }
    ctx.restore();

    drawFrame();
    drawAxisLabels(agentSeeds, nums, filterSeed, riskSeed, profile);

    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    ctx.fillRect(0, 0, SIZE, SIZE);
    ctx.restore();
  }

  function randomize() {
    const token = () => Math.random().toString(36).slice(2, 8);
    const n = 1 + Math.floor(Math.random() * 4);
    agentInput.value = Array.from({ length: n }, () => token()).join(', ');
    const nums = Array.from({ length: 8 }, () => (Math.random() * 2).toFixed(2));
    dspyInput.value = `score=${nums[0]}, gain=${nums[1]}, cost=${nums[2]}, latency=${(Math.random() * 4).toFixed(1)}, steps=${Math.floor(Math.random() * 40 + 8)}, tokens=${Math.floor(Math.random() * 2200 + 400)}, trial=${nums[6]}, delta=${nums[7]}`;
    filterInput.value = `filter-${token()}`;
    riskInput.value = `risk-${token()}`;
    render();
  }

  const params = new URLSearchParams(location.search);
  const agentParam = params.get('agent') || params.get('seed') || params.get('hash');
  const filterParam = params.get('filter');
  const riskParam = params.get('risk');
  const dspyParam = params.get('dspy');
  if (agentParam) agentInput.value = agentParam;
  if (filterParam) filterInput.value = filterParam;
  if (riskParam) riskInput.value = riskParam;
  if (dspyParam) dspyInput.value = dspyParam;

  rerenderBtn.addEventListener('click', render);
  randomizeBtn.addEventListener('click', randomize);
  [agentInput, dspyInput, filterInput, riskInput].forEach(el => el.addEventListener('keydown', e => {
    if (e.key === 'Enter' && (el === agentInput ? (e.metaKey || e.ctrlKey) : true)) render();
  }));

  render();
})();
</script>
</body>
</html>
