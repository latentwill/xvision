<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abstract Panel Preview</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f4eddc;
    }
    canvas {
      display: block;
      margin: 0 auto;
      background: #f4eddc;
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  // Deterministic seed so the preview stays stable.
  let seed = 1337;
  const rand = () => {
    seed = (seed * 1664525 + 1013904223) >>> 0;
    return seed / 4294967296;
  };
  const rrange = (a, b) => a + (b - a) * rand();
  const choice = arr => arr[Math.floor(rand() * arr.length)];

  const W = 900;
  const H = 900;
  canvas.width = W;
  canvas.height = H;

  const palette = {
    paper: '#f5eddd',
    ink: '#111111',
    pink: '#d93c9f',
    magenta: '#b01f7b',
    cyan: '#45cbe3',
    teal: '#1e8d96',
    blue: '#2d4ed8',
    orange: '#ef8a2c',
    gray: '#676767',
    light: 'rgba(255,255,255,0.34)'
  };

  function bg() {
    ctx.fillStyle = palette.paper;
    ctx.fillRect(0, 0, W, H);

    // subtle paper grain
    for (let i = 0; i < 2200; i++) {
      const x = rand() * W;
      const y = rand() * H;
      const a = rrange(0.02, 0.06);
      ctx.fillStyle = `rgba(0,0,0,${a})`;
      ctx.fillRect(x, y, 1, 1);
    }
  }

  function regMarks() {
    ctx.strokeStyle = 'rgba(17,17,17,0.45)';
    ctx.lineWidth = 1.3;
    const m = 30;
    const l = 22;
    const drawCorner = (x, y, dx, dy) => {
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x + dx * l, y);
      ctx.moveTo(x, y);
      ctx.lineTo(x, y + dy * l);
      ctx.stroke();
    };
    drawCorner(m, m, 1, 1);
    drawCorner(W - m, m, -1, 1);
    drawCorner(m, H - m, 1, -1);
    drawCorner(W - m, H - m, -1, -1);
  }

  function swatches(x, y, vertical = true) {
    const cols = [palette.pink, palette.cyan, palette.blue, palette.orange, palette.ink];
    ctx.save();
    ctx.translate(x, y);
    for (let i = 0; i < cols.length; i++) {
      ctx.fillStyle = cols[i];
      if (vertical) ctx.fillRect(0, i * 18, 12, 14);
      else ctx.fillRect(i * 18, 0, 14, 12);
    }
    ctx.restore();
  }

  function rotatedRect(x, y, w, h, angle, fill, alpha = 1) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = fill;
    ctx.fillRect(-w / 2, -h / 2, w, h);
    ctx.restore();
    ctx.globalAlpha = 1;
  }

  function drawNestedSquares() {
    const cx = W / 2;
    const cy = H / 2;

    // main structure
    const layers = 26;
    for (let i = 0; i < layers; i++) {
      const t = i / (layers - 1);
      const s = 560 - t * 430;
      const angle = t * 0.22 + Math.sin(t * 8.0) * 0.03;
      const x = cx + Math.sin(t * 7.1) * 18;
      const y = cy + Math.cos(t * 5.7) * 16;
      const col = choice([
        palette.pink,
        palette.magenta,
        palette.cyan,
        palette.teal,
        palette.blue,
        palette.orange,
        palette.ink
      ]);
      const alpha = 0.26 + t * 0.16;
      rotatedRect(x, y, s, s * rrange(0.58, 0.98), angle, col, alpha);

      // inset bar / cross layers
      if (i % 3 === 0) {
        rotatedRect(x + rrange(-18, 18), y + rrange(-18, 18), s * 0.7, s * 0.12, angle + rrange(-0.12, 0.12), palette.ink, 0.55);
      }
      if (i % 4 === 0) {
        rotatedRect(x + rrange(-12, 12), y + rrange(-12, 12), s * 0.15, s * 0.82, angle + Math.PI / 2, choice([palette.cyan, palette.pink, palette.orange]), 0.42);
      }
    }

    // central density
    for (let i = 0; i < 16; i++) {
      const w = rrange(58, 145);
      const h = rrange(18, 54);
      const a = rrange(-Math.PI / 2, Math.PI / 2);
      const x = cx + rrange(-56, 56);
      const y = cy + rrange(-56, 56);
      const col = choice([palette.ink, palette.blue, palette.pink, palette.cyan, palette.orange]);
      rotatedRect(x, y, w, h, a, col, 0.7);
    }

    // small geometric accents near edges
    for (let i = 0; i < 10; i++) {
      const x = rrange(130, 770);
      const y = rrange(130, 770);
      const size = rrange(16, 42);
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(rrange(0, Math.PI));
      ctx.fillStyle = choice([palette.cyan, palette.pink, palette.orange, palette.blue]);
      ctx.globalAlpha = 0.7;
      ctx.beginPath();
      ctx.moveTo(0, -size);
      ctx.lineTo(size * 0.9, 0);
      ctx.lineTo(0, size);
      ctx.lineTo(-size * 0.35, 0);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    // ring-like contour marks
    ctx.strokeStyle = 'rgba(17,17,17,0.5)';
    ctx.lineWidth = 1.1;
    for (let i = 0; i < 14; i++) {
      ctx.beginPath();
      const r = 42 + i * 11;
      ctx.ellipse(cx - 18, cy + 14, r, r * 0.62, 0.18, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  function draw() {
    bg();

    // faint framing grid suggestion
    ctx.save();
    ctx.strokeStyle = 'rgba(17,17,17,0.08)';
    ctx.lineWidth = 1;
    for (let i = 1; i < 4; i++) {
      ctx.beginPath();
      ctx.moveTo((W / 4) * i, 50);
      ctx.lineTo((W / 4) * i, H - 50);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(50, (H / 4) * i);
      ctx.lineTo(W - 50, (H / 4) * i);
      ctx.stroke();
    }
    ctx.restore();

    drawNestedSquares();
    regMarks();
    swatches(780, 180, true);
    swatches(54, 606, true);
    swatches(726, 722, false);
  }

  draw();
})();
</script>
</body>
</html>
