<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xvision DSPy Color Field — 2x2 Variations</title>
  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 48%, rgba(255,255,255,0.08), transparent 58%),
        linear-gradient(135deg, #050509 0%, #070612 38%, #040404 100%);
    }
    body {
      display: grid;
      place-items: center;
    }
    canvas {
      width: min(96vmin, 1180px);
      height: min(96vmin, 1180px);
      display: block;
      box-shadow: 0 30px 90px rgba(0,0,0,0.72);
      border: 1px solid rgba(255,255,255,0.08);
      background: #050505;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <script>
    (() => {
      const canvas = document.getElementById('c');
      const ctx = canvas.getContext('2d');
      const SIZE = 1200;
      canvas.width = SIZE;
      canvas.height = SIZE;

      const metrics = {
        metric_name: 'delta_sharpe',
        optimizer_name: 'gepa',
        optimizer_version: '0.9.1',
        rng_seed: 4721,
        signature_hash: '9f2a8c2f',
        live_start: -1.42,
        live_end: -17.25,
        live_delta: -15.83,
        live_min: -34.57,
        live_max: -1.21,
        live_mean: -17.12,
        live_stdev: 7.49,
        paper_start: 1.06,
        paper_end: -6.6,
        paper_delta: -7.66,
        paper_min: -25.41,
        paper_max: 8.38,
        paper_mean: -7.41,
        paper_stdev: 8.57,
        dd_min: -34.57,
        dd_mean: -17.12,
        spread_end: -10.65,
        paper_pos: 122,
        paper_neg: 358,
        paper_sign_changes: 15,
        live_sign_changes: 0,
        live_step_vol: 1.121,
        paper_step_vol: 1.126,
        score: 0.84,
        gain: 0.13,
        cost: 0.42,
        latency: 1.7,
        steps: 24,
        tokens: 1870,
        trial: 0.91,
        delta: 0.18,
      };

      const samples = {
        live: [-1.42,-7.86,-8.58,-12.82,-14.31,-9.74,-8.43,-7.98,-14.39,-14.01,-15.61,-18.14,-25.05,-31.32,-26.64,-27.88,-26.19,-31.04,-18.86,-19.85,-14.84,-12.83,-20.44,-17.25],
        paper: [1.06,-5.42,-0.98,-0.65,5.17,8.17,0.21,3.23,0.33,-7.92,-13.05,-12.65,-18.01,-24.61,-17.54,-18.52,-13.6,-9.77,-14.42,-4.75,-9.02,-8.07,-9.03,-6.6],
        dd: [-1.42,-7.86,-8.58,-12.82,-14.31,-9.74,-8.43,-7.98,-14.39,-14.01,-15.61,-18.14,-25.05,-31.32,-26.64,-27.88,-26.19,-31.04,-18.86,-19.85,-14.84,-12.83,-20.44,-17.25],
      };

      function hashString(str) {
        let h = 2166136261 >>> 0;
        for (let i = 0; i < str.length; i++) {
          h ^= str.charCodeAt(i);
          h = Math.imul(h, 16777619);
        }
        return h >>> 0;
      }
      function mulberry32(seed) {
        return function() {
          let t = seed += 0x6D2B79F5;
          t = Math.imul(t ^ (t >>> 15), t | 1);
          t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }
      const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
      const rr = (rng, a, b) => a + (b - a) * rng();
      const pick = (rng, arr) => arr[Math.floor(rng() * arr.length)];
      const map = (v, inMin, inMax, outMin, outMax) => outMin + ((v - inMin) / (inMax - inMin)) * (outMax - outMin);

      const profile = (() => {
        const liveMag = Math.abs(metrics.live_delta);
        const paperMag = Math.abs(metrics.paper_delta);
        const ddMag = Math.abs(metrics.dd_min);
        const spreadMag = Math.abs(metrics.spread_end);
        const liveNorm = clamp(liveMag / 40, 0, 1);
        const paperNorm = clamp(paperMag / 40, 0, 1);
        const ddNorm = clamp(ddMag / 40, 0, 1);
        const spreadNorm = clamp(spreadMag / 20, 0, 1);
        const signNorm = clamp(metrics.paper_sign_changes / 20, 0, 1);
        const liveVolNorm = clamp(metrics.live_step_vol / 2, 0, 1);
        const paperVolNorm = clamp(metrics.paper_step_vol / 2, 0, 1);
        return {
          liveNorm, paperNorm, ddNorm, spreadNorm, signNorm, liveVolNorm, paperVolNorm,
          density: clamp(0.18 + metrics.score * 0.34 + metrics.gain * 0.22 + metrics.trial * 0.16, 0.08, 0.96),
          fracture: clamp(metrics.cost * 0.4 + metrics.latency / 260 + metrics.delta * 0.28, 0.05, 0.98),
          contrast: clamp(0.22 + metrics.score * 0.42 + metrics.delta * 0.2, 0.1, 0.98),
          rhythm: clamp(0.12 + (metrics.steps / 120) + (metrics.live_step_vol + metrics.paper_step_vol) * 0.3, 0.08, 1.2),
        };
      })();

      function hsl(h, s, l, a = 1) { return `hsla(${h}, ${s}%, ${l}%, ${a})`; }
      function paletteForSeed(seed, shift = 0) {
        const base = (hashString(seed) + shift) % 360;
        const sat = 72 + Math.round(profile.contrast * 20);
        const lum = 50;
        return [
          hsl((base + 0) % 360, sat, lum),
          hsl((base + 34) % 360, sat, lum + 7),
          hsl((base + 68) % 360, sat, lum - 4),
          hsl((base + 118) % 360, sat, lum + 5),
          hsl((base + 168) % 360, sat, lum - 5),
          hsl((base + 214) % 360, sat, lum + 2),
          hsl((base + 260) % 360, sat, lum - 2),
        ];
      }

      const masterSeed = `${metrics.optimizer_name}|${metrics.metric_name}|${metrics.rng_seed}|${metrics.signature_hash}`;
      const panelSeeds = [
        `${masterSeed}|q1`,
        `${masterSeed}|q2`,
        `${masterSeed}|q3`,
        `${masterSeed}|q4`,
      ];

      function clear() {
        const bg = ctx.createLinearGradient(0, 0, SIZE, SIZE);
        bg.addColorStop(0, '#050509');
        bg.addColorStop(0.52, '#070611');
        bg.addColorStop(1, '#030304');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, SIZE, SIZE);
        ctx.fillStyle = 'rgba(255,255,255,0.04)';
        ctx.fillRect(0, 0, SIZE, SIZE);
      }

      function panelRect(i) {
        const half = SIZE / 2;
        return {
          x: (i % 2) * half,
          y: Math.floor(i / 2) * half,
          w: half,
          h: half,
        };
      }

      function clipPanel(p) {
        ctx.save();
        ctx.beginPath();
        ctx.rect(p.x, p.y, p.w, p.h);
        ctx.clip();
      }

      function panelBackdrop(p, palette, rng, variant) {
        const grad = ctx.createLinearGradient(p.x, p.y, p.x + p.w, p.y + p.h);
        grad.addColorStop(0, palette[variant % palette.length]);
        grad.addColorStop(0.45, palette[(variant + 2) % palette.length]);
        grad.addColorStop(1, palette[(variant + 4) % palette.length]);
        ctx.fillStyle = grad;
        ctx.fillRect(p.x, p.y, p.w, p.h);

        const glow = ctx.createRadialGradient(
          p.x + p.w * rr(rng, 0.2, 0.8),
          p.y + p.h * rr(rng, 0.2, 0.8),
          0,
          p.x + p.w * rr(rng, 0.2, 0.8),
          p.y + p.h * rr(rng, 0.2, 0.8),
          p.w * rr(rng, 0.55, 0.9)
        );
        glow.addColorStop(0, hsl((hashString(panelSeeds[variant]) + 200) % 360, 88, 62, 0.52));
        glow.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = glow;
        ctx.fillRect(p.x, p.y, p.w, p.h);
      }

      function drawPanelFrame(p) {
        ctx.save();
        ctx.strokeStyle = 'rgba(245,240,228,0.94)';
        ctx.lineWidth = 8;
        ctx.strokeRect(p.x + 8, p.y + 8, p.w - 16, p.h - 16);
        ctx.strokeStyle = 'rgba(10,10,10,0.52)';
        ctx.lineWidth = 2;
        ctx.strokeRect(p.x + 18, p.y + 18, p.w - 36, p.h - 36);
        ctx.restore();
      }

      function draw1(p, rng, palette) {
        // layered circles and rect blocks
        const cx = p.x + p.w * 0.5;
        const cy = p.y + p.h * 0.5;
        for (let i = 0; i < 9; i++) {
          const r = rr(rng, 28, 150) * (0.5 + profile.density * 0.9);
          const ox = rr(rng, -120, 120) * (0.4 + profile.fracture * 0.6);
          const oy = rr(rng, -120, 120) * (0.4 + profile.fracture * 0.6);
          ctx.fillStyle = palette[i % palette.length];
          ctx.globalAlpha = 0.8 - i * 0.05;
          ctx.beginPath();
          ctx.arc(cx + ox, cy + oy, r, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
        for (let i = 0; i < 7; i++) {
          const w = rr(rng, 20, 160);
          const h = rr(rng, 20, 160);
          const x = p.x + rr(rng, 24, p.w - 24 - w);
          const y = p.y + rr(rng, 24, p.h - 24 - h);
          ctx.fillStyle = palette[(i + 3) % palette.length];
          ctx.fillRect(x, y, w, h);
        }
        // small discs
        for (let i = 0; i < 34; i++) {
          ctx.fillStyle = palette[(i + 1) % palette.length];
          ctx.globalAlpha = 0.3 + rng() * 0.55;
          ctx.beginPath();
          ctx.arc(rr(rng, p.x + 36, p.x + p.w - 36), rr(rng, p.y + 36, p.y + p.h - 36), rr(rng, 2, 11), 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      }

      function draw2(p, rng, palette) {
        // stepped rectangles and solid bands
        const bandCount = 10;
        const bandH = p.h / bandCount;
        for (let i = 0; i < bandCount; i++) {
          const y = p.y + i * bandH;
          const inset = rr(rng, 0, p.w * 0.28) * (i / bandCount) * (0.5 + profile.paperNorm);
          ctx.fillStyle = palette[(i + 2) % palette.length];
          ctx.globalAlpha = 0.72;
          ctx.fillRect(p.x + inset, y, p.w - inset * 0.75, bandH + 1);
        }
        ctx.globalAlpha = 1;
        for (let i = 0; i < 8; i++) {
          const w = rr(rng, 26, 150);
          const h = rr(rng, 20, 100);
          const x = p.x + rr(rng, 20, p.w - 20 - w);
          const y = p.y + rr(rng, 18, p.h - 18 - h);
          ctx.fillStyle = palette[(i + 4) % palette.length];
          ctx.fillRect(x, y, w, h);
        }
        // central cross blocks
        ctx.fillStyle = palette[0];
        ctx.fillRect(p.x + p.w * 0.12, p.y + p.h * 0.42, p.w * 0.76, p.h * 0.12);
        ctx.fillStyle = palette[5];
        ctx.fillRect(p.x + p.w * 0.38, p.y + p.h * 0.1, p.w * 0.12, p.h * 0.78);
      }

      function draw3(p, rng, palette) {
        // concentric circles and capsules
        const cx = p.x + p.w * 0.5;
        const cy = p.y + p.h * 0.5;
        const maxR = Math.min(p.w, p.h) * 0.42;
        for (let i = 0; i < 8; i++) {
          const r = maxR * (1 - i / 8) * (0.7 + profile.liveVolNorm * 0.3);
          ctx.strokeStyle = palette[i % palette.length];
          ctx.lineWidth = 16 - i;
          ctx.globalAlpha = 0.88 - i * 0.08;
          ctx.beginPath();
          ctx.arc(cx, cy, r, 0, Math.PI * 2);
          ctx.stroke();
        }
        ctx.globalAlpha = 1;
        for (let i = 0; i < 12; i++) {
          const angle = (i / 12) * Math.PI * 2 + profile.spreadNorm * 0.4;
          const rx = Math.cos(angle) * rr(rng, 40, maxR * 0.85);
          const ry = Math.sin(angle) * rr(rng, 40, maxR * 0.85);
          const w = rr(rng, 26, 74);
          const h = rr(rng, 50, 130);
          ctx.save();
          ctx.translate(cx + rx, cy + ry);
          ctx.rotate(angle + Math.PI / 2);
          ctx.fillStyle = palette[(i + 1) % palette.length];
          ctx.fillRect(-w / 2, -h / 2, w, h);
          ctx.restore();
        }
        // orbit beads
        for (let i = 0; i < 28; i++) {
          const a = (i / 28) * Math.PI * 2;
          const r = maxR * 0.92;
          ctx.fillStyle = palette[i % palette.length];
          ctx.beginPath();
          ctx.arc(cx + Math.cos(a) * r, cy + Math.sin(a) * r, rr(rng, 3, 10), 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function draw4(p, rng, palette) {
        // faceted diamonds and large soft geometry
        for (let i = 0; i < 7; i++) {
          const cx = p.x + rr(rng, 80, p.w - 80);
          const cy = p.y + rr(rng, 80, p.h - 80);
          const rx = rr(rng, 38, 170);
          const ry = rr(rng, 26, 150);
          ctx.fillStyle = palette[(i + 2) % palette.length];
          ctx.globalAlpha = 0.88;
          ctx.beginPath();
          ctx.moveTo(cx, cy - ry);
          ctx.lineTo(cx + rx, cy);
          ctx.lineTo(cx, cy + ry);
          ctx.lineTo(cx - rx, cy);
          ctx.closePath();
          ctx.fill();
        }
        ctx.globalAlpha = 1;
        const disks = 10;
        for (let i = 0; i < disks; i++) {
          const r = rr(rng, 20, 108) * (0.7 + profile.ddNorm * 0.5);
          ctx.fillStyle = palette[i % palette.length];
          ctx.beginPath();
          ctx.arc(rr(rng, p.x + 40, p.x + p.w - 40), rr(rng, p.y + 40, p.y + p.h - 40), r, 0, Math.PI * 2);
          ctx.fill();
        }
        // axis-like blocks, but still purely geometric
        ctx.fillStyle = palette[1];
        ctx.fillRect(p.x + p.w * 0.1, p.y + p.h * 0.76, p.w * 0.8, p.h * 0.08);
        ctx.fillStyle = palette[4];
        ctx.fillRect(p.x + p.w * 0.72, p.y + p.h * 0.12, p.w * 0.08, p.h * 0.68);
      }

      function drawPanel(p, idx) {
        const seed = panelSeeds[idx];
        const rng = mulberry32(hashString(seed));
        const palette = paletteForSeed(seed, idx * 29);
        clipPanel(p);
        panelBackdrop(p, palette, rng, idx);

        if (idx === 0) draw1(p, rng, palette);
        if (idx === 1) draw2(p, rng, palette);
        if (idx === 2) draw3(p, rng, palette);
        if (idx === 3) draw4(p, rng, palette);

        // very light particulate grain, no lines or text
        ctx.globalAlpha = 0.16;
        for (let i = 0; i < 1200; i++) {
          const x = rr(rng, p.x, p.x + p.w);
          const y = rr(rng, p.y, p.y + p.h);
          const s = rr(rng, 0.6, 1.8);
          ctx.fillStyle = 'rgba(255,255,255,0.28)';
          ctx.fillRect(x, y, s, s);
        }
        ctx.globalAlpha = 1;

        // soft vignette inside panel
        const vignette = ctx.createRadialGradient(p.x + p.w / 2, p.y + p.h / 2, p.w * 0.1, p.x + p.w / 2, p.y + p.h / 2, p.w * 0.62);
        vignette.addColorStop(0, 'rgba(0,0,0,0)');
        vignette.addColorStop(1, 'rgba(0,0,0,0.28)');
        ctx.fillStyle = vignette;
        ctx.fillRect(p.x, p.y, p.w, p.h);

        ctx.restore();
        drawPanelFrame(p);
      }

      function drawDivider() {
        ctx.save();
        ctx.strokeStyle = 'rgba(248,243,232,0.62)';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(SIZE / 2, 24);
        ctx.lineTo(SIZE / 2, SIZE - 24);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(24, SIZE / 2);
        ctx.lineTo(SIZE - 24, SIZE / 2);
        ctx.stroke();
        ctx.restore();
      }

      function render() {
        clear();
        drawDivider();
        for (let i = 0; i < 4; i++) drawPanel(panelRect(i), i);
      }

      render();
    })();
  </script>
</body>
</html>
