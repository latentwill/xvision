<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Single Panel Preview</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f5eddc;
    }
    body {
      display: grid;
      place-items: center;
    }
    canvas {
      width: min(92vmin, 980px);
      height: min(92vmin, 980px);
      display: block;
      box-shadow: 0 18px 40px rgba(0,0,0,0.12);
      background: #f5eddc;
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const S = 1000;
  canvas.width = S;
  canvas.height = S;

  const C = {
    paper: '#f5eddc',
    ink: '#111111',
    pink: '#d73f9b',
    magenta: '#a61d79',
    cyan: '#4bd0e5',
    teal: '#22939a',
    blue: '#3053d8',
    orange: '#ef8a2c',
  };

  let seed = 202607;
  function rnd() {
    seed = (seed * 1664525 + 1013904223) >>> 0;
    return seed / 4294967296;
  }
  function r(a, b) { return a + (b - a) * rnd(); }
  function pick(arr) { return arr[Math.floor(rnd() * arr.length)]; }

  function paper() {
    ctx.fillStyle = C.paper;
    ctx.fillRect(0, 0, S, S);
    for (let i = 0; i < 2600; i++) {
      ctx.fillStyle = `rgba(0,0,0,${r(0.01,0.05)})`;
      ctx.fillRect(rnd() * S, rnd() * S, 1, 1);
    }
  }

  function marks() {
    ctx.strokeStyle = 'rgba(17,17,17,0.45)';
    ctx.lineWidth = 1.25;
    const m = 28, l = 22;
    const corners = [
      [m, m, 1, 1], [S-m, m, -1, 1], [m, S-m, 1, -1], [S-m, S-m, -1, -1]
    ];
    for (const [x, y, dx, dy] of corners) {
      ctx.beginPath();
      ctx.moveTo(x, y); ctx.lineTo(x + dx * l, y);
      ctx.moveTo(x, y); ctx.lineTo(x, y + dy * l);
      ctx.stroke();
    }
  }

  function swatches(x, y, vertical=true) {
    const cols = [C.pink, C.cyan, C.blue, C.orange, C.ink];
    for (let i = 0; i < cols.length; i++) {
      ctx.fillStyle = cols[i];
      if (vertical) ctx.fillRect(x, y + i * 17, 11, 13);
      else ctx.fillRect(x + i * 17, y, 13, 11);
    }
  }

  function xBand(cx, cy, size, alpha = 1) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(Math.PI / 4);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = C.ink;
    ctx.fillRect(-size * 0.5, -size * 0.09, size, size * 0.18);
    ctx.fillRect(-size * 0.09, -size * 0.5, size * 0.18, size);
    ctx.globalAlpha = alpha * 0.82;
    ctx.fillStyle = C.cyan;
    ctx.fillRect(-size * 0.5, -size * 0.09 - 6, size, 6);
    ctx.fillRect(-size * 0.09 - 6, -size * 0.5, 6, size);
    ctx.fillStyle = C.pink;
    ctx.fillRect(-size * 0.5, size * 0.09, size, 6);
    ctx.fillRect(size * 0.09, -size * 0.5, 6, size);
    ctx.restore();
    ctx.globalAlpha = 1;
  }

  function contour(cx, cy, size, count) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(r(-0.12, 0.12));
    ctx.strokeStyle = 'rgba(17,17,17,0.66)';
    ctx.lineWidth = 1.15;
    for (let i = 0; i < count; i++) {
      const t = i / (count - 1);
      const s = size * (1 - t * 0.82);
      ctx.strokeRect(-s / 2, -s / 2, s, s * r(0.86, 1.02));
    }
    ctx.restore();
  }

  function render() {
    paper();

    // large layered square stack
    const cx = S / 2;
    const cy = S / 2;
    for (let i = 0; i < 24; i++) {
      const t = i / 23;
      const s = 610 - t * 470;
      const a = t * 0.22 + Math.sin(t * 6.3) * 0.03;
      const col = pick([C.pink, C.magenta, C.cyan, C.teal, C.blue, C.orange, C.ink]);
      ctx.save();
      ctx.translate(cx + Math.sin(t * 7.2) * 14, cy + Math.cos(t * 6.1) * 12);
      ctx.rotate(a);
      ctx.globalAlpha = 0.22 + t * 0.18;
      ctx.fillStyle = col;
      ctx.fillRect(-s / 2, -s / 2, s, s * r(0.64, 0.94));
      if (i % 3 === 0) {
        ctx.fillStyle = C.ink;
        ctx.globalAlpha = 0.45;
        ctx.fillRect(-s * 0.42, -s * 0.05, s * 0.84, s * 0.1);
      }
      if (i % 4 === 0) {
        ctx.fillStyle = pick([C.pink, C.cyan, C.orange]);
        ctx.globalAlpha = 0.42;
        ctx.fillRect(-s * 0.07, -s * 0.42, s * 0.14, s * 0.84);
      }
      ctx.restore();
    }

    // inner cross structure
    for (let i = 0; i < 9; i++) {
      xBand(cx + r(-46, 46), cy + r(-46, 46), r(170, 290), 0.8);
    }

    // nested square contours for the center
    contour(cx - 8, cy + 12, 420, 18);

    // faceted blocks and accents
    for (let i = 0; i < 16; i++) {
      ctx.save();
      const x = cx + r(-84, 84);
      const y = cy + r(-84, 84);
      ctx.translate(x, y);
      ctx.rotate(r(-1, 1));
      ctx.fillStyle = pick([C.pink, C.cyan, C.blue, C.orange, C.ink]);
      ctx.globalAlpha = 0.68;
      ctx.fillRect(-r(18, 58), -r(10, 22), r(40, 110), r(16, 46));
      ctx.restore();
    }

    // perimeter swatches + marks
    marks();
    swatches(770, 168, true);
    swatches(56, 656, true);
    swatches(724, 720, false);
  }

  render();
})();
</script>
</body>
</html>
