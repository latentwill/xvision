<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xvision Riso Strategy Sheet</title>
  <style>
    :root { color-scheme: light; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 45%, rgba(255, 248, 235, 0.92), rgba(245, 236, 220, 0.94) 36%, rgba(229, 218, 202, 0.94) 100%);
    }
    body {
      display: grid;
      place-items: center;
    }
    canvas {
      width: min(96vw, 1520px);
      height: auto;
      aspect-ratio: 1520 / 1880;
      display: block;
      box-shadow: 0 28px 100px rgba(46, 28, 16, 0.22);
      border: 1px solid rgba(85, 62, 40, 0.12);
      background: #f5ede0;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <script>
    (() => {
      const canvas = document.getElementById('c');
      const ctx = canvas.getContext('2d');
      const W = 1520, H = 1880;
      canvas.width = W;
      canvas.height = H;

      const strategies = [
        {
          id: 'fib', name: 'Fibonacci Golden Cross', short: 'Fib · GC', color: '#D4A547', kind: 'Trend',
          metrics: { return: 82.41, sharpe: 1.92, mdd: -18.72, win: 58.6, pf: 1.81 }
        },
        {
          id: 'ema', name: 'EMA Pullback', short: 'EMA · 50/200', color: '#E8DCB0', kind: 'Trend',
          metrics: { return: 46.27, sharpe: 1.41, mdd: -14.38, win: 54.1, pf: 1.46 }
        },
        {
          id: 'brk', name: 'Breakout Retest', short: 'BRK · 4h', color: '#E07A3A', kind: 'Momentum',
          metrics: { return: 28.14, sharpe: 1.07, mdd: -12.93, win: 51.2, pf: 1.32 }
        },
        {
          id: 'msw', name: 'Momentum Swing', short: 'MSW · 1d', color: '#B98AB4', kind: 'Momentum',
          metrics: { return: 12.68, sharpe: 0.74, mdd: -15.91, win: 47.8, pf: 1.18 }
        },
        {
          id: 'mvr', name: 'Mean Reversion AI', short: 'MVR · 15m', color: '#6BAFA8', kind: 'Reversion',
          metrics: { return: 34.12, sharpe: 1.18, mdd: -16.04, win: 53.0, pf: 1.39 }
        },
      ];

      const toNum = (v) => Number.isFinite(v) ? v : 0;
      const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
      const rr = (rng, a, b) => a + (b - a) * rng();
      const mix32 = (h, v) => {
        h ^= v >>> 0;
        h = Math.imul(h, 16777619);
        return h >>> 0;
      };
      function hashStrategy(s) {
        let h = 0x811c9dc5 >>> 0;
        const mix = (x) => {
          const str = typeof x === 'number' ? String(Math.round(x * 1e6)) : String(x);
          for (let i = 0; i < str.length; i++) {
            h ^= str.charCodeAt(i);
            h = Math.imul(h, 16777619);
          }
        };
        mix(s.id);
        mix(s.name);
        mix(s.short);
        mix(s.kind);
        mix(s.color);
        mix(s.metrics.return);
        mix(s.metrics.sharpe);
        mix(s.metrics.mdd);
        mix(s.metrics.win);
        mix(s.metrics.pf);
        return h >>> 0;
      }
      function mulberry32(seed) {
        return function() {
          let t = seed += 0x6D2B79F5;
          t = Math.imul(t ^ (t >>> 15), t | 1);
          t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }
      function hsl(h, s, l, a = 1) { return `hsla(${((h % 360) + 360) % 360}, ${s}%, ${l}%, ${a})`; }
      function hexToRgb(hex) {
        const m = hex.replace('#', '').trim();
        const v = m.length === 3 ? m.split('').map(ch => ch + ch).join('') : m;
        const n = parseInt(v, 16);
        return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
      }
      function rgbToHsl({ r, g, b }) {
        r /= 255; g /= 255; b /= 255;
        const max = Math.max(r, g, b), min = Math.min(r, g, b);
        let h, s, l = (max + min) / 2;
        if (max === min) { h = s = 0; }
        else {
          const d = max - min;
          s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
          switch (max) {
            case r: h = (g - b) / d + (g < b ? 6 : 0); break;
            case g: h = (b - r) / d + 2; break;
            default: h = (r - g) / d + 4; break;
          }
          h *= 60;
        }
        return { h, s: s * 100, l: l * 100 };
      }
      function paletteFor(s, seed, warmBias) {
        const base = rgbToHsl(hexToRgb(s.color));
        const shift = (seed % 17) * 1.1;
        const sat = clamp(18 + warmBias * 8 + (s.metrics.win - 47) * 0.22, 16, 36);
        const lum = clamp(60 - Math.abs(s.metrics.mdd) * 0.12, 50, 72);
        return [
          hsl(base.h + shift, sat + 3, lum + 2, 1),
          hsl(base.h + 22 + shift, sat - 1, lum + 10, 1),
          hsl(base.h - 18 + shift, sat + 6, lum - 5, 1),
          hsl(base.h + 138 + shift, sat - 4, lum + 6, 1),
          hsl(base.h + 196 + shift, sat - 3, lum - 4, 1),
          hsl(base.h + 278 + shift, sat + 1, lum + 3, 1),
          '#14110f'
        ];
      }
      function dims(s) {
        const sharpeN = clamp((s.metrics.sharpe - 0.3) / 1.9, 0, 1);
        const ddN = clamp(Math.abs(s.metrics.mdd) / 25, 0, 1);
        const winN = clamp((s.metrics.win - 45) / 20, 0, 1);
        const pfN = clamp((s.metrics.pf - 1.0) / 1.0, 0, 1);
        const retN = clamp(s.metrics.return / 90, 0, 1);
        return {
          energy: clamp(0.18 + sharpeN * 0.52 + retN * 0.18, 0.18, 0.95),
          density: clamp(0.18 + sharpeN * 0.32 + pfN * 0.18, 0.12, 0.95),
          coherence: clamp(0.16 + pfN * 0.72, 0.12, 0.95),
          darkness: clamp(0.08 + ddN * 0.48, 0.05, 0.6),
          bleed: clamp(0.12 + retN * 0.08 + sharpeN * 0.06, 0.12, 0.25),
          scale: clamp(0.62 + retN * 0.42, 0.6, 1.08),
          warmBias: s.metrics.win >= 52 ? 1 : 0,
          mode: 0,
        };
      }
      function place(v, i, box, rng) {
        const rx = rng();
        const ry = rng();
        const bx = rx + (0.5 - rx) * v.coherence * 0.65;
        const by = ry + (0.5 - ry) * v.coherence * 0.65;
        const x = box.x + box.w * (-v.bleed + bx * (1 + v.bleed * 2));
        const y = box.y + box.h * (-v.bleed + by * (1 + v.bleed * 2));
        return [x, y];
      }
      function size(v, i, minD, rng) {
        const t = Math.pow(rng(), 2.1);
        return minD * (0.32 + v.energy * 0.18) * (0.4 + t * 2.4);
      }
      function bgPaper() {
        const g = ctx.createLinearGradient(0, 0, W, H);
        g.addColorStop(0, '#fbf5ea');
        g.addColorStop(0.5, '#f5ebdd');
        g.addColorStop(1, '#eee0cf');
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = 'rgba(120, 92, 66, 0.03)';
        ctx.fillRect(0, 0, W, H);
      }
      function sheetMarks() {
        ctx.save();
        ctx.strokeStyle = 'rgba(67, 48, 34, 0.26)';
        ctx.lineWidth = 2;
        const m = 20;
        const L = 24;
        const marks = [
          [m, m], [W - m, m], [m, H - m], [W - m, H - m]
        ];
        for (const [x, y] of marks) {
          ctx.beginPath();
          ctx.moveTo(x - L, y); ctx.lineTo(x + L, y);
          ctx.moveTo(x, y - L); ctx.lineTo(x, y + L);
          ctx.stroke();
        }
        ctx.restore();
      }
      function inkSwatches() {
        const sw = [
          ['#f0e6d5', '#14110f'],
          ['#d7c39b', '#14110f'],
          ['#c7a69f', '#14110f'],
          ['#98b3aa', '#14110f']
        ];
        const x0 = W - 274, y0 = H - 70;
        ctx.save();
        ctx.font = '11px monospace';
        ctx.fillStyle = 'rgba(50,35,25,0.62)';
        ctx.fillText('inks', x0, y0 - 8);
        sw.forEach((s, i) => {
          ctx.fillStyle = s[0];
          ctx.fillRect(x0 + i * 62, y0, 34, 18);
          ctx.strokeStyle = 'rgba(35,25,20,0.26)';
          ctx.strokeRect(x0 + i * 62, y0, 34, 18);
        });
        ctx.restore();
      }
      function grain(rng, box, amount = 0.14) {
        ctx.save();
        ctx.globalCompositeOperation = 'multiply';
        for (let i = 0; i < Math.floor(box.w * box.h * amount / 900); i++) {
          const x = rr(rng, box.x, box.x + box.w);
          const y = rr(rng, box.y, box.y + box.h);
          const s = rr(rng, 0.6, 1.6);
          const a = rr(rng, 0.03, 0.08);
          ctx.fillStyle = `rgba(84, 61, 42, ${a})`;
          ctx.fillRect(x, y, s, s);
        }
        ctx.restore();
      }
      function regMarks(box) {
        const p = 16;
        ctx.save();
        ctx.strokeStyle = 'rgba(44, 32, 24, 0.28)';
        ctx.lineWidth = 1.5;
        const pts = [
          [box.x + p, box.y + p],
          [box.x + box.w - p, box.y + p],
          [box.x + p, box.y + box.h - p],
          [box.x + box.w - p, box.y + box.h - p],
        ];
        for (const [x, y] of pts) {
          ctx.beginPath();
          ctx.moveTo(x - 8, y); ctx.lineTo(x + 8, y);
          ctx.moveTo(x, y - 8); ctx.lineTo(x, y + 8);
          ctx.stroke();
        }
        ctx.restore();
      }
      function drawMode(v, rng, box, palette, mode) {
        const minD = Math.min(box.w, box.h);
        const baseN = Math.round(4 + v.energy * 7 + (1 - v.density) * 4);
        ctx.save();
        ctx.beginPath();
        ctx.rect(box.x, box.y, box.w, box.h);
        ctx.clip();

        // core plate
        const plate = ctx.createLinearGradient(box.x, box.y, box.x + box.w, box.y + box.h);
        plate.addColorStop(0, palette[0]);
        plate.addColorStop(0.45, palette[1]);
        plate.addColorStop(1, palette[2]);
        ctx.fillStyle = plate;
        ctx.fillRect(box.x, box.y, box.w, box.h);

        // paper tint + soft shadow plate
        const shadow = ctx.createRadialGradient(box.x + box.w * 0.55, box.y + box.h * 0.45, 0, box.x + box.w * 0.55, box.y + box.h * 0.45, minD * 0.9);
        shadow.addColorStop(0, 'rgba(255,255,255,0.05)');
        shadow.addColorStop(1, 'rgba(0,0,0,0.22)');
        ctx.fillStyle = shadow;
        ctx.fillRect(box.x, box.y, box.w, box.h);

        const darkRate = v.darkness;
        const ink = (i, extra = 0) => {
          if (rng() < darkRate * (0.7 + extra)) return palette[6];
          return palette[(i + Math.floor(rng() * 4)) % 6];
        };

        if (mode === 0) {
          for (let i = 0; i < baseN + 5; i++) {
            const r = size(v, i, minD, rng) * (0.9 + v.scale * 0.18);
            const [x, y] = place(v, i, box, rng);
            ctx.globalAlpha = clamp(0.22 + v.energy * 0.36 - i * 0.018, 0.08, 0.62);
            ctx.fillStyle = ink(i, 0.15);
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fill();
          }
        } else if (mode === 1) {
          for (let i = 0; i < baseN + 3; i++) {
            const [x, y] = place(v, i, box, rng);
            const w = size(v, i, minD, rng) * rr(rng, 0.9, 1.7);
            const h = w * rr(rng, 0.18, 0.58);
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(rr(rng, -1.2, 1.2));
            ctx.globalAlpha = clamp(0.24 + v.energy * 0.3 - i * 0.016, 0.08, 0.56);
            ctx.fillStyle = ink(i, 0.1);
            ctx.fillRect(-w / 2, -h / 2, w, h);
            ctx.restore();
          }
        } else if (mode === 2) {
          for (let i = 0; i < baseN + 2; i++) {
            const [x, y] = place(v, i, box, rng);
            const s = size(v, i, minD, rng) * rr(rng, 0.9, 1.4);
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(rr(rng, 0, Math.PI));
            ctx.globalAlpha = clamp(0.2 + v.energy * 0.33 - i * 0.017, 0.08, 0.58);
            ctx.fillStyle = ink(i, 0.12);
            ctx.beginPath();
            ctx.moveTo(0, -s * 0.58);
            ctx.lineTo(s * 0.58, s * 0.5);
            ctx.lineTo(-s * 0.58, s * 0.5);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
          }
        } else if (mode === 3) {
          const bandCount = 8;
          for (let i = 0; i < bandCount; i++) {
            const y = box.y + (i / bandCount) * box.h;
            const inset = (1 - v.coherence) * rr(rng, 0, box.w * 0.32) * (i / bandCount);
            ctx.globalAlpha = 0.18 + v.energy * 0.26;
            ctx.fillStyle = palette[(i + 1) % 6];
            ctx.fillRect(box.x + inset, y, box.w - inset * 0.8, box.h / bandCount + 1);
          }
          for (let i = 0; i < baseN + 4; i++) {
            const w = size(v, i, minD, rng) * rr(rng, 0.8, 1.6);
            const h = w * rr(rng, 0.12, 0.34);
            const [x, y] = place(v, i, box, rng);
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(rr(rng, -0.4, 0.4));
            ctx.globalAlpha = clamp(0.22 + v.energy * 0.24 - i * 0.014, 0.08, 0.5);
            ctx.fillStyle = ink(i, 0.14);
            ctx.fillRect(-w / 2, -h / 2, w, h);
            ctx.restore();
          }
        } else if (mode === 4) {
          const cx = box.x + box.w * 0.5;
          const cy = box.y + box.h * 0.5;
          for (let i = 0; i < 7; i++) {
            const r = minD * (0.44 - i * 0.045) * (0.72 + v.energy * 0.34);
            ctx.globalAlpha = clamp(0.2 + v.energy * 0.26 - i * 0.025, 0.08, 0.52);
            ctx.strokeStyle = ink(i, 0.08);
            ctx.lineWidth = 18 - i;
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.stroke();
          }
          for (let i = 0; i < baseN + 4; i++) {
            const a = (i / (baseN + 4)) * Math.PI * 2 + rr(rng, -0.18, 0.18);
            const r = minD * rr(rng, 0.18, 0.46) * (0.85 + v.coherence * 0.18);
            const w = size(v, i, minD, rng) * rr(rng, 0.32, 0.86);
            const h = w * rr(rng, 0.8, 1.8);
            ctx.save();
            ctx.translate(cx + Math.cos(a) * r, cy + Math.sin(a) * r);
            ctx.rotate(a + Math.PI / 2);
            ctx.globalAlpha = clamp(0.2 + v.energy * 0.28 - i * 0.012, 0.08, 0.56);
            ctx.fillStyle = ink(i, 0.12);
            ctx.fillRect(-w / 2, -h / 2, w, h);
            ctx.restore();
          }
        } else {
          // layered ribbons / mixed geometry
          for (let i = 0; i < baseN + 5; i++) {
            const [x, y] = place(v, i, box, rng);
            const r = size(v, i, minD, rng) * rr(rng, 0.7, 1.4);
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(rr(rng, -1.3, 1.3));
            ctx.globalAlpha = clamp(0.16 + v.energy * 0.28 - i * 0.012, 0.08, 0.54);
            ctx.fillStyle = ink(i, 0.12);
            ctx.beginPath();
            ctx.moveTo(-r * 0.9, -r * 0.12);
            ctx.bezierCurveTo(-r * 0.3, -r * 1.0, r * 0.4, -r * 0.8, r * 0.9, -r * 0.16);
            ctx.bezierCurveTo(r * 0.3, r * 0.18, -r * 0.3, r * 0.95, -r * 0.9, r * 0.12);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
          }
          for (let i = 0; i < 6; i++) {
            const [x, y] = place(v, i + 4, box, rng);
            const r = size(v, i, minD, rng) * rr(rng, 0.3, 0.9);
            ctx.globalAlpha = 0.14 + v.energy * 0.18;
            ctx.fillStyle = ink(i + 2, 0.08);
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        // highlight dots / risograph noise
        ctx.globalAlpha = 0.14;
        for (let i = 0; i < 900; i++) {
          const x = rr(rng, box.x - box.w * 0.08, box.x + box.w * 1.08);
          const y = rr(rng, box.y - box.h * 0.08, box.y + box.h * 1.08);
          const s = rr(rng, 0.5, 1.5);
          ctx.fillStyle = rng() < 0.86 ? 'rgba(255,255,255,0.20)' : 'rgba(20,17,15,0.10)';
          ctx.fillRect(x, y, s, s);
        }
        ctx.globalAlpha = 1;

        // very subtle silhouette trace from the metrics
        const line = ctx.createLinearGradient(box.x, box.y + box.h * 0.2, box.x + box.w, box.y + box.h * 0.8);
        line.addColorStop(0, 'rgba(255,255,255,0.0)');
        line.addColorStop(0.45, 'rgba(37,29,23,0.10)');
        line.addColorStop(1, 'rgba(255,255,255,0.0)');
        ctx.strokeStyle = line;
        ctx.lineWidth = 2;
        ctx.beginPath();
        const pts = 10;
        for (let i = 0; i <= pts; i++) {
          const t = i / pts;
          const x = box.x + box.w * t;
          const y = box.y + box.h * (0.46 + Math.sin(t * Math.PI * 2 + v.energy * 2.8) * 0.08 + (v.darkness - 0.2) * 0.16);
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.stroke();

        ctx.restore();
      }
      function labelBlock(s, box, v) {
        ctx.save();
        ctx.fillStyle = 'rgba(34, 24, 18, 0.66)';
        ctx.font = '10px monospace';
        ctx.fillText(s.short, box.x + 18, box.y + box.h - 16);
        ctx.fillText(`${s.metrics.return.toFixed(2)} / ${s.metrics.sharpe.toFixed(2)} / ${Math.abs(s.metrics.mdd).toFixed(2)}`, box.x + box.w - 168, box.y + box.h - 16);
        ctx.font = '9px monospace';
        ctx.fillStyle = 'rgba(34, 24, 18, 0.4)';
        ctx.fillText(s.id.toUpperCase(), box.x + box.w - 52, box.y + 18);
        ctx.restore();
      }
      function drawCard(s, box, idx) {
        const seed = hashStrategy(s);
        const rng = mulberry32(seed);
        const v = dims(s);
        const mode = seed % 6;
        const palette = paletteFor(s, seed, v.warmBias);
        ctx.save();
        ctx.fillStyle = 'rgba(255,255,255,0.36)';
        ctx.fillRect(box.x, box.y, box.w, box.h);
        ctx.restore();
        drawMode(v, rng, box, palette, mode);
        grain(rng, box, 0.12 + v.energy * 0.06);
        regMarks(box);
        labelBlock(s, box, v);
        ctx.save();
        ctx.strokeStyle = 'rgba(63, 46, 31, 0.18)';
        ctx.lineWidth = 1.5;
        ctx.strokeRect(box.x + 10, box.y + 10, box.w - 20, box.h - 20);
        ctx.restore();
      }
      function layoutBoxes() {
        const mx = 48, my = 48, gap = 38;
        const cw = (W - mx * 2 - gap) / 2;
        const ch = 332;
        return [
          { x: mx, y: my, w: cw, h: ch },
          { x: mx + cw + gap, y: my, w: cw, h: ch },
          { x: mx, y: my + ch + 54, w: cw, h: ch },
          { x: mx + cw + gap, y: my + ch + 54, w: cw, h: ch },
          { x: mx, y: my + (ch + 54) * 2, w: W - mx * 2, h: ch + 8 },
        ];
      }
      function render() {
        bgPaper();
        sheetMarks();
        const boxes = layoutBoxes();
        strategies.forEach((s, i) => drawCard(s, boxes[i], i));
        inkSwatches();
        ctx.save();
        ctx.fillStyle = 'rgba(44, 32, 24, 0.18)';
        ctx.font = '12px monospace';
        ctx.fillText('deterministic riso strategy sheet', 54, H - 36);
        ctx.restore();
      }
      render();
    })();
  </script>
</body>
</html>
