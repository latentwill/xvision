  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

40px;margin:0 auto;padding:0 28px;}\n\n/* ---- toolbar ---- */\n.toolbar{position:sticky;top:0;z-index:50;background:color-mix(in srgb,var(--page-bg) 88%,transparent);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--page-border-soft);}\n.toolbar .wrap{display:flex;align-items:center;justify-content:space-between;gap:24px;padding-top:13px;padding-bottom:13px;flex-wrap:wrap;}\n.tgroup{display:flex;align-items:center;gap:12px;min-width:0;}\n.tgroup .gl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--page-text-3);font-weight:600;}\n.accents{display:flex;gap:7px;flex-wrap:wrap;}\n.accents button{display:inline-flex;align-items:center;gap:7px;padding:6px 11px 6px 8px;border-radius:8px;border:1px solid var(--page-border);background:var(--page-elev);color:var(--page-text-2);font-family:inherit;font-size:12.5px;font-weight:500;cursor:pointer;transition:border-color .14s,color .14s;}\n.accents button .chip{width:14px;height:14px;border-radius:5px;box-shadow:inset 0 1px 0 rgba(255,255,255,.18);flex:none;}\n.accents button[data-on=\"1\"]{color:var(--page-text);border-color:var(--page-text-3);}\n.accents button[data-on=\"1\"]{box-shadow:0 0 0 1px var(--page-text-3);}\n.seg{display:inline-flex;background:var(--page-elev);border:1px solid var(--page-border);border-radius:8px;padding:3px;gap:3px;flex:none;}\n.seg button{appearance:none;border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;padding:7px 16px;border-radius:6px;color:var(--page-text-3);background:transparent;display:inline-flex;align-items:center;gap:7px;transition:color .15s,background .15s;}\n.seg button[data-on=\"1\"]{color:var(--page-text);background:#2a2f3a;}\n.seg .ic{width:14px;height:14px;}\n\n/* ---- header ---- */\n.phead{padding:48px 0 26px;}\n.eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent-echo,#3B82F6);font-weight:600;margin-bottom:14px;}\n.phead h1{font-size:34px;line-height: 4\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\">'+(ICONS[el.dataset.i]||'')+'<\u002Fsvg>';});}\nrenderIcons();\n\n// accent presets: per theme {accent, blurb}\nconst ACCENTS={\n  azure:  {dark:'#3B82F6', light:'#2563EB', name:'Azure',   blurb:'Classic, trustworthy, unmistakably “interactive.” The safest non-green default.'},\n  cyan:   {dark:'#22D3EE', light:'#0E96B3', name:'Cyan',    blurb:'Electric and technical. Reads as signal/data — energetic without shouting.'},\n  teal:   {dark:'#14C8AE', light:'#0D9488', name:'Teal',    blurb:'Calm blue-green. Distinct from gain-green if you keep gains a brighter, warmer green.'},\n  amber:  {dark:'#F5A524', light:'#B7770C', name:'Amber',   blurb:'Warm and premium — closest in spirit to the retired Folio gold. Watch overlap with the warn tone.'},\n  magenta:{dark:'#EC5FA6', light:'#C42E8E', name:'Magenta', blurb:'Bold and ownable. Carries zero financial meaning, so it never competes with red/green.'},\n  mono:   {dark:'#ECEFF4', light:'#12161C', name:'Mono',    blurb:'No hue at all — chrome in ink/white, green & red the only color on screen. Ultra-restrained.'},\n};\nlet curAccent='azure', curTheme='dark';\n\nfunction cssv(n){return getComputedStyle(document.getElementById('stage')).getPropertyValue(n).trim();}\n\nfunction buildChart(){\n  const wrap=document.getElementById('chartwrap');if(!wrap)return;\n  const W=820,H=200,pad=14;\n  const pts=[0,2,1.5,4,3,5,4.5,6,5.5,8,7,9,8.5,11,10,12.5,11.5,14,13,16,15,17.5,16.5,18.4];\n  const n=pts.length,max=Math.max(...pts),min=Math.min(...pts);\n  const x=i=>pad+i*(W-2*pad)/(n-1), y=v=>H-pad-(v-min)/(max-min)*(H-2*pad);\n  let line='';pts.forEach((v,i)=>{line+=(i?'L':'M')+x(i).toFixed(1)+' '+y(v).toFixed(1)+' ';});\n  const area=line+`L ${x(n-1)} ${H-pad} L ${x(0)} ${H-pad} Z`;\n  const bh=`M ${x(0)} ${y(0.5)} L ${x(n-1)} ${y(13)}`;\n  const pos=cssv('--pos'),acc=cssv('--accent'),t3=cssv('--text-3'),bsoft=cssv('--border-soft'),scard=cssv('--surface-card');\n  let grid='';for(let g=1;g<4;g++){const gy=pad+g*(H-2*pad)/4;grid+=`<line x1=\"${pad}\" y1=\"${gy}\" x2=\"${W-pad}\" y2=\"${gy}\" stroke=\"${bsoft}\" stroke-width=\"1\"/>`;}\n  let mk='';[5,12,18].forEach(i=>{mk+=`<circle cx=\"${x(i).toFixed(1)}\" cy=\"${y(pts[i]).toFixed(1)}\" r=\"3.6\" fill=\"${scard}\" stroke=\"${acc}\" stroke-width=\"1.8\"/>`;});\n  wrap.innerHTML=`<svg viewBox=\"0 0 ${W} ${H}\" preserveAspectRatio=\"none\">\n    <defs><linearGradient id=\"eqf\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0\" stop-color=\"${pos}\" stop-opacity=\"0.26\"/><stop offset=\"1\" stop-color=\"${pos}\" stop-opacity=\"0\"/><\u002FlinearGradient><\u002Fdefs>\n    ${grid}<path d=\"${area}\" fill=\"url(#eqf)\"/>\n    <path d=\"${bh}\" fill=\"none\" stroke=\"${t3}\" stroke-width=\"1.4\" stroke-dasharray=\"4 4\" opacity=\"0.7\"/>\n    <path d=\"${line}\" fill=\"none\" stroke=\"${pos}\" stroke-width=\"2.2\" stroke-linejoin=\"round\" stroke-linecap=\"round\"/>${mk}<\u002Fsvg>`;\n}\n\nfunction apply(){\n  const stage=document.getElementById('stage');\n  const a=ACCENTS[curAccent][curTheme];\n  stage.style.setProperty('--accent',a);\n  stage.dataset.theme=curTheme;\n  // page echo (eyebrow + note dot)\n  document.documentElement.style.setProperty('--accent-echo', ACCENTS[curAccent].dark);\n  // sidebar theme toggle reflect\n  document.getElementById('suntog').classList.toggle('on',curTheme==='light');\n  document.getElementById('moontog').classList.toggle('on',curTheme==='dark');\n  // accent chips swatch colors (show the value for the CURRENT theme)\n  document.querySelectorAll('#accents button').forEach(b=>{\n    b.querySelector('.chip').style.background=ACCENTS[b.dataset.k][curTheme];\n  });\n  document.getElementById('footnote').innerHTML='<b style=\"color:var(--page-text-2)\">'+ACCENTS[curAccent].name+'<\u002Fb> · '+ACCENTS[curAccent].blurb+' &nbsp;—&nbsp; dark <code style=\"font-family:Geist Mono,monospace\">'+ACCENTS[curAccent].dark+'<\u002Fcode> · light <code style=\"font-family:Geist Mono,monospace\">'+ACCENTS[curAccent].light+'<\u002Fcode>';\n  requestAnimationFrame(buildChart);\n}\n\ndocument.getElementById('accents').addEventListener('click',e=>{\n  const b=e.target.closest('button');if(!b)return;curAccent=b.dataset.k;\n  document.querySelectorAll('#accents button').forEach(x=>x.dataset.on=(x===b)?'1':'0');apply();\n});\ndocument.getElementById('themeseg').addEventListener('click',e=>{\n  const b=e.target.closest('button');if(!b)return;curTheme=b.dataset.theme;\n  document.querySelectorAll('#themeseg button').forEach(x=>x.dataset.on=(x===b)?'1':'0');apply();\n});\n// in-mock theme toggle mirrors the top control\ndocument.getElementById('suntog').addEventListener('click',()=>{curTheme='light';document.querySelectorAll('#themeseg button').forEach(x=>x.dataset.on=(x.dataset.theme==='light')?'1':'0');apply();});\ndocument.getElementById('moontog').addEventListener('click',()=>{curTheme='dark';document.querySelectorAll('#themeseg button').forEach(x=>x.dataset.on=(x.dataset.theme==='dark')?'1':'0');apply();});\n\n// robust scaling\nconst frame=document.querySelector('.stageframe'),stage=document.getElementById('stage');\nfunction fit(){\n  const avail=frame.parentElement.clientWidth;\n  if(!avail||avail<200){requestAnimationFrame(fit);return;}\n  const scale=Math.min(1,avail/1180);\n  stage.style.transform='scale('+scale+')';\n  frame.style.height=(stage.offsetHeight*scale)+'px';\n}\nif(window.ResizeObserver){new ResizeObserver(()=>fit()).observe(frame.parentElement);}\nwindow.addEventListener('resize',fit);\n(document.fonts&&document.fonts.ready?document.fonts.ready:Promise.resolve()).then(()=>requestAnimationFrame(()=>requestAnimationFrame(fit)));\napply();\nrequestAnimationFrame(()=>requestAnimationFrame(fit));\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
