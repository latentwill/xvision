<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>XVN · Capsule · Multi-Eval (handoff)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    /* XVN Signal tokens */
    :root {
      --bg:               #000000;
      --surface-sidebar:  #000000;
      --surface-card:     #0A0A0A;
      --surface-elev:     #0E0E0E;
      --surface-panel:    #121212;
      --surface-hover:    rgba(255,255,255,0.04);
      --border:           #1A1A1A;
      --border-strong:    #2A2A2A;
      --border-soft:      #141414;
      --text:             #FFFFFF;
      --text-2:           #9CA3AF;
      --text-3:           #5F6670;
      --text-4:           #3A3F47;
      --gold:             #00E676;
      --gold-soft:        #00B85F;
      --gold-bg:          rgba(0,230,118,0.10);
      --gold-bg-strong:   rgba(0,230,118,0.18);
      --warn:             #FFB020;
      --danger:           #FF4D4D;
      --info:             #5FA8FF;
    }
    html, body, #root { height: 100%; }
    body { background: var(--bg); color: var(--text); font-family: 'Geist', ui-sans-serif, system-ui, sans-serif; }
    .font-mono, code, kbd { font-family: 'Geist Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .font-serif { font-family: 'Geist', sans-serif; font-weight: 600; letter-spacing: -0.02em; }
    .text-text   { color: var(--text); }
    .text-text-2 { color: var(--text-2); }
    .text-text-3 { color: var(--text-3); }
    .text-text-4 { color: var(--text-4); }
    .text-gold   { color: var(--gold); }
    .text-danger { color: var(--danger); }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // ──────────────────────────────────────────────────────────────────
    //  XVN · Floating capsule for concurrent eval runs
    //
    //  Props:
    //    focused         { short, status, spans, elapsed, cost, currentSpan? }
    //    siblings        [{ id, short, strategy, scenario, status, spans, elapsed, cost }]
    //    onSwitchFocus   (run) => void   — clicking a sibling row swaps which eval is focused
    //    onExpandDock    () => void      — opens the trace dock
    //    onPopOut        () => void      — opens this eval's dedicated route
    //
    //  States                ::  collapsed (pill, 1 row) → expanded (rounded card, N rows)
    //  Identifier            ::  `strategy·scenario` short-tag (e.g. mr·flash, mom·opex)
    //  Errored siblings      ::  promoted to top of the stack + auto-opens the capsule
    //  Status colors         ::  eval=info  pass=gold  warn=amber  error=danger  queued=text-3
    // ──────────────────────────────────────────────────────────────────

    const { useEffect, useState, useRef } = React;

    const ST = {
      eval:   { tint: "var(--info)",   label: "RUNNING",   pulse: true  },
      pass:   { tint: "var(--gold)",   label: "COMPLETED", pulse: false },
      warn:   { tint: "var(--warn)",   label: "WARN",      pulse: false },
      error:  { tint: "var(--danger)", label: "ERROR",     pulse: true  },
      queued: { tint: "var(--text-3)", label: "QUEUED",    pulse: false },
    };

    // One row — used for the focused eval AND every sibling when expanded.
    function EvalLine({ run, focused, onClick, currentSpan }) {
      const c = ST[run.status] || ST.eval;
      return (
        <button
          onClick={onClick}
          disabled={focused}
          className="h-9 w-full flex items-center gap-3 px-3 text-left transition-colors"
          style={{
            background: focused ? "rgba(0,230,118,0.06)" : "transparent",
            borderLeft: `2px solid ${focused ? "var(--gold)" : "transparent"}`,
            cursor: focused ? "default" : "pointer",
          }}
          onMouseEnter={(e) => { if (!focused) e.currentTarget.style.background = "var(--surface-hover)"; }}
          onMouseLeave={(e) => { if (!focused) e.currentTarget.style.background = "transparent"; }}
        >
          <span
            className={`inline-block w-1.5 h-1.5 rounded-full shrink-0 ${c.pulse ? "animate-pulse" : ""}`}
            style={{ background: c.tint, boxShadow: `0 0 0 3px ${c.tint}22` }}
          ></span>

          <span className="flex items-center gap-2 shrink-0">
            <span className="text-[10px] font-mono tracking-[0.18em] text-text-3">EVAL</span>
            <span className="text-[11px] font-mono" style={{ color: c.tint }}>{run.short}</span>
            <span className="text-[10px] font-mono tracking-[0.18em] text-text-3">· {c.label}</span>
          </span>

          <span className="w-px h-4 shrink-0" style={{ background: "var(--border)" }}></span>

          <span className="text-text font-mono text-[11px] shrink-0">
            <span className="text-text-3">spans </span><span className="tabular-nums">{run.spans}</span>
            <span className="text-text-4 mx-2">·</span>
            <span className="tabular-nums">{run.elapsed}</span>
            <span className="text-text-4 mx-2">·</span>
            <span className="tabular-nums">{run.cost}</span>
          </span>

          {focused && currentSpan && (
            <>
              <span className="w-px h-4 shrink-0" style={{ background: "var(--border)" }}></span>
              <span className="flex items-center gap-1.5 min-w-0 max-w-[220px]">
                <span className="w-1.5 h-1.5 rounded-full animate-pulse shrink-0"
                  style={{ background: currentSpan.color, boxShadow: `0 0 0 3px ${currentSpan.color}22` }}></span>
                <span className="text-[10px] font-mono tracking-[0.16em] shrink-0" style={{ color: currentSpan.color }}>{currentSpan.label}</span>
                <span className="text-[11px] font-mono text-text truncate">{currentSpan.name}</span>
                {currentSpan.elapsed != null && (
                  <span className="text-[10px] font-mono tabular-nums text-text-3 shrink-0">{currentSpan.elapsed}</span>
                )}
              </span>
            </>
          )}

          {!focused && (
            <span className="ml-auto text-[9px] font-mono tracking-[0.18em] text-text-4 shrink-0">SWITCH →</span>
          )}
        </button>
      );
    }

    function Capsule({ focused, siblings = [], onSwitchFocus, onExpandDock, onPopOut }) {
      // Errored siblings always promoted to the top.
      const errored = siblings.filter(s => s.status === "error");
      const others  = siblings.filter(s => s.status !== "error");
      const ordered = [...errored, ...others];

      const [expanded, setExpanded] = useState(false);

      // Auto-open the capsule when a NEW error appears (assertive — right call for trading).
      const lastErrorCount = useRef(errored.length);
      useEffect(() => {
        if (errored.length > lastErrorCount.current) setExpanded(true);
        lastErrorCount.current = errored.length;
      }, [errored.length]);

      const anyError = ordered.some(s => s.status === "error") || focused.status === "error";
      const anyWarn  = ordered.some(s => s.status === "warn")  || focused.status === "warn";
      const borderColor = anyError ? "var(--danger)" : anyWarn ? "var(--warn)" : "var(--border-strong)";

      const hasSiblings = ordered.length > 0;
      const errorCount  = errored.length;

      return (
        <div
          className="fixed left-1/2 -translate-x-1/2 z-40 select-none whitespace-nowrap flex flex-col overflow-hidden"
          style={{
            bottom: 14,
            background: "var(--surface-elev)",
            border: `1px solid ${borderColor}`,
            borderRadius: expanded ? 12 : 999,
            boxShadow: "0 14px 40px rgba(0,0,0,0.55), 0 0 0 1px rgba(0,0,0,0.4)",
            backdropFilter: "blur(8px)",
            maxWidth: "calc(100vw - 32px)",
            minWidth: 520,
            transition: "border-radius 180ms ease",
          }}
        >
          {/* Focused-eval row (always rendered) */}
          <div className="flex items-stretch" style={{ borderBottom: expanded ? "1px solid var(--border)" : "none" }}>
            <EvalLine run={focused} focused={true} currentSpan={focused.currentSpan} onClick={() => {}}/>

            {/* Trailing controls */}
            <div className="flex items-center gap-0.5 pr-1 shrink-0">
              {hasSiblings && (
                <button
                  onClick={(e) => { e.stopPropagation(); setExpanded(v => !v); }}
                  title={expanded ? "Collapse" : `Show ${ordered.length} other eval${ordered.length === 1 ? "" : "s"}`}
                  className="h-7 px-2 mx-0.5 flex items-center gap-1.5 rounded-full text-[10px] font-mono tracking-[0.16em]"
                  style={{
                    background: anyError ? "rgba(200,68,58,0.10)" : expanded ? "var(--gold-bg)" : "var(--surface-card)",
                    border: `1px solid ${anyError ? "var(--danger)" : expanded ? "var(--gold-soft)" : "var(--border-strong)"}`,
                    color: anyError ? "var(--danger)" : expanded ? "var(--gold)" : "var(--text-2)",
                  }}
                >
                  <span>+{ordered.length}</span>
                  <span className="text-text-4">·</span>
                  <span>{ordered.length === 1 ? "OTHER" : "OTHERS"}</span>
                  {errorCount > 0 && !expanded && (
                    <>
                      <span className="text-text-4">·</span>
                      <span style={{ color: "var(--danger)" }}>{errorCount} ERR</span>
                    </>
                  )}
                </button>
              )}

              <button
                onClick={(e) => { e.stopPropagation(); onExpandDock && onExpandDock(); }}
                title="Expand trace dock"
                className="h-7 w-7 flex items-center justify-center text-text-3 hover:text-gold rounded-full">
                <svg width="11" height="11" viewBox="0 0 16 16" fill="none"><path d="M3 10l5-5 5 5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>
              </button>
              <button
                onClick={(e) => { e.stopPropagation(); onPopOut && onPopOut(); }}
                title="Open in dedicated route"
                className="h-7 w-7 flex items-center justify-center text-text-3 hover:text-text rounded-full">
                <svg width="11" height="11" viewBox="0 0 16 16" fill="none"><path d="M6 3h7v7M13 3l-7 7M3 8v5h5" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/></svg>
              </button>
            </div>
          </div>

          {/* Expanded body: one row per sibling */}
          {expanded && hasSiblings && (
            <div className="flex flex-col">
              {ordered.map((r, i) => (
                <div key={r.id} style={{ borderTop: i === 0 ? "none" : "1px solid var(--border-soft)" }}>
                  <EvalLine run={r} focused={false} onClick={() => onSwitchFocus && onSwitchFocus(r)}/>
                </div>
              ))}
              <div className="px-3 py-1.5 text-[9px] font-mono tracking-[0.18em] text-text-4 flex items-center justify-between"
                style={{ borderTop: "1px solid var(--border-soft)", background: "var(--surface-card)" }}>
                <span>{ordered.length + 1} EVAL{ordered.length === 0 ? "" : "S"} RUNNING ON CLUSTER</span>
                <span>CLICK ROW → SWITCH FOCUS</span>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ──────────────────────────────────────────────────────────────────
    //  Demo harness — gives you 4 preset scenarios + a slider for counts.
    //  In your app, just mount <Capsule focused={...} siblings={...} /> and you're done.
    // ──────────────────────────────────────────────────────────────────

    const SIBLING_POOL = [
      { id: "b22a91", short: "mom·opex",   strategy: "momentum-breakout-v2", scenario: "opex-2023-09",        status: "eval",   elapsed: "0:38", spans: 31, cost: "$0.11" },
      { id: "c781ef", short: "pair·china", strategy: "pairs-stat-arb-v7",    scenario: "china-2015-08",       status: "eval",   elapsed: "1:22", spans: 64, cost: "$0.34" },
      { id: "d041aa", short: "vol·vix",    strategy: "vol-target-v1",        scenario: "vix-spike-2018-02",   status: "warn",   elapsed: "0:51", spans: 42, cost: "$0.19" },
      { id: "e9183c", short: "mr·calm",    strategy: "mean-reversion-v3",    scenario: "calm-monday-2024-06", status: "pass",   elapsed: "3.4s", spans: 47, cost: "$0.18" },
      { id: "f5520b", short: "liq·fed",    strategy: "liquidity-vwap-v4",    scenario: "fed-decision-2023-09",status: "error",  elapsed: "0:12", spans: 8,  cost: "$0.04" },
      { id: "g8f33d", short: "mom·aapl",   strategy: "momentum-breakout-v2", scenario: "earnings-aapl-q3",    status: "eval",   elapsed: "0:07", spans: 4,  cost: "$0.02" },
      { id: "h2c019", short: "mr·2010",    strategy: "mean-reversion-v3",    scenario: "flash-crash-2010-05", status: "queued", elapsed: "—",   spans: 0,  cost: "$0.00" },
      { id: "j6ab47", short: "pair·opex",  strategy: "pairs-stat-arb-v7",    scenario: "opex-2024-03",        status: "eval",   elapsed: "0:29", spans: 22, cost: "$0.09" },
    ];

    const PRESETS = {
      single:    { count: 0, override: null,            label: "Single eval — no siblings" },
      few:       { count: 3, override: null,            label: "3 concurrent (mixed states)" },
      many:      { count: 6, override: null,            label: "6 concurrent (mixed)" },
      oneError:  { count: 5, override: "one-error",     label: "5 concurrent · 1 errored (auto-opens)" },
      allDone:   { count: 4, override: "finished",      label: "4 concurrent · all completed" },
    };

    function App() {
      const [preset, setPreset] = useState("few");
      const cfg = PRESETS[preset];

      const siblings = (() => {
        const base = SIBLING_POOL.slice(0, cfg.count);
        if (cfg.override === "one-error")  return base.map((s, i) => ({ ...s, status: i === 0 ? "error" : "eval" }));
        if (cfg.override === "finished")   return base.map(s => ({ ...s, status: "pass" }));
        return base;
      })();

      const focused = {
        id: "abc1234",
        short: "mr·flash",
        status: "eval",
        spans: 47,
        elapsed: "0:43",
        cost: "$0.18",
        currentSpan: { color: "#7dd3fc", label: "MODEL", name: "model.call claude-haiku", elapsed: "880ms" },
      };

      const [toast, setToast] = useState("");
      useEffect(() => { if (!toast) return; const t = setTimeout(() => setToast(""), 2400); return () => clearTimeout(t); }, [toast]);

      return (
        <div className="min-h-screen w-screen flex flex-col">
          {/* page chrome — purely so you can see the capsule in context */}
          <header className="px-8 pt-10 pb-6 max-w-[1100px] mx-auto w-full">
            <div className="flex items-baseline gap-3 mb-2">
              <span className="font-serif text-[28px] text-gold" style={{ fontWeight: 700 }}>xvn</span>
              <span className="text-text-4">/</span>
              <span className="text-[11px] font-mono tracking-[0.18em] text-text-3 uppercase">design · capsule · multi-eval</span>
            </div>
            <h1 className="font-serif text-[32px] text-text leading-tight" style={{ fontWeight: 500 }}>
              <span>Eval-run capsule</span> &nbsp;<span className="font-mono text-[22px] text-text-2">multi-eval</span>
            </h1>
            <p className="mt-3 text-[13px] text-text-2 max-w-[640px] leading-relaxed">
              A single floating capsule for an in-flight eval. When other evals are running concurrently
              on the cluster, the capsule grows downward into a stack — one row per eval, formatted identically.
              Click a non-focused row to switch which eval you're inspecting. Errors auto-open the capsule
              and promote the errored row to the top.
            </p>
          </header>

          {/* preset switcher */}
          <section className="px-8 pb-8 max-w-[1100px] mx-auto w-full">
            <div className="text-[10px] font-mono tracking-[0.18em] text-text-3 mb-2">SCENARIO</div>
            <div className="flex flex-wrap items-center gap-1.5">
              {Object.entries(PRESETS).map(([k, p]) => {
                const on = k === preset;
                return (
                  <button key={k} onClick={() => setPreset(k)}
                    className="h-8 px-3 text-[11px] font-mono rounded-full transition-colors"
                    style={{
                      background: on ? "var(--gold-bg)" : "var(--surface-card)",
                      border: `1px solid ${on ? "var(--gold-soft)" : "var(--border)"}`,
                      color: on ? "var(--gold)" : "var(--text-2)",
                    }}>
                    {p.label}
                  </button>
                );
              })}
            </div>

            {/* spec card */}
            <div className="mt-8 grid grid-cols-12 gap-5">
              <div className="col-span-12 lg:col-span-7 rounded-md p-5"
                style={{ background: "var(--surface-card)", border: "1px solid var(--border)" }}>
                <div className="text-[10px] font-mono tracking-[0.18em] text-text-3 mb-3">ANATOMY</div>
                <ul className="space-y-2 text-[12px] text-text-2 leading-relaxed">
                  <li><span className="text-gold font-mono">Focused eval row.</span> Status dot · <code className="text-text">EVAL</code> · <code className="text-text">strategy·scenario</code> · <code className="text-text">RUNNING</code> · spans · elapsed · cost · current trace span.</li>
                  <li><span className="text-gold font-mono">+N · OTHERS toggle.</span> Pill button on the right edge. Click → capsule grows. Border turns red and label adds <code className="text-danger">N ERR</code> when any sibling errored.</li>
                  <li><span className="text-gold font-mono">Expanded stack.</span> One row per concurrent eval, identical layout to the focused row, gold left-rule on focused. Non-focused rows show a <code className="text-text">SWITCH →</code> hint and become clickable.</li>
                  <li><span className="text-gold font-mono">Auto-open on error.</span> A newly-errored sibling forces the capsule open and promotes to the top. Manual collapse is respected until a new error fires.</li>
                  <li><span className="text-gold font-mono">Identifier.</span> Short <code className="text-text">strategy·scenario</code> tag — never the hex run-id.</li>
                </ul>
              </div>
              <div className="col-span-12 lg:col-span-5 rounded-md p-5"
                style={{ background: "var(--surface-card)", border: "1px solid var(--border)" }}>
                <div className="text-[10px] font-mono tracking-[0.18em] text-text-3 mb-3">STATUS TOKENS</div>
                <div className="space-y-1.5 text-[11px] font-mono">
                  {[
                    ["eval",   "RUNNING",   "var(--info)",   "in flight"],
                    ["pass",   "COMPLETED", "var(--gold)",   "finished, ok"],
                    ["warn",   "WARN",      "var(--warn)",   "supervisor flagged"],
                    ["error",  "ERROR",     "var(--danger)", "halt / failure"],
                    ["queued", "QUEUED",    "var(--text-3)", "scheduled"],
                  ].map(([k, lbl, color, hint]) => (
                    <div key={k} className="flex items-center gap-3">
                      <span className="inline-block w-1.5 h-1.5 rounded-full" style={{ background: color, boxShadow: `0 0 0 3px ${color}22` }}></span>
                      <code className="text-text w-14 shrink-0">{k}</code>
                      <span className="text-text-2 w-20 shrink-0" style={{ color }}>{lbl}</span>
                      <span className="text-text-3">{hint}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* prop signature */}
            <div className="mt-5 rounded-md p-5 text-[11px] font-mono leading-relaxed"
              style={{ background: "var(--surface-card)", border: "1px solid var(--border)" }}>
              <div className="text-[10px] tracking-[0.18em] text-text-3 mb-3">PROPS</div>
              <pre className="text-text-2 overflow-x-auto" style={{ whiteSpace: "pre" }}>{
`<Capsule
  focused={{
    short: "mr·flash",          // strategy·scenario short tag
    status: "eval",             // eval | pass | warn | error | queued
    spans: 47, elapsed: "0:43", cost: "$0.18",
    currentSpan: { color, label, name, elapsed },   // optional — the active trace leaf
  }}
  siblings={[
    { id, short, strategy, scenario, status, spans, elapsed, cost },
    // … any number; errored siblings are auto-promoted to the top.
  ]}
  onSwitchFocus={(run) => navigate(\`/eval-runs/\${run.id}\`)}
  onExpandDock={() => setDockOpen(true)}
  onPopOut={() => navigate(\`/eval-runs/\${focused.id}\`)}
/>`
              }</pre>
            </div>
          </section>

          <div className="flex-1"></div>

          {/* the capsule itself, fixed at bottom */}
          <Capsule
            focused={focused}
            siblings={siblings}
            onSwitchFocus={(r) => setToast(`Would navigate → /eval-runs/${r.id} (${r.strategy})`)}
            onExpandDock={() => setToast("Would open trace dock")}
            onPopOut={() => setToast(`Would open /eval-runs/${focused.id}`)}
          />

          {/* toast */}
          {toast && (
            <div className="fixed top-4 left-1/2 -translate-x-1/2 z-50 px-3 py-1.5 rounded-md text-[11px] font-mono"
              style={{ background: "var(--surface-elev)", border: "1px solid var(--border-strong)", color: "var(--text)", boxShadow: "0 14px 40px rgba(0,0,0,0.5)" }}>
              <span className="text-gold mr-2">›</span>{toast}
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
