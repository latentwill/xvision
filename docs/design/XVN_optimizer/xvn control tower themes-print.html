<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>xvn — Control Tower theme explorations (print)</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="themes.css"/>
<style>
  html, body {
    background: #050505;
    margin: 0; padding: 0;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  .page {
    width: 1440px;
    height: 900px;
    overflow: hidden;
    page-break-after: always;
    break-after: page;
    break-inside: avoid;
    position: relative;
    background: #050505;
  }
  .page:last-child {
    page-break-after: auto;
    break-after: auto;
  }
  .page-label {
    position: absolute;
    top: 16px;
    left: 24px;
    z-index: 5;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    padding: 4px 10px;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 3px;
    background: rgba(0,0,0,0.4);
  }
  @page {
    size: 1440px 900px;
    margin: 0;
  }
  @media print {
    body { background: #050505 !important; }
    .page { box-shadow: none !important; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="theme-home.jsx"></script>

<script type="text/babel" data-presets="react">
const THEMES = [
  { id: 'elfa',       label: 'Theme 1 · Elfa — crypto native, electric lime, sharp mono' },
  { id: 'editorial',  label: 'Theme 2 · Editorial mono — Plex without gold' },
  { id: 'spotify',    label: 'Theme 3 · Spotify — rounded chunky, bright green, bold sans' },
  { id: 'robinhood',  label: 'Theme 4 · Robinhood — minimal hairlines, hero number' },
];

const App = () => (
  <>
    {THEMES.map(t => (
      <div key={t.id} className="page">
        <div className="page-label">{t.label}</div>
        <ThemedHome theme={t.id} />
      </div>
    ))}
  </>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

// Auto-print once fonts have settled and layout is stable.
(async () => {
  try { await document.fonts.ready; } catch (e) {}
  await new Promise(r => setTimeout(r, 800));
  window.print();
})();
</script>
</body>
</html>
