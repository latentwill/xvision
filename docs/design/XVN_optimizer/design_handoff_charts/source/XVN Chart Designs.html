<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>XVN · Chart Designs</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=Geist+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- Chart libs -->
<link rel="stylesheet" href="https://unpkg.com/uplot@1.6.30/dist/uPlot.min.css">
<script src="https://unpkg.com/uplot@1.6.30/dist/uPlot.iife.min.js"></script>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<link rel="stylesheet" href="charts/chart-theme.css">

<style>
  html, body { background: #000000; }
  #root { width: 100vw; height: 100vh; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="charts/chart-data.js"></script>
  <script src="charts/chart-helpers.js"></script>

  <!-- chart components -->
  <script type="text/babel" src="charts/candle-chart.jsx"></script>
  <script type="text/babel" src="charts/chart-dark-minimal.jsx"></script>
  <script type="text/babel" src="charts/chart-comparison-ab.jsx"></script>
  <script type="text/babel" src="charts/chart-ai-annotation.jsx"></script>
  <script type="text/babel" src="charts/chart-liquidation-heatmap.jsx"></script>
  <script type="text/babel" src="charts/chart-gradient-dashboard.jsx"></script>

  <!-- design canvas -->
  <script type="text/babel" src="charts/design-canvas.jsx"></script>

  <script type="text/babel">
    function App(){
      return (
        <DesignCanvas title="XVN — Chart Designs" subtitle="Five chart concepts · uPlot + KlineCharts · pick favorites then narrow to v2/v3" defaultArtboardId="dark-minimal">
          <DCSection id="dashboards" title="Full Dashboards">
            <DCArtboard id="dark-minimal" label="01 · Dark Minimal Strategy Dashboard" width={1440} height={900}>
              <ChartDarkMinimal/>
            </DCArtboard>
            <DCArtboard id="comparison-ab" label="02 · Comparison AB · Scalable" width={1440} height={900}>
              <ChartComparisonAB/>
            </DCArtboard>
            <DCArtboard id="gradient" label="05 · Gradient Warm · xvn re-imagined" width={1440} height={900}>
              <ChartGradientDashboard/>
            </DCArtboard>
          </DCSection>

          <DCSection id="chart-frames" title="Chart Frames (chart-only)">
            <DCArtboard id="ai-annotation" label="03 · AI Annotation Chart" width={1200} height={680}>
              <ChartAIAnnotation/>
            </DCArtboard>
            <DCArtboard id="liquidation-heatmap" label="04 · Liquidation Heatmap" width={1200} height={680}>
              <ChartLiquidationHeatmap/>
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
