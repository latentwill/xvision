<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>XVN · Eval Run · Mobile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:               #000000;
      --surface-sidebar:  #000000;
      --surface-card:     #0A0A0A;
      --surface-elev:     #0E0E0E;
      --surface-panel:    #121212;
      --surface-hover:    rgba(255,255,255,0.04);
      --border:           #1A1A1A;
      --border-strong:    #2A2A2A;
      --border-soft:      #141414;
      --text:             #FFFFFF;
      --text-2:           #9CA3AF;
      --text-3:           #5F6670;
      --text-4:           #3A3F47;
      --gold:             #00E676;
      --gold-soft:        #00B85F;
      --gold-bg:          rgba(0,230,118,0.10);
      --gold-bg-strong:   rgba(0,230,118,0.18);
      --warn:             #FFB020;
      --danger:           #FF4D4D;
      --info:             #5FA8FF;
    }
    html, body, #root { height: 100%; }
    body {
      background: #000000;
      color: var(--text);
      font-family: 'Geist', ui-sans-serif, system-ui, sans-serif;
      margin: 0;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.55; }
    }
    /* hide scrollbars inside artboards */
    *::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="mobile-screens.jsx"></script>
  <script type="text/babel">
    function Phone({ scenario }) {
      return (
        <IOSDevice width={390} height={844} dark={true}>
          <MobileApp scenario={scenario}/>
        </IOSDevice>
      );
    }

    function Root() {
      return (
        <DesignCanvas>
          <DCSection id="primary" title="Eval Run Detail · Mobile"
            subtitle="LIVE run · trace observability translated to phone — sticky LIVE strip replaces floating desktop pill, TRACE tab replaces dock, bottom sheets replace inline inspector">

            <DCArtboard id="trace-live" label="01 · Trace tab · LIVE" width={390} height={844}>
              <Phone scenario={{ tab: "TRACE", isLive: true, liveDuration: 43, selectedSpan: "s6" }}/>
            </DCArtboard>

            <DCArtboard id="span-sheet" label="02 · Span inspector sheet" width={390} height={844}>
              <Phone scenario={{ tab: "TRACE", isLive: true, liveDuration: 43, selectedSpan: "s6", sheet: "span" }}/>
            </DCArtboard>

            <DCArtboard id="filter-sheet" label="03 · Filter sheet" width={390} height={844}>
              <Phone scenario={{ tab: "TRACE", isLive: true, liveDuration: 43, selectedSpan: "s6", sheet: "filter", kinds: ["model", "tool"], decisionFilter: 14 }}/>
            </DCArtboard>

            <DCArtboard id="summary-live" label="04 · Summary tab · LIVE" width={390} height={844}>
              <Phone scenario={{ tab: "SUMMARY", isLive: true, liveDuration: 43, selectedSpan: "s6" }}/>
            </DCArtboard>

            <DCArtboard id="decisions" label="05 · Decisions tab" width={390} height={844}>
              <Phone scenario={{ tab: "DECISIONS", isLive: true, liveDuration: 43, focusedDec: 14 }}/>
            </DCArtboard>

            <DCArtboard id="review" label="06 · Review tab" width={390} height={844}>
              <Phone scenario={{ tab: "REVIEW", isLive: false, stripState: "green" }}/>
            </DCArtboard>

            <DCArtboard id="streaming-span" label="07 · Streaming span sheet" width={390} height={844}>
              <Phone scenario={{ tab: "TRACE", isLive: true, liveDuration: 43, selectedSpan: "s8", sheet: "span" }}/>
            </DCArtboard>

            <DCArtboard id="tool-span" label="08 · Tool span sheet" width={390} height={844}>
              <Phone scenario={{ tab: "TRACE", isLive: true, liveDuration: 43, selectedSpan: "s7", sheet: "span" }}/>
            </DCArtboard>

          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
  </script>
</body>
</html>
