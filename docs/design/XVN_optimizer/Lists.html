<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>xvn — List component</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="signal.css"/>
<style>
  body { background: #000000; }
  .dc-section-title { font-family: 'Geist', sans-serif !important; font-style: normal; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="list-toolbar.jsx"></script>
<script type="text/babel" src="list-examples.jsx"></script>
<script type="text/babel" src="list-anatomy.jsx"></script>
<script type="text/babel" src="list-variants.jsx"></script>
<script type="text/babel" src="list-screens.jsx"></script>

<script type="text/babel" data-presets="react">
const App = () => (
  <DesignCanvas
    title="xvn — List component"
    subtitle="One standard for every list · search + filter + sort by added"
  >
    <DCSection id="component" title="Component · ListCard" subtitle="Anatomy and spec">
      <DCArtboard id="anatomy" label="Anatomy · annotated spec" width={1440} height={900}>
        <ListAnatomy />
      </DCArtboard>
    </DCSection>

    <DCSection id="variants" title="Variants &amp; states" subtitle="Densities and edge cases">
      <DCArtboard id="variants-1" label="Full · Compact · Active · Empty" width={1440} height={900}>
        <ListVariants />
      </DCArtboard>
    </DCSection>

    <DCSection id="applied" title="Applied · primary list pages" subtitle="Live interactive — try the search and selects">
      <DCArtboard id="strategies-v2" label="/strategies · ListCard density=full" width={1440} height={900}>
        <StrategiesScreenV2 />
      </DCArtboard>
      <DCArtboard id="eval-runs-v2" label="/eval/runs · ListCard density=full" width={1440} height={900}>
        <EvalRunsScreenV2 />
      </DCArtboard>
    </DCSection>

    <DCSection id="applied-compact" title="Applied · compact (mini-list)" subtitle="Two-up dashboard cards">
      <DCArtboard id="run-detail-v2" label="/eval/runs/01H8N7Z · two compact lists" width={1440} height={900}>
        <RunDetailScreenV2 />
      </DCArtboard>
      <DCArtboard id="home-v2" label="/ · Home with compact lists" width={1440} height={900}>
        <HomeScreenV2 />
      </DCArtboard>
    </DCSection>
  </DesignCanvas>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
