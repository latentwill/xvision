<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>XVN · Optimizer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#000; --surface-sidebar:#000; --surface-card:#0A0A0A; --surface-elev:#0E0E0E; --surface-panel:#121212;
      --surface-hover:rgba(255,255,255,0.04);
      --border:#1A1A1A; --border-strong:#2A2A2A; --border-soft:#141414;
      --text:#FFFFFF; --text-2:#9CA3AF; --text-3:#5F6670; --text-4:#3A3F47;
      --gold:#00E676; --gold-soft:#00B85F; --gold-bg:rgba(0,230,118,0.10); --gold-bg-strong:rgba(0,230,118,0.18);
      --warn:#FFB020; --danger:#FF4D4D; --info:#5FA8FF; --violet:#A78BFA;
      --radius-card:6px; --radius-sm:4px;
    }
    * { box-sizing: border-box; }
    html, body { margin:0; padding:0; background:#000; color:var(--text);
      font-family:'Geist', sans-serif; font-size:13px; line-height:1.45;
      -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
    }
    .mono { font-family:'Geist Mono', ui-monospace, monospace; font-variant-numeric:tabular-nums; }
    .ulabel { font-family:'Geist Mono', monospace; font-size:10px; font-weight:500;
      letter-spacing:0.18em; text-transform:uppercase; color:var(--text-3); }
    .tnum { font-variant-numeric:tabular-nums; }
    .up { color:var(--gold); }
    .down { color:var(--danger); }
    .mute { color:var(--text-2); }
    .muted { color:var(--text-3); }
    .frame-bg { background:#000; width:1440px; height:900px; overflow:hidden;
      display:grid; grid-template-columns:200px 1fr; position:relative; }
    ::-webkit-scrollbar { width:6px; height:6px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
    @keyframes pulseDot { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
    .pulse { animation: pulseDot 1.6s ease-in-out infinite; }
    @keyframes spinSlow { from { transform:rotate(0deg);} to { transform:rotate(360deg);} }
    .spin-slow { animation: spinSlow 8s linear infinite; transform-origin:center; }
    @keyframes barFlow {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(0%); }
    }
    .bar-flow { animation: barFlow 2.4s ease-in-out infinite alternate; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="bc-shared.jsx"></script>
  <script type="text/babel" src="bc2-genart.jsx"></script>
  <script type="text/babel" src="bc2-marketplace.jsx"></script>
  <script type="text/babel" src="bc-settings-marketplace.jsx"></script>
  <script type="text/babel" src="ar-shared.jsx"></script>
  <script type="text/babel" src="ar-home.jsx"></script>
  <script type="text/babel" src="ar-cycle.jsx"></script>
  <script type="text/babel" src="ar-variant.jsx"></script>
  <script type="text/babel" src="ar-settings.jsx"></script>
  <script type="text/babel" src="ar-canvas.jsx"></script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
