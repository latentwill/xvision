<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>xvn — Control Tower · Robinhood variants</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="themes.css"/>
<style>
  body { background: #050505; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="theme-home.jsx"></script>

<script type="text/babel" data-presets="react">
window.DC.bg = '#050505';
window.DC.grid = 'rgba(255,255,255,0.03)';
window.DC.title = '#ECE7DA';
window.DC.subtitle = '#8E8E8E';
window.DC.label = '#8E8E8E';

const App = () => (
  <DesignCanvas
    title="xvn — Control Tower · Robinhood-base variants"
    subtitle="Same layout · 3 color + font directions"
  >
    <DCSection id="signal" title="Signal — bright green refined · Geist + Geist Mono">
      <DCArtboard id="rh-signal" label="/home · accent #00E676 · Geist family" width={1440} height={900}>
        <ThemedHome theme="rh-signal" />
      </DCArtboard>
    </DCSection>

    <DCSection id="atlas" title="Atlas — mint accent · Space Grotesk + JetBrains Mono">
      <DCArtboard id="rh-atlas" label="/home · accent #5EEAD4 · Space Grotesk / JetBrains Mono" width={1440} height={900}>
        <ThemedHome theme="rh-atlas" />
      </DCArtboard>
    </DCSection>

    <DCSection id="terminal" title="Terminal — amber accent · IBM Plex Mono headlines">
      <DCArtboard id="rh-terminal" label="/home · accent #FB923C · IBM Plex Mono / Plex Sans" width={1440} height={900}>
        <ThemedHome theme="rh-terminal" />
      </DCArtboard>
    </DCSection>
  </DesignCanvas>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
