<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>xvn — mobile-first framework</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="signal.css"/>
<link rel="stylesheet" href="signal-mobile.css"/>
<style>
  body { background: #000000; }
  .dc-section-title { font-family: 'Geist', sans-serif !important; font-style: normal; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="mobile-shared.jsx"></script>
<script type="text/babel" src="mobile-chat.jsx"></script>
<script type="text/babel" src="mobile-eval.jsx"></script>
<script type="text/babel" src="mobile-responsive.jsx"></script>

<script type="text/babel" data-presets="react">
const Phone = ({ children }) => (
  <IOSDevice width={402} height={874} dark={true} keyboard={false}>
    {children}
  </IOSDevice>
);

// Inner mobile screens are 390×844 (iPhone 15 Pro logical). IOSFrame supplies chrome.
// For Tablet/Desktop, raw container at the artboard dimensions.

const App = () => {
  return (
    <DesignCanvas
      title="xvn — mobile-first framework"
      subtitle="Chat-rail-primary · Folio dark · responsive 390 / 768 / 1280"
    >
      <DCSection id="primer" title="Concept">
        <DCArtboard id="concept" label="System note" width={760} height={520}>
          <div style={{
            width: "100%", height: "100%",
            background: "var(--surface-card)",
            border: "1px solid var(--border)",
            padding: "32px 36px",
            display: "flex", flexDirection: "column", gap: 14,
            fontFamily: "Inter, sans-serif", color: "var(--text)",
            overflow: "auto"
          }}>
            <div style={{fontFamily: "Geist, sans-serif", fontStyle: "normal", fontSize: 32, fontWeight: 500, color: "var(--text)", letterSpacing: "-0.01em"}}>
              Chat is the spine.
            </div>
            <div style={{color: "var(--text-2)", fontSize: 14, lineHeight: 1.6, maxWidth: 580}}>
              On mobile, the chat thread is the home screen. Eval charts, run cards, strategy summaries
              and confirmations render inline as agent responses — so users get rich data without
              leaving the conversation. The hamburger opens a full nav drawer, and the <span className="mono" style={{color: "var(--gold)"}}>+</span> in
              the composer opens an "All functions" sheet — a touch-friendly command palette covering
              every action xvn supports.
            </div>
            <hr className="hr" style={{margin: "8px 0"}}/>
            <div style={{display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 18, color: "var(--text-2)", fontSize: 12.5, lineHeight: 1.55}}>
              <div>
                <div className="mono" style={{color: "var(--gold)", fontSize: 11, letterSpacing: "0.06em", marginBottom: 6}}>390 — PHONE</div>
                Chat full-bleed. Nav + functions in overlays. Dashboards take over the viewport with a floating chat pill to return to the rail.
              </div>
              <div>
                <div className="mono" style={{color: "var(--gold)", fontSize: 11, letterSpacing: "0.06em", marginBottom: 6}}>768 — TABLET</div>
                Chat docks as a 360px left rail; the dashboard fills the right. Both stay visible — no overlay needed.
              </div>
              <div>
                <div className="mono" style={{color: "var(--gold)", fontSize: 11, letterSpacing: "0.06em", marginBottom: 6}}>1280+ — DESKTOP</div>
                Three columns: nav (220) · dashboard · chat rail (380). Mirrors the v1 desktop, with chat promoted to a permanent rail.
              </div>
            </div>
          </div>
        </DCArtboard>
      </DCSection>

      <DCSection id="mobile-chat" title="Mobile · 390×844 — chat as home">
        <DCArtboard id="chat-home" label="Default landing · agent greets, returns inline chart" width={420} height={910}>
          <Phone><MobileChatHome /></Phone>
        </DCArtboard>
        <DCArtboard id="chat-eval" label="User asks about eval · inline chart card + findings" width={420} height={910}>
          <Phone><MobileChatEval /></Phone>
        </DCArtboard>
      </DCSection>

      <DCSection id="mobile-menus" title="Mobile — menus stay reachable">
        <DCArtboard id="drawer" label="Nav drawer (hamburger) — all sections" width={420} height={910}>
          <Phone><MobileDrawer /></Phone>
        </DCArtboard>
        <DCArtboard id="sheet" label="Functions sheet (+ button) — every action xvn supports" width={420} height={910}>
          <Phone><MobileSheet /></Phone>
        </DCArtboard>
      </DCSection>

      <DCSection id="mobile-dash" title="Mobile dashboards — chat collapses to a pill">
        <DCArtboard id="eval-list" label="Eval runs · histogram + per-run sparklines" width={420} height={910}>
          <Phone><MobileEvalList /></Phone>
        </DCArtboard>
        <DCArtboard id="run-detail" label="Run detail · full chart + findings + ledger" width={420} height={910}>
          <Phone><MobileRunDetail /></Phone>
        </DCArtboard>
      </DCSection>

      <DCSection id="responsive" title="Responsive — chat scales with the canvas">
        <DCArtboard id="tablet" label="Tablet · 768×1024 — chat docks as left rail" width={768} height={1024}>
          <TabletSplit />
        </DCArtboard>
        <DCArtboard id="desktop" label="Desktop · 1280×800 — three-pane with permanent chat rail" width={1280} height={800}>
          <DesktopThreePane />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
