<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>XVN · Blockchain surfaces</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#000; --surface-sidebar:#000; --surface-card:#0A0A0A; --surface-elev:#0E0E0E; --surface-panel:#121212;
      --surface-hover:rgba(255,255,255,0.04);
      --border:#1A1A1A; --border-strong:#2A2A2A; --border-soft:#141414;
      --text:#FFFFFF; --text-2:#9CA3AF; --text-3:#5F6670; --text-4:#3A3F47;
      --gold:#00E676; --gold-soft:#00B85F; --gold-bg:rgba(0,230,118,0.10); --gold-bg-strong:rgba(0,230,118,0.18);
      --warn:#FFB020; --danger:#FF4D4D; --info:#5FA8FF;
      --radius-card:6px; --radius-sm:4px;
    }
    * { box-sizing: border-box; }
    html, body { margin:0; padding:0; background:#000; color:var(--text);
      font-family:'Geist', sans-serif; font-size:13px; line-height:1.45;
      -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
    }
    /* utility classes used across frames */
    .mono { font-family:'Geist Mono', ui-monospace, monospace; font-variant-numeric:tabular-nums; }
    .ulabel { font-family:'Geist Mono', monospace; font-size:10px; font-weight:500;
      letter-spacing:0.18em; text-transform:uppercase; color:var(--text-3); }
    .tnum { font-variant-numeric:tabular-nums; }
    .up { color:var(--gold); }
    .down { color:var(--danger); }
    .mute { color:var(--text-2); }
    .muted { color:var(--text-3); }
    .frame-bg { background:#000; width:1440px; height:900px; overflow:hidden;
      display:grid; grid-template-columns:200px 1fr; position:relative; }
    /* fine scrollbar */
    ::-webkit-scrollbar { width:6px; height:6px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
    /* dotted bg pattern for opt-in hero */
    .dot-bg {
      background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 16px 16px;
    }
    /* subtle horizontal scan line for "live" state */
    @keyframes pulseDot { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
    .pulse { animation: pulseDot 1.6s ease-in-out infinite; }
    /* No artboard borders, let frames breathe */

    /* ============================================================ */
    /* PRINT STYLES                                                 */
    /* Each 1440×900 artboard renders as its own landscape page.    */
    /* ============================================================ */
    @media print {
      @page {
        size: 1440px 900px;
        margin: 0;
      }

      html, body {
        background: #000 !important;
        margin: 0 !important; padding: 0 !important;
        width: 1440px !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        color-adjust: exact !important;
      }
      body *, body *::before, body *::after {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        animation: none !important;
        transition: none !important;
      }

      /* Hide all design-canvas chrome: section headers, artboard headers,
         drag handles, kebab menus, focus buttons, post-its, etc. */
      .dc-sectionhead,
      .dc-header,
      .dc-labelrow,
      .dc-btns,
      .dc-grip,
      .dc-kebab,
      .dc-menu,
      .dc-expand,
      .dc-postit,
      [data-omelette-chrome] {
        display: none !important;
      }

      /* Defeat the canvas pan/zoom transform + flex layout */
      #root,
      .design-canvas,
      .design-canvas > *,
      .design-canvas section,
      .design-canvas [class*="dc-"],
      [data-dc-slot] {
        position: static !important;
        transform: none !important;
        height: auto !important;
        width: auto !important;
        overflow: visible !important;
        margin: 0 !important;
        padding: 0 !important;
        display: block !important;
        background: transparent !important;
      }

      /* Each artboard = one full landscape page */
      .dc-card {
        display: block !important;
        position: relative !important;
        width: 1440px !important;
        height: 900px !important;
        margin: 0 !important;
        padding: 0 !important;
        background: #000 !important;
        box-shadow: none !important;
        border-radius: 0 !important;
        overflow: hidden !important;
        break-before: page !important;
        page-break-before: always !important;
        break-inside: avoid !important;
        page-break-inside: avoid !important;
      }
      .dc-card:first-of-type {
        break-before: auto !important;
        page-break-before: auto !important;
      }

      /* The frames inside artboards lock to 1440×900 */
      .frame-bg {
        width: 1440px !important;
        height: 900px !important;
        overflow: hidden !important;
      }

      /* Pulsing live dots: keep visible, no animation */
      .pulse { opacity: 1 !important; }

      /* Hide scrollbars in print */
      ::-webkit-scrollbar { display: none !important; }
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="bc-shared.jsx"></script>
  <script type="text/babel" src="bc-marketplace-home.jsx"></script>
  <script type="text/babel" src="bc-lineage-detail.jsx"></script>
  <script type="text/babel" src="bc-marketplace-optin.jsx"></script>
  <script type="text/babel" src="bc-settings-marketplace.jsx"></script>
  <script type="text/babel" src="bc-settings-identity.jsx"></script>
  <script type="text/babel" src="bc-canvas.jsx"></script>
</head>
<body>
  <div id="root"></div>

  <!-- ============================================================ -->
  <!-- AUTO-PRINT                                                   -->
  <!-- Wait for: Babel transpile, React render, fonts, +500ms safety -->
  <!-- ============================================================ -->
  <script>
    (async function autoPrint() {
      // 1. Wait until React has mounted artboards into #root.
      await new Promise((resolve) => {
        const start = Date.now();
        const check = () => {
          const cards = document.querySelectorAll('.dc-card');
          if (cards.length >= 5) return resolve();
          if (Date.now() - start > 15000) return resolve(); // safety
          requestAnimationFrame(check);
        };
        check();
      });

      // 2. Wait for fonts.
      try { if (document.fonts && document.fonts.ready) await document.fonts.ready; } catch (_) {}

      // 3. Two animation frames so the layout settles after print styles apply.
      await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

      // 4. Safety delay.
      await new Promise(r => setTimeout(r, 600));

      window.print();
    })();
  </script>
</body>
</html>
