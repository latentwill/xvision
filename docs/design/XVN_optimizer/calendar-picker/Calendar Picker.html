<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>xvn · Calendar picker exploration</title>
<link rel="stylesheet" href="signal.css"/>
<style>
  html, body { background: #f0eee9; }
  /* Reset our dark-theme body inside artboards: each artboard sets its own
     background, so we keep the canvas warm-gray. */
  body { font-family: 'Inter', sans-serif; }
  /* The artboard contents expect a dark folio canvas — override .card etc only when inside artboards */
  .dc-card { background: var(--surface-card, #0A0A0A); }
  input[type=checkbox] { accent-color: var(--gold); }
  select { color: var(--text-2); }
  select option { background: #0E0E0E; color: #FFFFFF; }

  /* Month/year jump affordance — dotted underline + caret turn gold on hover */
  .month-jump-btn[data-active="false"]:hover {
    background: rgba(0, 230, 118, 0.05) !important;
    color: var(--gold) !important;
  }
  .month-jump-btn[data-active="false"]:hover span {
    border-bottom-color: var(--gold-soft) !important;
    border-bottom-style: solid !important;
  }
  .month-jump-btn[data-active="false"]:hover svg {
    opacity: 1 !important;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="calendar-core.jsx"></script>
<script type="text/babel" src="calendar-desktop.jsx"></script>
<script type="text/babel" src="calendar-mobile.jsx"></script>
<script type="text/babel" src="strategies-context.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { useState } = React;

// Helper: wrap an artboard body in the dark folio canvas
const Folio = ({ children, pad = 32, bg = "var(--bg)" }) => (
  <div style={{
    background: bg, color: "var(--text)",
    width: "100%", height: "100%",
    padding: pad, boxSizing: "border-box",
    fontFamily: "Inter, sans-serif", fontSize: 13,
    display: "flex", alignItems: "center", justifyContent: "center",
  }}>{children}</div>
);

const App = () => (
  <DesignCanvas>
    <DCSection id="context"
      title="In context"
      subtitle="Inline swing-out — no overlay. The bar sits in the page flow; the table pushes down when it expands.">
      <DCArtboard id="strategies-open" label="Strategies page · open" width={1280} height={920}>
        <StrategiesPageWithCalendar/>
      </DCArtboard>
      <DCArtboard id="strategies-closed" label="Strategies page · collapsed" width={1280} height={680}>
        <StrategiesPageWithCalendar initialOpen={false}/>
      </DCArtboard>
    </DCSection>

    <DCSection id="desktop"
      title="Desktop — inline bar"
      subtitle="The collapsed bar IS the trigger. Click the chevron (or anywhere on the bar) to swing out.">
      <DCArtboard id="inline-collapsed" label="Collapsed" width={820} height={140}>
        <Folio bg="#0E0E0E" pad={28}>
          <div style={{width: "100%"}}>
            <InlineRangeBar initialOpen={false} width={"100%"}/>
          </div>
        </Folio>
      </DCArtboard>

      <DCArtboard id="inline-open" label="Open · default range" width={820} height={620}>
        <Folio bg="#0E0E0E" pad={28}>
          <div style={{width: "100%"}}>
            <InlineRangeBar initialOpen={true} width={"100%"}/>
          </div>
        </Folio>
      </DCArtboard>

      <DCArtboard id="inline-compact" label="Compact alt · chip + preset bar" width={420} height={620}>
        <Folio bg="#0E0E0E">
          <CompactPresetCalendar/>
        </Folio>
      </DCArtboard>
    </DCSection>

    <DCSection id="mobile"
      title="Mobile"
      subtitle="Bottom-sheet for the strategies list filter. Embedded card for a fresh backtest flow.">
      <DCArtboard id="mobile-sheet" label="A · Bottom sheet (filter)" width={430} height={760}>
        <div style={{
          width: "100%", height: "100%",
          background: "#0E0E0E",
          display: "flex", alignItems: "center", justifyContent: "center",
        }}>
          <MobileBottomSheet/>
        </div>
      </DCArtboard>

      <DCArtboard id="mobile-inline" label="B · Embedded (new backtest)" width={430} height={760}>
        <div style={{
          width: "100%", height: "100%",
          background: "#0E0E0E",
          display: "flex", alignItems: "center", justifyContent: "center",
        }}>
          <MobileInlineCard/>
        </div>
      </DCArtboard>
    </DCSection>

    <DCSection id="anatomy"
      title="Month / year jump"
      subtitle="Click the month or year in any header — italic year, roman month — to swap the grid for a 4×3 jump panel. Chevrons step by year (in months view) or by decade (in years view).">
      <DCArtboard id="jump-compact" label="Desktop chip · years view" width={420} height={520}>
        <Folio bg="#0E0E0E">
          <CompactPresetCalendar initialView="years"/>
        </Folio>
      </DCArtboard>

      <DCArtboard id="jump-mobile" label="Mobile sheet · years view" width={430} height={760}>
        <div style={{
          width: "100%", height: "100%",
          background: "#0E0E0E",
          display: "flex", alignItems: "center", justifyContent: "center",
        }}>
          <MobileBottomSheet initialView="years"/>
        </div>
      </DCArtboard>

      <DCArtboard id="jump-pair" label="Months ↔ Years drill" width={760} height={420}>
        <Folio pad={24} bg="#0E0E0E">
          <div style={{display: "grid", gridTemplateColumns: "1fr 1fr", gap: 24, width: "100%", maxWidth: 640}}>
            <div style={{
              background: "var(--surface-elev)",
              border: "1px solid var(--border-strong)",
              borderRadius: 6, padding: "14px 18px 16px",
            }}>
              <MonthHeader
                anchor={new Date(2025, 4, 1)}
                view="months"
                onPrev={() => {}} onNext={() => {}}
                onMonthClick={() => {}} onYearClick={() => {}}
                size="md"
              />
              <MonthsView
                anchor={new Date(2025, 4, 1)}
                selectedYear={2025} selectedMonth={0}
                onPick={() => {}} density="comfort"
              />
            </div>
            <div style={{
              background: "var(--surface-elev)",
              border: "1px solid var(--border-strong)",
              borderRadius: 6, padding: "14px 18px 16px",
            }}>
              <MonthHeader
                anchor={new Date(2025, 4, 1)}
                view="years"
                onPrev={() => {}} onNext={() => {}}
                onMonthClick={() => {}} onYearClick={() => {}}
                size="md"
              />
              <YearsView
                anchor={new Date(2025, 4, 1)}
                selectedYear={2025}
                onPick={() => {}} density="comfort"
              />
            </div>
          </div>
        </Folio>
      </DCArtboard>
    </DCSection>

    <DCSection id="cells"
      title="Day cell states"
      subtitle="The grammar shared by every variant.">
      <DCArtboard id="states" label="Day cell states" width={760} height={360}>
        <Folio pad={32}>
          <div style={{display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 24, width: "100%"}}>
            {[
              ["Default", { day: 14 }],
              ["Hover", { day: 14, hover: true }],
              ["Today", { day: 18, today: true }],
              ["Out of month", { day: 30, dim: true }],
              ["Range start", { day: 1, edge: true, hasRight: true }],
              ["In range", { day: 8, inRange: true, hasLeft: true, hasRight: true }],
              ["Range end", { day: 31, edge: true, hasLeft: true }],
              ["Single date", { day: 18, edge: true }],
            ].map(([label, s]) => (
              <div key={label} style={{
                display: "flex", flexDirection: "column", alignItems: "center", gap: 12,
              }}>
                <div style={{
                  width: 60, height: 40,
                  position: "relative",
                  display: "flex", alignItems: "center", justifyContent: "center",
                }}>
                  {(s.hasLeft || s.hasRight) && (
                    <div style={{
                      position: "absolute",
                      top: 4, bottom: 4,
                      left: s.hasLeft ? 0 : "50%",
                      right: s.hasRight ? 0 : "50%",
                      background: "var(--gold-bg)",
                    }}/>
                  )}
                  <div style={{
                    position: "relative", zIndex: 1,
                    width: 36, height: 36,
                    borderRadius: "50%",
                    display: "flex", alignItems: "center", justifyContent: "center",
                    fontFamily: "'Geist Mono', monospace",
                    fontSize: 13,
                    fontWeight: s.edge ? 600 : 400,
                    color: s.edge ? "#000000" :
                           s.dim ? "var(--text-4)" :
                           s.today ? "var(--gold)" :
                           "var(--text)",
                    background: s.edge ? "var(--gold)" :
                                s.hover ? "var(--surface-hover)" : "transparent",
                    border: s.today && !s.edge ? "1px solid rgba(0, 230, 118, 0.55)" :
                            s.hover ? "1px solid var(--border)" : "1px solid transparent",
                  }}>{s.day}</div>
                </div>
                <div style={{
                  fontSize: 11, color: "var(--text-2)", textAlign: "center",
                  letterSpacing: "0.02em",
                }}>{label}</div>
              </div>
            ))}
          </div>
        </Folio>
      </DCArtboard>

      <DCArtboard id="tokens" label="Color tokens used" width={420} height={420}>
        <Folio pad={28}>
          <div style={{display: "flex", flexDirection: "column", gap: 14, width: "100%"}}>
            {[
              ["--gold", "#00E676", "Selected edges, today ring"],
              ["--gold-bg", "rgba(0, 230, 118, 0.10)", "In-range bar, active preset"],
              ["--surface-elev", "#0E0E0E", "Popover container"],
              ["--surface-card", "#0A0A0A", "Embedded cards"],
              ["--border", "#1A1A1A", "Day-cell hover ring, fields"],
              ["--text", "#FFFFFF", "Active day numerics"],
              ["--text-2", "#9CA3AF", "Inactive numerics, labels"],
              ["--text-4", "#3A3F47", "Out-of-month dim"],
            ].map(([token, hex, role]) => (
              <div key={token} style={{display: "flex", alignItems: "center", gap: 12}}>
                <div style={{
                  width: 22, height: 22, borderRadius: 3,
                  background: hex,
                  border: "1px solid var(--border)",
                  flexShrink: 0,
                }}/>
                <div style={{flex: 1, minWidth: 0}}>
                  <div className="mono" style={{fontSize: 11.5, color: "var(--text)"}}>{token}</div>
                  <div style={{fontSize: 11, color: "var(--text-3)"}}>{role}</div>
                </div>
                <div className="mono" style={{fontSize: 10.5, color: "var(--text-3)"}}>{hex}</div>
              </div>
            ))}
          </div>
        </Folio>
      </DCArtboard>
    </DCSection>
  </DesignCanvas>
);

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
