<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>xvn — v1 design (print)</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="signal.css"/>
<style>
  html, body { background: #000000; margin: 0; padding: 0; }
  @page { size: 1440px 900px; margin: 0; }

  .page {
    width: 1440px;
    height: 900px;
    overflow: hidden;
    position: relative;
    background: var(--bg);
    page-break-after: always;
    break-after: page;
  }
  .page:last-child { page-break-after: auto; break-after: auto; }
  .page-label {
    position: absolute;
    top: 12px;
    right: 16px;
    font-family: 'Geist Mono', monospace;
    font-size: 10px;
    color: var(--text-3);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    z-index: 100;
    pointer-events: none;
  }

  @media screen {
    body { padding: 24px; display: flex; flex-direction: column; gap: 24px; align-items: center; }
    .page { box-shadow: 0 4px 32px rgba(0,0,0,0.6); border: 1px solid #2A2618; }
  }
  @media print {
    body { padding: 0; }
    .page { box-shadow: none; border: none; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="screen-home.jsx"></script>
<script type="text/babel" src="screen-strategies.jsx"></script>
<script type="text/babel" src="screen-inspector.jsx"></script>
<script type="text/babel" src="screen-eval-runs.jsx"></script>
<script type="text/babel" src="screen-run-detail.jsx"></script>
<script type="text/babel" src="screen-setup.jsx"></script>

<script type="text/babel" data-presets="react">
const pages = [
  ["Home — Control Tower", HomeScreen],
  ["Setup wizard", SetupScreen],
  ["Strategies — drafts list", StrategiesScreen],
  ["Inspector — authoring", InspectorScreen],
  ["Eval — runs list", EvalRunsScreen],
  ["Eval — run detail", RunDetailScreen],
];

const App = () => (
  <>
    {pages.map(([label, C], i) => (
      <div className="page" key={i}>
        <div className="page-label">{String(i+1).padStart(2,'0')} · {label}</div>
        <C />
      </div>
    ))}
  </>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

// Auto-print after fonts + render settle
(async () => {
  try { await document.fonts.ready; } catch(e) {}
  setTimeout(() => window.print(), 1200);
})();
</script>
</body>
</html>
