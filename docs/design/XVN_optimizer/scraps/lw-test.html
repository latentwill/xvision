<!doctype html>
<html><head>
<meta charset="utf-8"/>
<style>body{margin:0;background:#0F0E0C;color:#F1ECDD;font-family:monospace;padding:10px}</style>
</head>
<body>
<div id="log"></div>
<div id="c1" style="width:700px;height:300px;background:#1a1a1a;border:1px solid #333;margin:10px"></div>

<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<script>
const log = document.getElementById('log');
function L(...args){ log.innerHTML += args.join(' ') + '<br>'; }

L('LW loaded:', !!window.LightweightCharts);
L('Container:', document.getElementById('c1').clientWidth, 'x', document.getElementById('c1').clientHeight);

const ch = window.LightweightCharts.createChart(document.getElementById('c1'), {
  width: 700, height: 300,
  layout: { background:{color:'#0F0E0C'}, textColor:'#F1ECDD' },
  grid: { vertLines:{color:'#222'}, horzLines:{color:'#222'} },
  rightPriceScale: { borderColor:'#333' },
  timeScale: { borderColor:'#333' },
});

const series = ch.addCandlestickSeries({
  upColor:'#3FAE6B', downColor:'#C8443A',
  wickUpColor:'#3FAE6B', wickDownColor:'#C8443A',
  borderVisible:false,
});

const data = [];
let t = Math.floor((Date.now() - 80*3600*1000) / 1000); t = t - (t % 3600);
let p = 100;
for (let i=0;i<80;i++){
  const o=p, c=p+(Math.random()-0.5)*4;
  const h=Math.max(o,c)+Math.random()*2, l=Math.min(o,c)-Math.random()*2;
  data.push({time:t, open:o, high:h, low:l, close:c});
  p=c; t+=3600;
}
series.setData(data);
ch.timeScale().fitContent();
L('Data set, candles:', data.length);
L('Canvas count:', document.querySelectorAll('#c1 canvas').length);

setTimeout(() => {
  const cnv = document.querySelectorAll('#c1 canvas');
  cnv.forEach((c, i) => L(`cnv${i}: ${c.width}x${c.height} (css ${c.style.width}/${c.style.height})`));
}, 500);
</script>
</body></html>
