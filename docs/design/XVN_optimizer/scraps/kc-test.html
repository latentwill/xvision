<!doctype html>
<html><head>
<meta charset="utf-8"/>
<title>KC test</title>
<style>body{margin:0;background:#0F0E0C;color:#F1ECDD;font-family:monospace}</style>
</head>
<body>
<div id="status">loading...</div>
<div id="kc-9_8" style="width:600px;height:300px;background:#1a1a1a;border:1px solid #333;margin:10px"></div>
<div id="kc-9_5" style="width:600px;height:300px;background:#1a1a1a;border:1px solid #333;margin:10px"></div>
<div id="kc-lw" style="width:600px;height:300px;background:#1a1a1a;border:1px solid #333;margin:10px"></div>
<script>
async function loadScript(src){
  return new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = () => res(src);
    s.onerror = (e) => rej(new Error('failed: ' + src));
    document.head.appendChild(s);
  });
}
function genCandles(n=80){
  const out=[]; let t=Date.now()-n*3600000, p=100;
  for(let i=0;i<n;i++){
    const o=p, c=p+(Math.random()-0.5)*4;
    const h=Math.max(o,c)+Math.random()*2, l=Math.min(o,c)-Math.random()*2;
    out.push({timestamp:t, time: Math.floor(t/1000), open:o,high:h,low:l,close:c,volume:1000+Math.random()*500});
    p=c; t+=3600000;
  }
  return out;
}
async function go(){
  const status = document.getElementById('status');
  status.textContent = 'loading klinecharts 9.8.10...';
  try {
    await loadScript('https://unpkg.com/klinecharts@9.8.10/dist/umd/klinecharts.min.js');
    status.textContent = 'KC 9.8.10 loaded. init...';
    const ch1 = window.klinecharts.init('kc-9_8');
    ch1.applyNewData(genCandles());
    setTimeout(() => ch1.resize(), 100);
    status.textContent = 'KC 9.8.10 ok';
  } catch(e) { status.textContent = 'KC 9.8.10 err: ' + e.message; }
  
  // try 9.5
  try {
    delete window.klinecharts;
    await loadScript('https://unpkg.com/klinecharts@9.5.0/dist/umd/klinecharts.min.js');
    const ch2 = window.klinecharts.init('kc-9_5');
    ch2.applyNewData(genCandles());
    setTimeout(() => ch2.resize(), 100);
    document.getElementById('kc-9_5').setAttribute('data-status', 'kc 9.5 ok');
  } catch(e) { document.getElementById('kc-9_5').setAttribute('data-status','err: '+e.message); }
  
  // try lightweight-charts
  try {
    await loadScript('https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js');
    const lw = window.LightweightCharts.createChart(document.getElementById('kc-lw'), { width:600, height:300, layout:{ background:{color:'#0F0E0C'}, textColor:'#F1ECDD' }});
    const series = lw.addCandlestickSeries({ upColor:'#3FAE6B', downColor:'#C8443A', wickUpColor:'#3FAE6B', wickDownColor:'#C8443A', borderVisible:false });
    series.setData(genCandles().map(c => ({ time: c.time, open:c.open, high:c.high, low:c.low, close:c.close })));
    document.getElementById('kc-lw').setAttribute('data-status', 'lw-charts ok');
  } catch(e) { document.getElementById('kc-lw').setAttribute('data-status', 'err: ' + e.message); }
}
go();
</script>
</body></html>
