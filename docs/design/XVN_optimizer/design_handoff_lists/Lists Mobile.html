<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>xvn — List component · mobile</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="signal.css"/>
<link rel="stylesheet" href="signal-mobile.css"/>
<style>
  body { background: #000000; }
  .dc-section-title { font-family: 'Geist', sans-serif !important; font-style: normal; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="list-toolbar.jsx"></script>
<script type="text/babel" src="list-toolbar-mobile.jsx"></script>
<script type="text/babel" src="list-examples.jsx"></script>
<script type="text/babel" src="list-mobile-screens.jsx"></script>
<script type="text/babel" src="list-mobile-anatomy.jsx"></script>

<script type="text/babel" data-presets="react">
const Phone = ({ children }) => (
  <IOSDevice width={402} height={874} dark={true} keyboard={false}>
    {children}
  </IOSDevice>
);

const App = () => (
  <DesignCanvas
    title="xvn — List component · mobile"
    subtitle="Search-first · filters in a bottom sheet · card-style rows"
  >
    <DCSection id="anatomy" title="Component · MListCard" subtitle="Anatomy and spec">
      <DCArtboard id="m-anatomy" label="Mobile anatomy" width={1440} height={900}>
        <MListAnatomy />
      </DCArtboard>
    </DCSection>

    <DCSection id="applied" title="Applied · primary list screens" subtitle="Live — try the search bar, tap Filter or Sort">
      <DCArtboard id="m-strategies" label="/strategies · default" width={420} height={910}>
        <Phone><MobileStrategiesList /></Phone>
      </DCArtboard>
      <DCArtboard id="m-runs" label="/eval/runs · default" width={420} height={910}>
        <Phone><MobileEvalRunsList /></Phone>
      </DCArtboard>
      <DCArtboard id="m-decisions" label="Run detail · Decisions tab" width={420} height={910}>
        <Phone><MobileDecisionsList /></Phone>
      </DCArtboard>
    </DCSection>

    <DCSection id="states" title="States" subtitle="Filters applied, sheet open, empty">
      <DCArtboard id="m-filtered" label="Active filters · chips visible · sorted by Return" width={420} height={910}>
        <Phone><MobileEvalRunsFiltered /></Phone>
      </DCArtboard>
      <DCArtboard id="m-sheet" label="Filter & sort sheet — open" width={420} height={910}>
        <Phone><MobileSheetOpen /></Phone>
      </DCArtboard>
    </DCSection>
  </DesignCanvas>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
