<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>xvn — eval focus</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="styles.css"/>
<style>
  html, body { background: var(--bg); height: 100%; margin: 0; }
  /* Center the 1440×900 frame on the page and letterbox via JS scale */
  .stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0A0907;
    overflow: hidden;
  }
  .frame {
    width: 1440px;
    height: 900px;
    transform-origin: center center;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(212,165,71,0.08);
    border-radius: 6px;
    overflow: hidden;
    position: relative;
  }
  .focus-label {
    position: fixed;
    top: 18px; left: 22px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 18px;
    color: var(--text-2);
    z-index: 10;
    pointer-events: none;
  }
  .focus-label .mono {
    font-family: 'JetBrains Mono', monospace;
    font-style: normal;
    font-size: 11px;
    color: var(--text-3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    display: block;
    margin-bottom: 2px;
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div class="focus-label">
  <span class="mono">Focused · desktop · 1440×900</span>
  Run detail · themed scrollbars + Decisions filter
</div>
<div class="stage">
  <div class="frame" id="frame"><div id="root"></div></div>
</div>

<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="screen-run-detail.jsx"></script>

<script type="text/babel" data-presets="react">
ReactDOM.createRoot(document.getElementById('root')).render(<RunDetailScreen />);

// Letterbox-fit the 1440×900 frame to the viewport.
const frame = document.getElementById('frame');
function fit() {
  const pad = 60;
  const vw = window.innerWidth - pad;
  const vh = window.innerHeight - pad;
  const s = Math.min(vw / 1440, vh / 900, 1);
  frame.style.transform = `scale(${s})`;
}
fit();
window.addEventListener('resize', fit);
</script>
</body>
</html>
