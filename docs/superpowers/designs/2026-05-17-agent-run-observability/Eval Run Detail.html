    /* xvn folio-dark tokens (ported from xvision/frontend/web/src/theme/themes.ts) */
    :root {
      --bg:               #0f0e0c;
      --surface-sidebar:  #17150f;
      --surface-card:     #14120e;

      --danger:           #c8443a;
      --info:             #6f8fb8;
      --radius-card:      6px;
      --radius-sm:        4px;

    html, body, #root { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;

    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }
    ::selection { background: var(--gold-bg-strong); color: var(--text); }

    /* tailwind override helpers mapped to vars */

    .bg-surface       { background-color: var(--surface-card); }
    .bg-surface-elev  { background-color: var(--surface-elev); }
    .bg-surface-panel { background-color: var(--surface-panel); }
    .bg-surface-hover { background-color: var(--surface-hover); }

    .bg-gold-bg-strong{ background-color: var(--gold-bg-strong); }

    .text-text   { color: var(--text); }
    .text-text-2 { color: var(--text-2); }
    .text-text-3 { color: var(--text-3); }
    .text-text-4 { color: var(--text-4); }
    .text-gold   { color: var(--gold); }
    .text-gold-soft { color: var(--gold-soft); }
    .text-warn   { color: var(--warn); }
    .text-danger { color: var(--danger); }
    .text-info   { color: var(--info); }

    .border-default { border-color: var(--border); }
    .border-soft    { border-color: var(--border-soft); }
    .border-strong  { border-color: var(--border-strong); }
    .border-gold    { border-color: var(--gold); }
    .border-gold-soft { border-color: rgba(212,165,71,0.35); }
    .border-danger  { border-color: var(--danger); }
    .border-warn    { border-color: var(--warn); }
    .border-info    { border-color: var(--info); }

    .rounded-card { border-radius: var(--radius-card); }
    .rounded-sm2  { border-radius: var(--radius-sm); }

    /* a subtle gold focus glow */
    .focus-gold:focus { outline: none; box-shadow: 0 0 0 1px var(--gold), 0 0 0 4px var(--gold-bg); }

    /* density bar baseline */
    .density-glyph { font-family: 'JetBrains Mono', monospace; letter-spacing: -1px; }
