<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>xvn — v1 design</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="styles.css"/>
<style>
  body { background: #0A0907; }
  /* design canvas overrides */
  .dc-section-title { font-family: 'Cormorant Garamond', serif !important; font-style: italic; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="screen-home.jsx"></script>
<script type="text/babel" src="screen-strategies.jsx"></script>
<script type="text/babel" src="screen-inspector.jsx"></script>
<script type="text/babel" src="screen-eval-runs.jsx"></script>
<script type="text/babel" src="screen-run-detail.jsx"></script>
<script type="text/babel" src="screen-setup.jsx"></script>

<script type="text/babel" data-presets="react">
const App = () => {
  return (
    <DesignCanvas
      title="xvn — v1 dashboard"
      subtitle="Folio dark · eval + strategy slice · 1440×900 frames"
    >
      <DCSection id="home" title="Home — Control Tower">
        <DCArtboard id="home-1" label="Default landing (returning visitor)" width={1440} height={900}>
          <HomeScreen />
        </DCArtboard>
      </DCSection>

      <DCSection id="setup" title="Setup wizard — first run + on-demand">
        <DCArtboard id="setup-1" label="/setup · drafting eth-mr-v3" width={1440} height={900}>
          <SetupScreen />
        </DCArtboard>
      </DCSection>

      <DCSection id="strategies" title="Strategies — drafts list">
        <DCArtboard id="strategies-1" label="/strategies · 8 drafts" width={1440} height={900}>
          <StrategiesScreen />
        </DCArtboard>
      </DCSection>

      <DCSection id="authoring" title="Inspector — authoring (LLM slot split editor)">
        <DCArtboard id="authoring-1" label="/authoring/eth-mr-v3 · Intern slot" width={1440} height={900}>
          <InspectorScreen />
        </DCArtboard>
      </DCSection>

      <DCSection id="eval" title="Eval — runs list">
        <DCArtboard id="eval-runs-1" label="/eval/runs · leaderboard" width={1440} height={900}>
          <EvalRunsScreen />
        </DCArtboard>
      </DCSection>

      <DCSection id="run-detail" title="Eval — run detail">
        <DCArtboard id="run-detail-1" label="/eval/runs/01H8N7Z" width={1440} height={900}>
          <RunDetailScreen />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
