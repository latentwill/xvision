<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>xvn — mobile-first framework (print)</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="styles.css"/>
<link rel="stylesheet" href="mobile-styles.css"/>
<style>
  @page { size: 11in 8.5in; margin: 0.35in; }

  html, body {
    background: #0F0E0C;
    margin: 0;
    padding: 0;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  .print-page {
    width: 100%;
    min-height: calc(8.5in - 0.7in);
    page-break-after: always;
    break-after: page;
    padding: 8px 0 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    box-sizing: border-box;
  }
  .print-page:last-child {
    page-break-after: auto;
    break-after: auto;
  }

  .page-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    border-bottom: 1px solid var(--border-soft);
    padding-bottom: 8px;
  }
  .page-head .t {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 22px;
    letter-spacing: -0.01em;
    color: var(--text);
  }
  .page-head .meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-3);
  }

  .frames-row {
    display: flex;
    gap: 28px;
    align-items: flex-start;
    justify-content: center;
    flex: 1;
  }
  .frame-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .frame-cell .label {
    font-size: 11px;
    color: var(--text-2);
    text-align: center;
    max-width: 380px;
    line-height: 1.4;
  }
  .frame-cell .label .pill {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px;
    padding: 2px 6px;
    margin-right: 6px;
    color: var(--gold);
    border-color: rgba(212,165,71,0.4);
  }

  .scaled-wrap {
    transform-origin: top center;
    /* sized inline per-frame */
  }
  .frame-host {
    /* native artboard size — gets scaled by parent */
  }

  /* Footer with page number / branding */
  .page-foot {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 8px;
    border-top: 1px solid var(--border-soft);
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px;
    color: var(--text-3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .page-foot .brand {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 14px;
    text-transform: none;
    letter-spacing: -0.01em;
    color: var(--text-2);
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="mobile-shared.jsx"></script>
<script type="text/babel" src="mobile-chat.jsx"></script>
<script type="text/babel" src="mobile-eval.jsx"></script>
<script type="text/babel" src="mobile-responsive.jsx"></script>

<script type="text/babel" data-presets="react">
const Phone = ({ children }) => (
  <IOSDevice width={402} height={874} dark={true} keyboard={false}>
    {children}
  </IOSDevice>
);

// Each "Frame" renders an artboard at its native size, scaled inside a fixed-size host.
const Frame = ({ width, height, scale = 1, children }) => (
  <div className="scaled-wrap" style={{
    width: width * scale,
    height: height * scale,
  }}>
    <div className="frame-host" style={{
      width, height,
      transform: `scale(${scale})`,
      transformOrigin: "top left"
    }}>
      {children}
    </div>
  </div>
);

const FrameCell = ({ label, pill, width, height, scale, children }) => (
  <div className="frame-cell">
    <Frame width={width} height={height} scale={scale}>{children}</Frame>
    <div className="label"><span className="pill" style={{display: "inline-block", border: "1px solid rgba(212,165,71,0.4)", borderRadius: 3}}>{pill}</span>{label}</div>
  </div>
);

const Page = ({ title, meta, children, pageNum, total }) => (
  <section className="print-page">
    <div className="page-head">
      <div className="t">{title}</div>
      <div className="meta">{meta}</div>
    </div>
    <div className="frames-row">{children}</div>
    <div className="page-foot">
      <span>xvn — mobile-first framework</span>
      <span className="brand">xvn</span>
      <span>{pageNum} / {total}</span>
    </div>
  </section>
);

// Phone artboards are 402×874 native. At scale 0.78 → 314×682 — two fit nicely landscape A4.
const PHONE_W = 402, PHONE_H = 874, PHONE_S = 0.78;
// Tablet 768×1024 — scale 0.69 → 530×707
const TABLET_W = 768, TABLET_H = 1024, TABLET_S = 0.69;
// Desktop 1280×800 — scale 0.78 → 998×624
const DESK_W = 1280, DESK_H = 800, DESK_S = 0.78;
// Concept page: native render

const App = () => {
  const TOTAL = 6;
  return (
    <>
      {/* Page 1 — concept */}
      <Page title="Chat is the spine — concept" meta="01 · OVERVIEW" pageNum={1} total={TOTAL}>
        <div style={{
          width: 980, padding: "26px 32px",
          background: "var(--surface-card)",
          border: "1px solid var(--border)",
          color: "var(--text)",
          display: "flex", flexDirection: "column", gap: 14,
          alignSelf: "center"
        }}>
          <div style={{fontFamily: "Cormorant Garamond, serif", fontStyle: "italic", fontSize: 36, fontWeight: 500, letterSpacing: "-0.01em"}}>
            Chat is the spine.
          </div>
          <div style={{color: "var(--text-2)", fontSize: 14, lineHeight: 1.6, maxWidth: 700}}>
            On mobile, the chat thread is the home screen. Eval charts, run cards, strategy summaries
            and confirmations render inline as agent responses — so users get rich data without
            leaving the conversation. The hamburger opens a full nav drawer, and the <span className="mono" style={{color: "var(--gold)"}}>+</span> in
            the composer opens an "All functions" sheet — a touch-friendly command palette covering
            every action xvn supports.
          </div>
          <hr className="hr" style={{margin: "8px 0"}}/>
          <div style={{display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 26, color: "var(--text-2)", fontSize: 13, lineHeight: 1.55}}>
            <div>
              <div className="mono" style={{color: "var(--gold)", fontSize: 11, letterSpacing: "0.06em", marginBottom: 6}}>390 — PHONE</div>
              Chat full-bleed. Nav + functions in overlays. Dashboards take over the viewport with a floating chat pill to return to the rail.
            </div>
            <div>
              <div className="mono" style={{color: "var(--gold)", fontSize: 11, letterSpacing: "0.06em", marginBottom: 6}}>768 — TABLET</div>
              Chat docks as a 360px left rail; the dashboard fills the right. Both stay visible — no overlay needed.
            </div>
            <div>
              <div className="mono" style={{color: "var(--gold)", fontSize: 11, letterSpacing: "0.06em", marginBottom: 6}}>1280+ — DESKTOP</div>
              Three columns: nav (220) · dashboard · chat rail (380). Mirrors the v1 desktop, with chat promoted to a permanent rail.
            </div>
          </div>
        </div>
      </Page>

      {/* Page 2 — mobile chat */}
      <Page title="Mobile · chat as home" meta="02 · CHAT" pageNum={2} total={TOTAL}>
        <FrameCell label="Default landing · agent greets, returns inline chart" pill="390 PHONE" width={PHONE_W} height={PHONE_H} scale={PHONE_S}>
          <Phone><MobileChatHome /></Phone>
        </FrameCell>
        <FrameCell label="User asks about eval · inline chart + findings" pill="390 PHONE" width={PHONE_W} height={PHONE_H} scale={PHONE_S}>
          <Phone><MobileChatEval /></Phone>
        </FrameCell>
      </Page>

      {/* Page 3 — menus */}
      <Page title="Mobile · menus stay reachable" meta="03 · MENUS" pageNum={3} total={TOTAL}>
        <FrameCell label="Nav drawer (hamburger) — all sections" pill="390 PHONE" width={PHONE_W} height={PHONE_H} scale={PHONE_S}>
          <Phone><MobileDrawer /></Phone>
        </FrameCell>
        <FrameCell label="Functions sheet (+ button) — every action xvn supports" pill="390 PHONE" width={PHONE_W} height={PHONE_H} scale={PHONE_S}>
          <Phone><MobileSheet /></Phone>
        </FrameCell>
      </Page>

      {/* Page 4 — dashboards */}
      <Page title="Mobile · dashboards (chat collapses to a pill)" meta="04 · DASHBOARDS" pageNum={4} total={TOTAL}>
        <FrameCell label="Eval runs · histogram + per-run sparklines" pill="390 PHONE" width={PHONE_W} height={PHONE_H} scale={PHONE_S}>
          <Phone><MobileEvalList /></Phone>
        </FrameCell>
        <FrameCell label="Run detail · full chart + findings + ledger" pill="390 PHONE" width={PHONE_W} height={PHONE_H} scale={PHONE_S}>
          <Phone><MobileRunDetail /></Phone>
        </FrameCell>
      </Page>

      {/* Page 5 — tablet */}
      <Page title="Tablet · chat docks as left rail" meta="05 · RESPONSIVE · 768" pageNum={5} total={TOTAL}>
        <FrameCell label="768 × 1024 — chat (360) + dashboard fill the viewport" pill="768 TABLET" width={TABLET_W} height={TABLET_H} scale={TABLET_S}>
          <TabletSplit />
        </FrameCell>
      </Page>

      {/* Page 6 — desktop */}
      <Page title="Desktop · three-pane with permanent chat rail" meta="06 · RESPONSIVE · 1280" pageNum={6} total={TOTAL}>
        <FrameCell label="1280 × 800 — nav (220) · dashboard · chat rail (380)" pill="1280 DESKTOP" width={DESK_W} height={DESK_H} scale={DESK_S}>
          <DesktopThreePane />
        </FrameCell>
      </Page>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

// Auto-print once everything is ready
(async () => {
  try { await document.fonts.ready; } catch (e) {}
  // Wait for React render
  await new Promise(r => setTimeout(r, 600));
  window.print();
})();
</script>
</body>
</html>
