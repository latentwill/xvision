<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0F0E0C" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Charts dashboard typography stack (chart-rework spec, Track B B0).
         Cormorant Garamond (headlines), Inter (body/UI), JetBrains Mono
         (numerics). One <link> bundling all three so the existing CSS
         references (globals.css, theme tokens) actually load the families. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    />
    <title>xvision</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
