name: docker

# Triggers locked down 2026-05-10 to conserve Actions minutes during the v1
# build-out. The previous config rebuilt on every push to main (incl. doc /
# chore / team-queue commits) and on every PR with a Cargo.toml touch — at
# the current cadence (~30 PRs/day) that was burning the budget without
# producing artifacts anyone consumes. Re-enable broader triggers once v1
# lands and we want pre-merge image smoke again.
on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      dockerfile:
        description: "Which Dockerfile to build (deploy = SPA baked in; default = CLI only)"
        type: choice
        default: Dockerfile.deploy
        options:
          - Dockerfile.deploy
          - Dockerfile
      build_identity:
        description: "Also build the WITH_IDENTITY=1 (Mantle alloy) image"
        type: boolean
        default: false
      build_profile:
        description: "Rust build profile (release = production; staging = faster manual test image)"
        type: choice
        default: release
        options:
          - release
          - staging

# Auto-cancel superseded runs on the same ref. Belt + suspenders against
# the queue stacking up if multiple tags get pushed in quick succession.
concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  BUILD_PROFILE: ${{ github.event.inputs.build_profile || 'release' }}
  # Forces JavaScript actions still pinned to Node 20 runtime to run on
  # Node 24 ahead of the 2026-06-02 forced cutover (and 2026-09-16 removal).
  # Safe escape hatch documented by GitHub; remove once every action used
  # here (checkout@v4, setup-node@v4, setup-buildx@v3, login@v3,
  # metadata@v5, build-push@v6) ships a Node-24-runtime release.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.95.0

      - name: Install Rust native build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            perl \
            make \
            cmake \
            clang \
            libclang-dev \
            pkg-config \
            libsqlite3-dev

      - name: Ensure dashboard static embed dir exists
        run: mkdir -p crates/xvision-dashboard/static

      - name: Rust deploy compile check
        run: cargo check --bin xvn

      - name: Rust identity compile check
        if: github.event_name == 'push' || github.event.inputs.build_identity == 'true'
        run: cargo check --workspace

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 9.0.0
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/web/pnpm-lock.yaml

      - name: Frontend build check
        run: |
          corepack enable
          cd frontend/web
          pnpm install --frozen-lockfile
          pnpm build

  build-default:
    runs-on: ubuntu-latest
    needs: preflight
    outputs:
      image_tag: ${{ steps.image.outputs.image_tag }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push (default)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ github.event.inputs.dockerfile || 'Dockerfile.deploy' }}
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            WITH_IDENTITY=0
            BUILD_PROFILE=${{ env.BUILD_PROFILE }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=xvision-default-${{ env.BUILD_PROFILE }}
          cache-to: type=gha,scope=xvision-default-${{ env.BUILD_PROFILE }},mode=max

      - id: image
        name: Select smoke image tag
        run: |
          image="${REGISTRY}/${IMAGE_NAME}:sha-${GITHUB_SHA::7}"
          echo "image_tag=${image}" >> "$GITHUB_OUTPUT"

  build-identity:
    runs-on: ubuntu-latest
    needs: build-default
    if: |
      github.event_name != 'pull_request' &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.build_identity == 'true')
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            suffix=-identity,onlatest=true
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=identity,enable={{is_default_branch}}

      - name: Build & push (identity)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ github.event.inputs.dockerfile || 'Dockerfile.deploy' }}
          push: true
          build-args: |
            WITH_IDENTITY=1
            BUILD_PROFILE=${{ env.BUILD_PROFILE }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=xvision-identity-${{ env.BUILD_PROFILE }}
          cache-to: type=gha,scope=xvision-identity-${{ env.BUILD_PROFILE }},mode=max

  smoke:
    runs-on: ubuntu-latest
    needs: build-default
    if: github.event_name != 'pull_request'
    steps:
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull & smoke test current image
        run: |
          docker pull ${{ needs.build-default.outputs.image_tag }}
          docker run --rm ${{ needs.build-default.outputs.image_tag }} --version
          # No bind mount: the image's /data is already chown'd to the
          # `xvision` non-root user (Dockerfile L86 + USER xvision). A
          # `-v $PWD/data:/data` would override that with a runner-side
          # root-owned host dir, blocking writes (errno 14 / CANTOPEN).
          # `--rm` discards the in-container /data after the run anyway.
          docker run --rm \
            -e XVN_AUTOMIGRATE=1 \
            ${{ needs.build-default.outputs.image_tag }} \
            store stats --db /data/store.db
