name: docker

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "docker/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "crates/**"
      - ".github/workflows/docker.yml"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-default:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push (default)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            WITH_IDENTITY=0
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=xvision-default
          cache-to: type=gha,scope=xvision-default,mode=max

  build-identity:
    runs-on: ubuntu-latest
    needs: build-default
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            suffix=-identity,onlatest=true
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=identity,enable={{is_default_branch}}

      - name: Build & push (identity)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            WITH_IDENTITY=1
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=xvision-identity
          cache-to: type=gha,scope=xvision-identity,mode=max

  smoke:
    runs-on: ubuntu-latest
    needs: build-default
    if: github.event_name != 'pull_request'
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull & smoke test latest
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest --version
          # No bind mount: the image's /data is already chown'd to the
          # `xvision` non-root user (Dockerfile L86 + USER xvision). A
          # `-v $PWD/data:/data` would override that with a runner-side
          # root-owned host dir, blocking writes (errno 14 / CANTOPEN).
          # `--rm` discards the in-container /data after the run anyway.
          docker run --rm \
            -e XVN_AUTOMIGRATE=1 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            store stats --db /data/store.db
