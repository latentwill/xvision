name: docker

# Triggers locked down 2026-05-10 to conserve Actions minutes during the v1
# build-out. The previous config rebuilt on every push to main (incl. doc /
# chore / team-queue commits) and on every PR with a Cargo.toml touch — at
# the current cadence (~30 PRs/day) that was burning the budget without
# producing artifacts anyone consumes. Re-enable broader triggers once v1
# lands and we want pre-merge image smoke again.
on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      dockerfile:
        description: "Which Dockerfile to build (deploy = SPA baked in; default = CLI only)"
        type: choice
        default: Dockerfile.deploy
        options:
          - Dockerfile.deploy
          - Dockerfile
      build_identity:
        description: "Also build the WITH_IDENTITY=1 (Mantle alloy) image"
        type: boolean
        default: false

# Auto-cancel superseded runs on the same ref. Belt + suspenders against
# the queue stacking up if multiple tags get pushed in quick succession.
concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-default:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push (default)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ github.event.inputs.dockerfile || 'Dockerfile' }}
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            WITH_IDENTITY=0
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=xvision-default
          cache-to: type=gha,scope=xvision-default,mode=max

  build-identity:
    runs-on: ubuntu-latest
    needs: build-default
    if: |
      github.event_name != 'pull_request' &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.build_identity == 'true')
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            suffix=-identity,onlatest=true
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=identity,enable={{is_default_branch}}

      - name: Build & push (identity)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ github.event.inputs.dockerfile || 'Dockerfile' }}
          push: true
          build-args: |
            WITH_IDENTITY=1
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=xvision-identity
          cache-to: type=gha,scope=xvision-identity,mode=max

  smoke:
    runs-on: ubuntu-latest
    needs: build-default
    if: github.event_name != 'pull_request'
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull & smoke test latest
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest --version
          # No bind mount: the image's /data is already chown'd to the
          # `xvision` non-root user (Dockerfile L86 + USER xvision). A
          # `-v $PWD/data:/data` would override that with a runner-side
          # root-owned host dir, blocking writes (errno 14 / CANTOPEN).
          # `--rm` discards the in-container /data after the run anyway.
          docker run --rm \
            -e XVN_AUTOMIGRATE=1 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            store stats --db /data/store.db
