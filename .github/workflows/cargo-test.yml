name: cargo-test

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
    paths-ignore:
      - "frontend/**"
      - "docs/**"
      - "**.md"

concurrency:
  group: cargo-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: cargo test (phase regressions)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cache-on-failure: true

      - name: Run Python script tests
        run: python3 -m unittest discover -s scripts -p 'test_*.py'

      - name: Run workspace tests
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/target
          CARGO_BUILD_JOBS: "1"
        run: |
          scripts/cargo test -p xvision-execution --test broker_surface_mock_orders
          scripts/cargo test -p xvision-engine --test multi_asset_backtest
          scripts/cargo test -p xvision-engine --test multi_asset_filter_scope
