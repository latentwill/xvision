name: cargo-test

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

concurrency:
  group: cargo-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: cargo test (phase regressions)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Run workspace tests
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/target
          CARGO_BUILD_JOBS: "1"
        run: |
          scripts/cargo test -p xvision-eval --test ab_compare_regression
          scripts/cargo test -p xvision-execution --test broker_surface_mock_orders
          scripts/cargo test -p xvision-engine --test multi_asset_backtest
          scripts/cargo test -p xvision-engine --test multi_asset_filter_scope
