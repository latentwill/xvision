name: rust unused deps

# Manual Rust dependency hygiene checks. Kept off pull_request by default
# because both jobs compile or install extra tooling, and udeps requires
# nightly.
on:
  workflow_dispatch:
    inputs:
      check:
        description: "Which unused-dependency audit to run"
        type: choice
        default: machete
        options:
          - machete
          - udeps
          - both

concurrency:
  group: rust-unused-deps-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  machete:
    name: cargo machete
    runs-on: ubuntu-latest
    if: github.event.inputs.check == 'machete' || github.event.inputs.check == 'both'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.95.0

      - name: Cache cargo state
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: rust-unused-deps-machete

      - name: Install cargo-machete
        run: cargo install cargo-machete --locked

      - name: Run cargo machete
        run: |
          set +e
          cargo machete 2>&1 | tee cargo-machete.txt
          status=${PIPESTATUS[0]}
          {
            echo "## cargo machete"
            echo
            echo '```text'
            cat cargo-machete.txt
            echo '```'
          } > cargo-machete.md
          exit "$status"

      - name: Upload cargo machete report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cargo-machete-report
          path: |
            cargo-machete.txt
            cargo-machete.md

  udeps:
    name: cargo udeps
    runs-on: ubuntu-latest
    if: github.event.inputs.check == 'udeps' || github.event.inputs.check == 'both'
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Rust nightly
        uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly

      - name: Install Rust native build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            perl \
            make \
            cmake \
            clang \
            libclang-dev \
            pkg-config \
            libsqlite3-dev

      - name: Cache cargo state
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: rust-unused-deps-udeps

      - name: Install cargo-udeps
        run: cargo install cargo-udeps --locked

      - name: Run cargo udeps
        run: |
          set +e
          cargo +nightly udeps --workspace --all-targets 2>&1 | tee cargo-udeps.txt
          status=${PIPESTATUS[0]}
          {
            echo "## cargo udeps"
            echo
            echo '```text'
            cat cargo-udeps.txt
            echo '```'
          } > cargo-udeps.md
          exit "$status"

      - name: Upload cargo udeps report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cargo-udeps-report
          path: |
            cargo-udeps.txt
            cargo-udeps.md
